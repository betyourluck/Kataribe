# ノックサーバーのコンテナイメージを GHCR へ push する (spec 23 / 契約 knock_hosting)。
# outcast の docker-compose.prod.yml が ghcr.io/betyourluck/kataribe-knock:latest を pull する
# (既存の outcast / kataribe イメージと同型のデプロイ経路)。
#
# visibility: **手動の設定変更は要らなかった** (2026-07-23 実測)。GITHUB_TOKEN で
# public リポジトリから push したパッケージはリポジトリの可視性を継承する — 匿名トークンで
# manifest を引いて 200 を確認済み (存在しない名前は 403 なので判別は効いている)。
# ゆえに VPS 側の docker login も不要。
#
# パス絞りの注意: `paths` は push に含まれる**全コミット**を見るので、knock/ を触った
# コミットが範囲内にあれば他のコミットで発火する。逆に knock/ を触らない push では
# 焼き直されない (= latest はその時点の knock/ の内容と一致する、が正しい挙動)。
name: knock-image

on:
  push:
    branches: [main]
    paths:
      - "knock/**"
      - ".github/workflows/knock-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # イメージを焼く前にテストを回す (Red のまま latest を上書きしない)。
      - name: Run knock tests
        run: cargo test --manifest-path knock/Cargo.toml

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: knock
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kataribe-knock:latest
            ghcr.io/${{ github.repository_owner }}/kataribe-knock:${{ github.sha }}
