# PoC シナリオ: 放課後の教室
# heroine_route.yaml と違い、キャラを inline で書かない。
# モカは cast 宣言により characters/moka.yaml から注入される (harness::inject_cast)。
# goal: モカの好感度を 50 まで上げる。「オタク嫌い」は moka.profile の柔らかい性向。

title: 放課後の教室
start: classroom

initial_stats:
  hp: 12

cast: [moka]

# 「オタク嫌い」は moka.profile の柔らかい性向として GM が語りで反映する
# (engine 強制でなく narration の素材)。硬い禁忌・フラグは持たせない。
allowed_flags: []

locations:
  classroom:
    description: 放課後の教室。机の上には教科書やノートが散らばっている。窓からは夕日が差し込み、教室内はオレンジ色に染まっている。モカは机に座ってスマホをいじっている。彼女はあなたに気づくと、少し驚いた表情を見せる。
    items: {}
    exits: []

# 好感度の閾値で authored ビートを焚く = 漂いを段に変える
triggers:
  - id: opens_up           # 好感度20: 素を見せる（小さな転機）
    when: { kind: stat_at_least, entity: moka, key: 好感度, value: 20 }
    effects: [ { op: set_flag, key: moka_opened_up, value: true } ]
    narration: モカがふと声のトーンを落とし、モデルの仕事の本音をこぼし始めた。
  - id: pinky_promise      # 好感度40: 約束（告白前の踏み段）
    when: { kind: stat_at_least, entity: moka, key: 好感度, value: 40 }
    effects: [ { op: set_flag, key: promised, value: true } ]
    narration: 「……今度の文化祭、ホントに一緒に回ろうね」モカが小指を立てた。
    recall: childhood_promise        # memoria_bridge で伏線を引く

goals:                     # 分岐する結末（単一 goal を named に）
  - id: confession_ok      # 約束を経て50 = 王道エンド
    when: { kind: all, of: [ {kind: flag_is, key: promised, value: true},
                             {kind: stat_at_least, entity: moka, key: 好感度, value: 50} ] }
  - id: too_fast           # 約束を飛ばして50 = 上滑りエンド（別の枝）
    when: { kind: stat_at_least, entity: moka, key: 好感度, value: 50 }