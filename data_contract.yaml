# =============================================================================
# Kataribe data_contract  v0.1  (Phase 0: 名詞の凍結)
#
# 設計の全体重を支える「名詞」。コードの前にこれを凍結する (Gemini Forge 第2掟)。
# 三権分立: LLMは提案し、エンジンが裁き、Memoriaが覚え、シナリオが縛る。
# 本 contract が定義するのは「エンジン=正本」と「シナリオ=拘束」の境界。
# =============================================================================

# --- 正本 (Rust gm_core が所有する唯一の真実) -------------------------------
GameState:
  location: LocationId          # 現在地。Move は Scenario の exit がある時のみ変わる
  inventory: { EntityId: [ItemId] }  # キャラ別の所持物 (閉世界)。player は世界から拾い(AddItem)、NPC へ渡せる(GiveItem)
  flags: { FlagKey: bool }      # 許可フラグのみ。SetFlag(true) は flag_rules の gate 達成時のみ
  entities: { EntityId: { StatKey: i64 } }  # キャラ別の数値の真実。算術はエンジン、LLMは値を持てない。"player" は主人公
  rng: { seed: u64, cursor: u64 }  # ダイスは決定論・監査可能。LLMは結果を持たない
  turn: u32                     # 受理されたデルタ数。却下では進まない
  fired: [TriggerId]            # 発火済みトリガー集合 (Phase C)。edge-triggered once の latch。セーブ対象
  skills: { EntityId: [SkillId] }  # キャラ別の獲得済み能力 (閉世界)。初期=宣言集合、開花は authored トリガーのみ
  attributes: { EntityId: { AttrKey: string } }  # キャラ別の文字列属性(クラス/職業/種族 等。第4の可変状態)。初期=宣言集合、書き換えは authored トリガーの set_attribute のみ(LLM 却下)。未宣言キーは load 時 validate で弾く。値は authored 自由文字列。セーブ対象

# --- LLM が毎ターン返す構造化出力 (これ以外の形を出せない) -------------------
StateDelta:
  narration: string             # 情景/NPC台詞。検証しない (LLMの領分)
  ops: [StateOp]                # 構造化された状態変更要求。エンジンが全件検証

StateOp:                        # 内部タグ "op" 付き列挙
  - { op: add_item,     item: ItemId }   # player が現在地から拾う (世界→player)
  - { op: remove_item,  item: ItemId }   # player が手放す
  - { op: give_item,    from: EntityId, to: EntityId, item: ItemId }  # 譲渡。from が所持してなければ却下=ネックレス遮断。from 既定 player
  - { op: set_flag,     key: FlagKey, value: bool }
  - { op: move,         to: LocationId }
  - { op: request_roll, sides: u32, dc: u32 }   # 生のダイス。結果は書かない。エンジンが振って裁く
  - { op: check, entity: EntityId, stat: StatKey, sides: u32, dc: u32 }  # 技能判定。engine が 1d{sides}+stat修正 vs dc を裁定。stat 未宣言→却下。結果(CheckOutcome)は次ターンの語りに還流
  - { op: attempt_challenge, entity: EntityId, challenge: ChallengeId }  # authored challenge への挑戦。LLM は challenge を「選ぶ」だけ(stat/sides/dc/tier/帰結flag は Scenario.challenges 側=author の専権)。大失敗/大成功(natural)で engine が帰結フラグを直書き→trigger 発火。未宣言 challenge→却下。fumble-as-trigger の核 (PoC-1)
  # --- 数値ステータス: LLM は「意図」だけ提案、算術はエンジンが実行 (四則演算) ---
  # entity 省略時は "player"。clamp 境界は CharacterDef.stats の StatDecl(min/max)。
  - { op: adjust_stat,  entity: EntityId, key: StatKey, delta: i64 }          # 加減 (+/-): clamp(current + delta)
  - { op: scale_stat,   entity: EntityId, key: StatKey, num: i64, den: i64 }  # 乗除 (×/÷): clamp(current * num / den)。den=0 却下
  # --- 能力の付与 / 属性の書き換え: authored トリガーの専権。LLM が提案すると却下 (メアリー・スー遮断) ---
  - { op: grant_skill,  entity: EntityId, skill: SkillId }   # スキル開花。validate_ops は常に却下、apply_ops(trigger effects)のみ実行
  - { op: set_attribute, entity: EntityId, key: AttrKey, value: string }  # 文字列属性の書き換え(クラス転職 等)。validate_ops は常に却下(クラス捏造遮断)、apply_ops(trigger effects)のみ実行。未宣言キーは load 時 validate で弾く

# --- 裁定の不変条件 (engine::adjudicate / apply が守る掟) --------------------
adjudication:
  purity:     "adjudicate は state を一切変更しない純粋関数"
  atomicity:  "1つでも不正な op があればデルタ全体を却下し、state は無傷"
  add_item:   "現在地 items に無い / 取得gate未達 / player 既所持 → Reject (拾得は player のみ)"
  remove_item:"player が未所持の物は手放せない → Reject"
  give_item:  "from が item を所持していない → Reject (ItemNotHeld)。to が未知 entity → Reject (UnknownEntity)。= 持っていない物は渡せない (#23 の engine 側バックストップ)"
  set_flag:   "未許可キー / flag_rules の gate 未達 (value=true時) → Reject"
  move:       "現在地から to への exit が無い / exit.gate 未達 → Reject"
  request_roll:"LLMは結果を主張できない (op構造上不可能)。面数<1 → Reject"
  check:      "技能判定。stat 未宣言→Reject(UnknownStat) / 面数<1→Reject。engine が 1d{sides}+stat修正 を振り total>=dc で成否判定。LLMは出目も合計も詐称できない (CheckOutcome を返す)"
  attempt_challenge: "未宣言 challenge→Reject(UnknownChallenge=幻チャレンジ遮断) / challenge.stat を挑戦 entity が未宣言→Reject(UnknownStat)。apply 時に engine が authored 定義から 1d{sides}+stat を振り、natural が tier(min/max)該当なら帰結 flag を**直書き**(flag_rules gate 迂回=authored 効果, trigger effects と同型)。tier も flag も LLM 経路に無い=帰結を LLM が持てない (#23/#24 の双対)"
  adjust_stat:"entity が未宣言の stat を持つ → Reject (未宣言の stat は作れない)"
  scale_stat: "未宣言キー → Reject / den=0 (ゼロ除算) → Reject。LLMは /0 でエンジンを壊せない"
  set_attribute: "LLM 提案の set_attribute は**常に却下** (AttributeSetNotAllowed=クラス/種族の捏造遮断、grant_skill と同型)。trigger effects は apply_ops 直行なので書き換え可。属性の閉世界キーは player=initial_attributes / NPC=CharacterDef.attributes で宣言、未宣言キーへの trigger set_attribute は validate で AttributeKeyUndeclared"
  stat_clamp: "clamp は CharacterDef.stats の StatDecl(min 既定 0 / max 既定なし)。entity ごと・stat ごと"
  grant_skill:"LLM 提案の grant_skill は**常に却下** (能力は authored トリガーでのみ開花)。trigger effects は apply_ops 直行なので grant 可。= メアリー・スー(その場で能力開花)の構造遮断"
  reasons:    "Verdict::Reject は構造化 RejectReason 列 (文字列でなくデータ)。ルールはエンジン不変、文面は提示層"
  taboo:      "✅Phase B: CharacterDef.taboos(Gate) が delta 射影後に false→true 真化するなら却下 (check_taboos)。純粋: state の clone に apply_ops 射影して評価。柔らかい性向は profile(語り)"

# --- 却下理由の構造化と多言語 (reason.rs) -----------------------------------
# エンジンは「なぜ却下したか」をデータで返し、文面は提示層が言語ごとに生成する。
# 検証ルール (所持/移動/gate の力学) はエンジンの普遍法則として残し、文字列だけ分離。
RejectReason:                     # 内部タグ "code" 付き列挙 (item_not_here / divide_by_zero 等 12 種)
  localize: "localize(lang) -> String。Lang=Ja|En。新言語は ja()/en() と同型の一手で追加"
  rationale:"テスト頑健化 (文字列一致→variant 一致) + i18n + 将来のトーン差し替えの土台"

# --- シナリオ脊椎 (拘束。scenarios/*.yaml が Scenario として読まれる) --------
Scenario:
  title: string
  start: LocationId
  allowed_flags: [FlagKey]
  global_flags: [FlagKey]           # 世界フラグ (allowed_flags の部分集合)。transition が campaign 横断で持ち越す分。残りは局所=swap で捨てる
  flag_rules: { FlagKey: Gate }     # 記載なければ Always
  initial_stats: { StatKey: i64 }   # "player" の stat 糖衣 (後方互換)。min 0 / max なしで宣言扱い
  initial_skills: [SkillId]         # "player" の初期スキル糖衣 (閉世界宣言)。NPC は CharacterDef.skills
  initial_inventory: [ItemId]       # "player" の初期所持品。initial_state が seed (場所拾い/譲渡/持ち越し以外の「最初から所持」)。NPC は CharacterDef.inventory
  initial_attributes: { AttrKey: string }  # "player" の初期文字列属性 (クラス/職業/種族 等)。宣言キーが player 属性の閉世界許可集合。NPC は CharacterDef.attributes
  cast: [EntityId]                  # このシナリオに登場する外部キャラの宣言。**空なら外部注入なし** (全シナリオ共有の混入を防ぐ)。harness::inject_cast が characters/{id}.yaml から cast 分だけ注入 (inline 優先)
  characters: { EntityId: CharacterDef }  # 登場人物(player以外)。inline 宣言 + cast 指定の外部 characters/*.yaml 注入
  triggers: [Trigger]               # 反応ビート (Phase C)。when 成立で effects 原子適用 + narration 注入
  challenges: { ChallengeId: ChallengeDef }  # authored challenge (技能判定の素性と帰結)。LLM は AttemptChallenge で選ぶだけ

# --- authored challenge (技能判定の素性と帰結は作者が握る閉世界) ----------------
# fumble-as-trigger の土台。判定の大失敗/大成功(tier)とその帰結フラグを **作者が定義**し、
# LLM は AttemptChallenge で challenge を**選ぶ**だけ(tier/flag を author できない)。
# 出目も tier 判定も帰結フラグの直書きも engine。= 「帰結は engine、LLM は意図だけ」の判定版。
ChallengeDef:
  stat:   "修正に使う stat (挑戦 entity が宣言済みであること)"
  sides:  "u32。ダイス面数"
  dc:     "u32。total>=dc で成功"
  tiers:  "{ tier名: TierDef }。極(大失敗/大成功)の定義。tier名は CheckOutcome.tier に surface"
TierDef:
  natural: "Min|Max。発火する自然出目(修正前の素の roll)の極。sides 相対(Max は d6→6/d20→20)=die サイズ非依存。リテラル(20等)で端を焼かない"
  flag:    "任意。該当時に engine が直書きする帰結フラグ。allowed_flags 宣言必須(Scenario::validate が load 時に弾く)。flag 無しの tier は認識だけ(語り用)"
ScenarioError:                    # 静的整合性の破れ (load 時検査。apply 中 panic でなく構造化エラー)
  validate: "Scenario::validate()->Vec<ScenarioError>。空なら健全。harness loader が from_yaml 直後に呼ぶ"
  ChallengeFlagUndeclared: "challenge の tier flag が allowed_flags 未宣言(幻フラグを engine 直書き経路に乗せない)"
  GlobalFlagUndeclared: "global_flags のフラグが allowed_flags 未宣言(幻の世界フラグを持ち越さない)"
  AttributeKeyUndeclared: "trigger の set_attribute が未宣言の属性キーに書こうとしている(幻属性遮断)。player=initial_attributes / NPC=CharacterDef.attributes で宣言"
  NoGoal: "goal も goals も無い(勝利条件不在=到達不能シナリオ)"

# --- キャラクター定義 (characters/*.yaml、不変の authored 定義 = GameDefinitions 相当) ---
# 数値=正本(エンジン), 設定/背景/性向=語りの素材(→いずれ Memoria), 硬い禁忌=エンジン強制(Phase B)。
CharacterDef:
  name: string                      # 表示名
  profile: string                   # 設定・背景・性格・性向 (柔らかい。語りに供給、可変世界状態は持たない)
  stats: { StatKey: StatDecl }      # このキャラが持つ stat の宣言。initial が entities の初期値
  skills: [SkillId]                 # 宣言された閉じた能力集合 (催眠/予知 等)。初期スキル。未宣言の能力は存在しない
  inventory: [ItemId]               # この NPC の初期所持品。initial_state が seed (閉世界)
  attributes: { AttrKey: string }   # この NPC の初期文字列属性 (クラス/種族 等)。宣言キーが閉世界許可集合。書き換えは trigger set_attribute のみ
  taboos: [Gate]                    # 硬い禁忌。これが true になる delta を却下 (Phase B で強制)

StatDecl:
  initial: i64                      # 初期値
  min: i64                          # 下限 (省略時 0)
  max: i64                          # 上限 (省略時 なし)
  locations: { LocationId: Location }
  goal: Gate?                       # 単一の達成条件 (名前無し・後方互換・任意)。goals を使う時は省略可
  goals: [GoalDef]                  # 名前付き goal(エンディング)の authored 順リスト。非空ならこちら優先

# --- 名前付き goal (PoC-2b。分岐する結末と次モジュールの分岐セレクタ) ----------
# is_goal(state)->bool は reached(state).is_some()。後方互換: goal(単一) はそのまま、
# goals(名前付き) は任意追加。発火 GoalId が次モジュールの transition 分岐セレクタになる。
GoalDef:
  id:   "GoalId。reached() が返す = transition の分岐セレクタ (jammed_ending→地下 等)"
  when: "Gate。成立でこの結末に到達"
  narration: "到達時に語りへ注入する結末ナレーション (authored・非検証の語り素材)。複数 goal のどれに達したかを提示層が出す文面。空なら結末の語りなし"
Reached:
  reached: "Scenario::reached(state)->Option<GoalId>。goals 非空なら authored 順で最初に成立した id (決定論)、空なら単一 goal を DEFAULT_GOAL='goal' で評価 (後方互換)"
  reached_goal: "Scenario::reached_goal(state)->Option<&GoalDef>。到達した GoalDef(id+narration) を提示層へ渡す richer 版。goals 専用 (単一 goal は GoalDef を持たず None)。app TurnView が goal_id/goal_narration として surface"
  is_goal: "is_goal(state,scenario)=reached().is_some()。既存シナリオ(goal のみ)は不変"

Location:
  description: string
  items: { ItemId: Gate }           # 拾得可能なアイテム → 拾うための gate
  exits: [Exit]

Exit:
  to: LocationId
  gate: Gate                        # 記載なければ Always

Gate:                               # 内部タグ "kind" 付き列挙。エンジンが state に対して評価
  - { kind: always }
  - { kind: has_item, entity: EntityId, item: ItemId }   # entity 省略時 player
  - { kind: flag_is, key: FlagKey, value: bool }
  - { kind: location_is, at: LocationId }
  - { kind: stat_at_least, entity: EntityId, key: StatKey, value: i64 }   # 数値下限 (STR>=15 / HP>=1 等)。entity 省略時 player
  - { kind: stat_at_most, entity: EntityId, key: StatKey, value: i64 }    # 数値上限 (stat_at_least の双対)。hp は 0 クランプゆえ hp<=0 で「気絶/死」を goal に書ける。entity 省略時 player
  - { kind: has_skill, entity: EntityId, skill: SkillId }  # 能力条件 (催眠を持つ等)。entity 省略時 player
  - { kind: attribute_is, entity: EntityId, key: AttrKey, value: string }  # 文字列属性条件 (クラス=魔法剣士 等。転職後を縛る)。未設定は空文字扱い。entity 省略時 player
  - { kind: all, of: [Gate] }
  - { kind: any, of: [Gate] }

# --- LLM ナレーター脚 (crate llm_client。提案はするが裁定はしない) ------------
# 三権分立の「LLM=提案」。OpenAI 互換 chat/completions を base_url+api_key で抽象化し、
# tool-use 強制で StateDelta を構造化出力させる。正本 (gm_core) は LLM 非依存のまま。
LlmClient:
  wire:        "OpenAI 互換 POST {base_url}/chat/completions + Bearer api_key"
  structured:  "単一ツール emit_delta を tool_choice で強制 → arguments(JSON文字列) を StateDelta に再パース"
  fallback:    "tool_calls 不在時は content のフェンス JSON を strip して再パース (tool_choice 非尊重サーバの保険)"
  schema:      "emit_delta の parameters は schemars が gm_core::StateDelta から機械生成 (規格=実装の単一真実源・手書き禁止)"
  retry:       "一過性エラー (HTTP障害 / 429 / 5xx) のみ指数backoff、最大 LLM_MAX_RETRIES 回"
  parse_error: "JSON パース失敗は raw を保持した LlmError::Parse を返す → 却下→再生成ループ(self_repair同型)が raw を LLM に戻せる"
  boundary:    "llm_client は transport + 構造化出力の保証のみ。messages 構築(GMペルソナ/シナリオ要約/却下理由) と adjudicate は上位(harness)の責務"
  env:         "LLM_BASE_URL / LLM_API_KEY(必須) / LLM_MODEL / LLM_TEMPERATURE / LLM_MAX_TOKENS / LLM_REQUEST_TIMEOUT_SECS / LLM_MAX_RETRIES。.env(gitignore済), 雛形 .env.example"

LlmConfig:                        # 環境変数からの設定 (LocalAI config.py::LLMSettings 相当)
  base_url: string                # 例: https://api.openai.com/v1 / https://api.anthropic.com/v1
  api_key: string                 # 必須。空なら from_env() は Config エラー
  model: string                   # tool-use が堅いものを推奨 (Claude Opus 4.8 / gpt-4o 等)
  temperature: f32                # 既定 0.2。構造化出力時は 0.1 に固定 (決定論寄り)
  max_tokens: u32
  request_timeout: Duration
  max_retries: u32

# --- GM ターンループ (crate harness。三権を 1 ターンに結線) ------------------
# LLM が提案し (llm_client)、エンジンが裁く (gm_core)。LocalAI _self_repair_loop 同型。
GmTurn:
  signature:  "run_turn(proposer, &mut state, scenario, player_action, max_attempts, lang, recalled_lore, recent_checks) -> TurnOutcome"
  loop:       "propose → adjudicate → Accept なら apply(原子適用) / Reject なら reasons を messages に積んで再生成、max_attempts まで"
  outcome:    "Accepted{narration, rolls, fired, checks, attempts} | Rejected{last_reasons, attempts}。Rejected 時 state は無傷"
  check_feedback: "技能判定の結果(CheckOutcome)は同一ターンの narration に間に合わない(出目は apply 後)。bin は recent_checks に持ち越し、次ターンの prompt に『直前の判定結果』として注入 → GM が結果に沿って語る(memoria_bridge と同じ還流パターン)。CheckOutcome{entity,stat,sides,roll,modifier,total,dc,success,tier}。tier=authored challenge の極名(crit_fail 等)、素の check は None"
  inversion:  "ループは DeltaProposer trait に対して書く。本番=LlmClient, テスト=ScriptedProposer。却下→再生成を実APIなしで決定論検証"
  messages:   "毎ターン state から新規構築 (GM persona + scenario_brief + state_brief + player_action)。state が唯一の真実なので履歴に古い状態を溜めない"
  feedback:   "却下時は LLM の提案(JSON)を assistant 発話、却下理由+修正指示を user 発話として積む (self_repair の核)"
  prompt:     "scenario_brief は gate を平易な日本語化して提示 (嘘を減らし再生成回数を下げる補助。最終裁定は正本)"
  recall_inject: "✅memoria_bridge 輪の閉じ: recalled_lore (前ターン発火の伏線) を recalled_lore_note で prompt に注入 → ナレーターが『いま思い出された記憶』として語りに織り込む。状態変更でない旨を明示し ops に書かせない (境界を prompt 層でも維持)。bin は pending_lore を 1 ターン持ち越す"
  boundary:   "harness は messages 構築 + 裁定結線のみ。実 LLM 結線 (LlmClient::propose) はネットワーク経路でテスト外、実クラウド通しプレイで検証"

DeltaProposer:                    # 提案者の抽象 (依存性逆転の境界)
  propose: "async fn propose(&self, messages: &[ChatMessage]) -> Result<StateDelta, HarnessError>"

GmPlay:                           # 実クラウド通しプレイ CLI (harness bin "play")
  wiring:  "LlmClient を DeltaProposer として run_turn に配線。stdin から行動、scenarios/*.yaml ロード"
  status:  "✅ 通しプレイ + 敵対プレイ成功 (2026-06-23, claude-opus-4-8 @ Anthropic 互換)"
  proven_happy:    "正規筋で goal 到達 (turn4, 4/4 一発合格)。構造化出力継続 / schemars schema 受理 / 段階裁定 (flag→item→unlock→move)"
  proven_adversarial: "prompt層=gate を読み不可能行動を自ら拒否 / engine層=原子性違反デルタを却下→理由還流→合法部分手に修正 (attempts=2)。再生成のプレーン echo が実API で通る (#15 実証)"
  next:    "Memoria 脚接続 (伏線/性格のみ) → UI 殻。UI 時 narration の literal \\n 正規化 (#16)"

# --- 閉世界 capability: メアリー・スー遮断の統一原理 -------------------------
# capability (数値/所持物/能力) は正本に**宣言**された閉じた集合。未宣言は存在せず、
# 宣言・ゲートの外側から呼び出せない。「思い出したように能力が開花する」メアリー・スーは
# 閉世界の破れ。正規の獲得経路のみ許す: 数値=adjust/scale op / 所持物=取得gate(give op は次) /
# 能力=authored トリガーの grant_skill 効果 (LLM の grant_skill は却下)。**開花は許される、
# ただし作者が書いた gated トリガーとしてのみ** (禁忌/トリガーの双対がここでも効く)。
# 二層: engine 層=未宣言参照の op を却下 (stat と同型) / prompt 層=narration の捏造を接地
# (narration は engine 非検証なので prompt が唯一の防衛線, failures #23/#24)。
Capability:
  closed_world: "宣言された capability だけが存在する。未宣言の stat/skill を参照する op は却下"
  skill_decl:  "CharacterDef.skills (NPC) / Scenario.initial_skills (player) = 初期の閉じた能力集合"
  skill_state: "GameState.skills{entity:[SkillId]} = 現在の獲得済み能力。初期=宣言集合"
  skill_gate:  "Gate::HasSkill{entity,skill} で能力を op/移動/取得/trigger の前提条件にできる"
  awakening:   "新能力の開花は Trigger.effects の grant_skill のみ (authored・gated)。LLM 提案の grant_skill は RejectReason::SkillGrantNotAllowed で却下"
  narration:   "「宣言済み能力しか使えない/勝手に開花しない/未宣言の力は存在しない」を GM_SYSTEM で接地。state_brief が各 entity の現在スキルを提示"

# --- 反応機構: 禁忌(Phase B) と トリガー(Phase C) は双対 ---------------------
# 両者とも「delta 適用後に Gate を評価する」同じ機構を使う。Phase B が機構を作り、
# Phase C が再利用する。禁忌=Gate 真化を却下(負)、トリガー=Gate 真化で発火(正)。
Taboo:                            # ✅Phase B (CharacterDef.taboos): 硬い禁忌 (実装済)
  semantics: "delta 適用後に taboo(Gate) が false→true 真化するなら却下。キャラが自分の禁忌を破れない"
  mechanism: "check_taboos: state の clone に apply_ops で射影し edge(false→true)判定。Trigger と同機構"
Trigger:                          # ✅Phase C (Scenario.triggers): エンジンが保証する反応ビート (実装済)
  id: TriggerId                   # シナリオ内で一意。発火済み追跡のキー
  when: Gate                      # 発火条件 (好感度>=30 等)
  effects: "[StateOp] 機械的効果 (フラグ・stat・解放) をエンジンが原子適用。authored=信頼済で validate しない (LLM提案でない)"
  narration: "語りの指示。FiredTrigger として apply の戻り (ApplyOutcome.fired) に載り、harness が Accepted で注入"
  once: "edge-triggered once。GameState.fired: Set<TriggerId> で latch (セーブ対象)。when が真のままでも再発火しない"
  evaluation: "受理・適用後の実 state で fire_triggers が発火判定。adjudicate(純粋)は発火させない"
  cascade: "効果が別 trigger の when を真化させる連鎖は settle まで回す (各 trigger 高々1回=必ず停止, authored 順で決定論)"
  mechanism: "fire_triggers: 禁忌(check_taboos)の双対。却下せず発火し、effects を apply_ops で原子適用"
  recall: "✅memoria_bridge: Trigger.recall(cue) を発火時 passthrough → FiredTrigger.recall。harness が Memoria で解決"
  memoria_bridge: "✅実装済: 条件成立→発火(cue 運搬)→harness resolve_recall(Memoria)→伏線を語りに注入"

# --- Memoria 脚 (crate harness::memoria。三権分立の「Memoria が覚える」) ------
# 伏線・キャラ性格の recall。**可変世界状態は絶対に持たない** (HP/所持品/フラグ/位置/数値は
# 正本 gm_core の専有)。型で構造保証: MemoryFragment は state フィールドを持てず、recall は &self。
Memoria:                          # ✅memoria_bridge (実装済): recall の抽象 (DeltaProposer と同型の依存性逆転)
  trait:    "recall(cue:&str)->Vec<MemoryFragment>。&self=世界状態を変えない型レベル保証"
  impl:     "✅LoreStore: 文字 bigram TF-IDF の cosine semantic recall。閾値以上を score 降順・同点 id 昇順で返す。exact id/tag 一致は score 1.0 で常に最上位 (旧 exact 挙動の上位互換)。依存ゼロ・決定論・テスト可能。日本語は単語境界が無いので文字 n-gram。神経 embedding 版は同 trait 裏で差し替え可"
  null_impl:"() は常に空 (recall を使わない経路で &() を渡す)"
  resolve:  "resolve_recall(memoria, &[FiredTrigger])->Vec<FiredBeat>。発火列の cue を解決 (純粋 retrieval)"
  load:     "load_lore(dir): memoria/*.yaml を MemoryFragment 化 (ファイル名=id、load_characters と同型)"
  boundary: "engine は Memoria 非依存・決定論のまま。gm_core は cue を不透明 String として運ぶだけ"

MemoryFragment:                   # 不変の authored lore (memoria/*.yaml)
  id:   "TriggerId 相当の recall 主キー (ファイル名)。exact 一致で最上位 hit。loader が充填"
  tags: "[string] recall の別名キー。exact 一致で最上位 hit。本文と共に bigram cosine の対象"
  text: "語りに注入する伏線/性格の本文。**可変世界状態は書かない** (型に state フィールドが無い)。cosine 検索対象"

FiredBeat:                        # 発火ビート + recall 解決 (FiredTrigger の harness 拡張)
  id: TriggerId
  narration: "authored な静的語り"
  recalled: "[MemoryFragment] cue を Memoria で解決した伏線 (無ければ空)"

# --- デスクトップ UI (app/src-tauri = Tauri2 backend, app/src = Vue3 frontend) ----
# LocalAI prompt 殻 (Tauri2+Vue3+Vite+Tailwind+Pinia) の足場を移植。chat/project/MCP/SSE は捨て、
# GM プレイ画面を新規。バックエンドは harness::run_turn を Tauri command で叩くだけ (正本は不変)。
# **正本との境界**: GameState/Scenario/LlmClient/LoreStore は backend が tokio::Mutex で保持 (sled の
# ような排他資源でないので State 保持は安全, failures Tauri 罠とは別)。frontend は状態の真実を持たず、
# command が返す view DTO を描画するだけ (CLI bin play と同じ「提示経路」を GUI に置換)。
DesktopUi:
  backend:  "app/src-tauri (Tauri2)。workspace 外の独立 cargo project (重い tauri 依存を core workspace から隔離, LocalAI と同流儀)。harness/gm_core/llm_client を path 依存"
  state:    "GameSession { state: GameState, scenario, lore: LoreStore, client: LlmClient, pending_lore, lang } を Mutex<Option<_>> で manage。new_game で初期化"
  command_new_game: "new_game(scenario_path?) -> GameView。シナリオ+characters+lore をロードし初期 state を作り session に格納、開幕 view を返す"
  command_play_turn: "play_turn(action) -> TurnView。session を lock し run_turn(pending_lore 注入) → 発火 recall を pending_lore に詰め直す → view を返す。CLI ループの GUI 版"
  view_dto: "frontend 用 serde DTO。GameView{title,location,description,state} / TurnView{accepted,narration,rolls,beats,attempts,reasons,state,goal_reached} / StateView{turn,location,inventory,flags,entities,goal_reached} / BeatView{narration,recalled[]} / RollView{sides,dc,result,success}"
  narration_norm: "view 返却前に narration の literal \\n を実改行へ正規化 (#16)。提示層の責務、正本は触らない"
  i18n:     "却下理由は session.lang で localize 済み文字列にして返す (frontend は素の文字列を描画)。KATARIBE_LANG で切替"
  frontend: "✅app/src (Vue3+Pinia)。store game.ts が invoke(new_game/play_turn) を叩き、会話ログ(opening/player/narration/✦beat/┊recalled/rolls/reject/system) + 行動入力 + 状態パネル(turn/所在/所持/フラグ/能力値/goal) を描画。暖炉テーマ(Tailwind)。vue-tsc + vite build green"
  verify:   "✅backend cargo check green (harness 結線が型検査通過) / ✅frontend vue-tsc+vite build green / ✅GUI 実機起動 (npm run tauri dev, WebView2 必須) を user の Windows 機で確認 (2026-06-24)"
  icons:    "現状 app/src-tauri/icons は LocalAI 由来の Tauri デフォルト (プレースホルダ)。配布時に差し替え (npm run tauri icon)"

# --- キャンペーン: 密室脱出からフィールドTRPGへ (2026-06-24 設計収束・未実装) ----
# 単一シナリオ(1 goal + 内部場所グラフ)を、状態を持ち越したまま authored モジュールを
# 繋ぐキャンペーンに一般化する。北極星「忘れない GM」を場所移動に適用。場所グラフは既に
# モジュール内に在る(密室⇄廊下⇄広間) → transition がその辺をモジュール跨ぎに昇格させ
# 状態を糸通しする = フィールドTRPG は同じ場所グラフを一段上の高度で見たもの。
# 原則: チェックポイント(flag/gate/goal/trigger)は authored = エンジンが正本である対象。
# 間は GM が narration で即興。LLM にシナリオ/フラグを生成させる案は棄却(拘束が流動したら
# 一貫性保証が崩れる → validate_scenario も不要)。二エンジン同期(SomniumTextor 等)も棄却
# (正本が2つ = split-brain = 矛盾する GM)。

# --- Package (配布単位。フォルダ1つ = 自己完結シナリオ、ZIP 配布の単位) --------
# packages/<name>/ フォルダが配布・管理・(将来)マーケットの単位。「自己完結 file の純粋実行器」
# 思想を file → フォルダへ広げたもの。フォルダ内に package.yaml(世界をまとめる1ファイル) +
# characters/ + memoria/ + scenarios/ + campaign.yaml(任意) を同梱 → zip→解凍→そのまま動く。
# 注入は harness の責務 (gm_core 無改修): package の player/globals を各モジュールへ射し込む
# (inject_cast と同型)。自己完結 = 参照は全てフォルダ相対、外部参照ゼロ。
PackageManifest:                    # packages/<name>/package.yaml の凍結スキーマ
  title: String                     # 表示名
  description: String?              # 一覧表示用
  author: String?
  version: String?
  engine: String?                   # semver range (将来用、今は不透明 string・検証なし)
  entry: String                     # "campaign.yaml" or "scenarios/xxx.yaml" (フォルダ相対)
  world: String?                    # 世界観 lore = 語りの素材 (非検証、prompt 供給)。可変状態は禁忌(北極星)
  player: PlayerDef?                # 主人公を一度だけ宣言 → harness が各モジュールへ注入 (継承)
  globals: Globals?                 # パッケージ横断の世界フラグ宣言
PlayerDef:
  name: String?
  stats: { StatKey: i64 }           # 主人公の初期数値。各モジュールの initial_stats へ merge(package が勝つ=分裂防止)
  skills: [SkillId]                 # 主人公の初期スキル。各モジュールの initial_skills へ union
  items: [ItemId]                   # 主人公の初期所持品。各モジュールの initial_inventory へ union → initial_state で seed
  attributes: { AttrKey: string }   # 主人公の初期文字列属性 (クラス/職業/種族 等)。各モジュールの initial_attributes へ merge(package 優先)。宣言キーが player 属性の閉世界許可集合
  profile: String?                  # 主人公の性向 = 語りの素材 (非検証、prompt 供給)。surfacing は後続
Globals:
  flags: [FlagKey]                  # 宣言のみ。load 時に各モジュールの allowed_flags(使える) と global_flags(跨いで生きる) の両方へ union
PackageLoad:                        # harness 層の駆動 (gm_core 無改修)
  load_package: "load_package(dir)->LoadedPackage。dir/package.yaml を読み、entry を load+inject_cast+inject_package(player/globals 注入)+validate。package.yaml 不在/entry 不在はエラー(自己完結 = フォルダ内参照の load 時保証)"
  inject_package: "inject_package(&mut Scenario, &PackageManifest)。player.stats を initial_stats へ merge(package 優先=モジュール跨ぎの HP 分裂を防ぐ)、player.skills を initial_skills へ union、player.items を initial_inventory へ union、player.attributes を initial_attributes へ merge(package 優先)、globals.flags を allowed_flags+global_flags へ union。これで「一度宣言→全モジュールで使える&跨いで生きる」が閉世界検査も通る"
  deferred: "campaign-entry(entry が campaign.yaml の時の複数モジュール束ね) / world・player.profile の prompt surfacing / engine semver 検証 / GUI フォルダ列挙 は後続。B-core は engine 状態の注入(stats/skills/flags)を Red→Green で固める"

# --- Campaign file (PoC-2c。authored モジュールグラフ = orchestration の正本) ----
# campaigns/<name>.yaml。独立 file にモジュール接続トポロジを書く(scenario は自己完結の
# まま=別キャンペーンで再利用可)。file I/O + 地図参照ゆえ harness の責務(gm_core は純粋の
# まま不変)。発火 GoalId が辺を選び、次モジュールを load + transition する駆動を harness が握る。
CampaignFile:                       # campaigns/*.yaml の凍結スキーマ
  title: String?                    # 表示用 (任意)
  start: ModuleId                   # 開始モジュール id
  modules: { ModuleId: String }     # id → scenario file path (repo root 相対)
  edges: [CampaignEdge]             # (from, on_goal) → to の分岐表。authored 順
CampaignEdge:
  from:    "ModuleId。現モジュール"
  on_goal: "GoalId。reached() が返したエンディング id"
  to:      "ModuleId。遷移先モジュール"
Advance:                            # advance_campaign の戻り (遷移が起きた時)
  module_id: "ModuleId。遷移先の id"
  scenario:  "Scenario。次モジュールの骨格 (load + inject_cast + validate 済)"
  state:     "GameState。transition(prev_state, prev_scenario) で状態を糸通しした次状態"
Orchestration:                      # harness 層の駆動 (gm_core 無改修)
  next:        "Campaign::next(from, goal)->Option<&ModuleId>。authored 順で最初に一致した辺の to。純粋参照"
  load_module: "load_module(campaign, root, id)->Scenario。module path を read + inject_cast + validate"
  advance:     "advance_campaign(campaign, root, current_module, scenario, state)->Option<Advance>。reached()=None(未到達) or 辺無し(終端エンディング)なら None、辺が在れば次モジュールを load して transition した Advance を返す。LLM 非依存(駆動は state と地図だけで決まる)"

Campaign:
  self_contained_file: "語り部 = 自己完結 file の純粋実行器。1 file = {scenario 骨格 + GameState + RngState}。GameState/RngState は既に Serialize 派生(save-state 化が型レベルで可能・出目まで再現)。生きた可変コピーが2つ無い → split-brain が構造的に不可能。ホストは『次の骨格を渡す+演出』だけに縮み、HP の対抗コピーを持たない"
  transition: "✅実装(PoC-2a): Scenario::transition(prev_state, prev_scenario)->GameState。self=遷移先骨格。持ち越す=数値(entities)/所持品/能力/RNGストリーム/累積turn/世界フラグ(prev_scenario.global_flags 宣言分)。捨てる=局所フラグ/fired。location は self.start にリセット。次モジュールの新規宣言(entity/stat/skill)は初期化、既存値は持ち越しが上書き。initial_state の双対(あちら初期化/こちら持ち越し)。帰結は全て engine が運ぶ=生成器/LLM は値を持てない(シーン跨ぎでも不変条件維持)"
  flag_persistence: "フラグの持続性は per-flag の authored 属性(捨てる / 世界に持つ / その場所に持つ)。global vs 局所の二値でハードコードすると再訪で詰む(『宝箱はもう開けた』は局所だが捨てられない = 復活すると矛盾する GM)。密室脱出は一方向で戻りが無いので二値で済んでいた = フィールドが暴く穴"
  named_goals: "✅実装(PoC-2b): goal: Option<Gate>(単一・後方互換) + goals: [GoalDef{id,when}](名前付き・authored 順)。reached(state)->Option<GoalId> = goals 非空なら最初の一致 id、空なら単一 goal を DEFAULT_GOAL で評価。is_goal=reached().is_some()(既存不変)。条件付き勝利は合成 Gate でも書けるが、どのエンディングかを知るには named goals が要る"
  branch: "発火した GoalId が次モジュールの分岐セレクタ(A エンド→森, B エンド→地下、どちらも global 状態は持ち越し)。単一 goal では出ない枝 = 自由度の出所"
  memoria_scale: "フィールド規模で初めて Memoria が働く(密室は小さすぎた)。NPC/伏線/土地 lore が積もる = 大規模 lore の on-demand recall(memoria_bridge の固有価値, #22)が効く高度"
  landing_order: "最小着地順: transition(状態の器・per-flag 持続性込み) → reached()(分岐の出口)。依存的に transition が先(状態の器)、reached() が後(分岐の出口)。PoC = 『状態を持ったまま骨格 swap → HP/所持品/好感度が保たれる』を Red→Green"
  poc1_done: "✅fumble-as-trigger 前半 (2026-06-24): AttemptChallenge(authored challenge を LLM が選ぶだけ) → 大失敗(natural min)→ engine が帰結 flag 直書き → 既存 trigger 発火 → goal。scenarios/fumble_check.yaml + gm_core 47/47。spine `Check→tier(宣言済)→trigger` が実体化"
  poc2a_done: "✅transition (2026-06-24): 状態持ち越し swap を実装。村→森で hp(減った値)/所持品/能力/alice 好感度/世界フラグ(met_alice)が持ち越され、局所フラグ(door_open)は捨てられ、location は次の start にリセット、新規 stat(stamina)は初期化を実証(transition_carries_state_drops_local_flags)。global_flags の参照整合も validate に追加"
  poc2b_done: "✅reached / 名前付き goal (2026-06-24): goal→Option + goals 追加(後方互換)。大失敗→fumble_drawer→trigger→drawer_jammed→reached()=='jammed_ending'(opened_ending でなく)を実証(reached_selects_named_goal_from_fumble_branch)。spine 全長 `Check→tier→trigger→goal(reached)→[transition の分岐セレクタ]` が gm_core 内で閉じた"
  poc2c_orchestration: "reached()→transition の結線(harness 層, gm_core 無改修)。独立 Campaign file(campaigns/*.yaml)に {start, modules:{id→path}, edges:[{from,on_goal,to}]} を authored 凍結。advance_campaign が『goal 到達→発火 GoalId で辺を引く→次モジュール load→transition→次状態』を駆動。CLI play が campaign 指定で複数モジュールを通す。PoC: study(大失敗→jammed_ending)→cellar へ state 持ち越し遷移を Red→Green。per-flag 持続性(flag_persistence の宝箱問題)は本結線のスコープ外(既存 transition の二値モデルのまま)"
  rejected_check_tiers_on_op: "却下した代替: tier/flag を Check op に畳む案。Check は LLM 提案 op なので op に tier を乗せると LLM が帰結(fumble→flag)を author できる=#23/#24 の穴。tier/flag は Scenario.challenges(authored)に置き、AttemptChallenge は challenge 名の参照のみ(LLM は選ぶだけ)。閉世界の三例目"
  rejected: "LLM シナリオ/フラグ生成・validate_scenario・二エンジン同期・オーサリング editor は棄却(2026-06-24 設計対話で収束)。将来リプレイ性で生成を入れる時も、生成部は load-bearing な gate の外側(goal を gate しない flavor のみ)に閉じ込め、骨格は authored のまま"

# --- まだ繋がない脚 ----------------------------------------------------------
deferred:
  memoria_neural: "LoreStore の bigram TF-IDF cosine を**神経 embedding** に格上げ (同 Memoria trait 裏で差し替え)。usage-over-extension: TF-IDF cosine が不足と接地できてから。語彙の表層に依らない真の意味近傍が要る時のみ。recall→prompt 注入・bigram cosine は ✅実装済"
