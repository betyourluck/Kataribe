# =============================================================================
# Kataribe data_contract  v0.1  (Phase 0: 名詞の凍結)
#
# 設計の全体重を支える「名詞」。コードの前にこれを凍結する (Gemini Forge 第2掟)。
# 三権分立: LLMは提案し、エンジンが裁き、Memoriaが覚え、シナリオが縛る。
# 本 contract が定義するのは「エンジン=正本」と「シナリオ=拘束」の境界。
# =============================================================================

# --- 正本 (Rust gm_core が所有する唯一の真実) -------------------------------
GameState:
  location: LocationId          # 現在地。Move は Scenario の exit がある時のみ変わる
  inventory: { EntityId: [ItemId] }  # キャラ別の所持物 (閉世界)。player は世界から拾い(AddItem)、NPC へ渡せる(GiveItem)
  flags: { FlagKey: bool }      # 許可フラグのみ。SetFlag(true) は flag_rules の gate 達成時のみ
  entities: { EntityId: { StatKey: i64 } }  # キャラ別の数値の真実。算術はエンジン、LLMは値を持てない。"player" は主人公
  rng: { seed: u64, cursor: u64 }  # ダイスは決定論・監査可能。LLMは結果を持たない
  rng_reset: "**シードのリセット** (2026-07-22)。`GameState::reseed(seed)` が rng を {seed, cursor:0} へ差し替える。**プレイヤーの meta 操作**であって LLM も authored トリガーも触れない (op も Gate も無い = 語りの内側から運命を振り直す経路は存在しない。save/load と同じ層)。動機: セーブ地点からやり直しても出目が同じで別の筋を見られない (決定論の裏返し)。**基本はゲーム開始時のシードのまま**で、ロードでも元のシードが残る (現状不変) — リセットを押した後にセーブされた時だけ新しいシードが書かれる。派生ストリームのうち投票の同数抽選 (VOTE_RNG) は eval 時に state.rng.seed から派生するのでリセットが波及するが、配役 (ROLE_RNG) は initial_state 時のみなので不変 (途中で役職が変わらないのが正しい)。cursor を 0 に戻すのは、同じ seed 内で位置だけずらすと『前回の続きの出目』になり得て『別の筋』にならないため"
  turn: u32                     # 受理されたデルタ数。却下では進まない
  fired: [TriggerId]            # 発火済みトリガー集合 (Phase C)。edge-triggered once の latch。セーブ対象
  skills: { EntityId: [SkillId] }  # キャラ別の獲得済み能力 (閉世界)。初期=宣言集合、開花は authored トリガーのみ
  attributes: { EntityId: { AttrKey: string } }  # キャラ別の文字列属性(クラス/職業/種族 等。第4の可変状態)。初期=宣言集合、書き換えは authored トリガーの set_attribute のみ(LLM 却下)。未宣言キーは load 時 validate で弾く。値は authored 自由文字列。セーブ対象
  present_overrides: { EntityId: bool }  # 画面上の登場/退場のオーバーライド(第5の可変状態, spec 04)。true=強制登場/false=強制退場。Location.present に重ねて実効 presence を決める。書き換えは authored トリガーの set_presence のみ(LLM 却下)。transition で持ち越し(仲間が同行)。セーブ対象

# --- LLM が毎ターン返す構造化出力 (これ以外の形を出せない) -------------------
StateDelta:
  narration: string             # 情景/NPC台詞。検証しない (LLMの領分)
  summary: string               # このターンの経緯 1 行 (非検証・省略可)。harness が経緯ログ (chronicle) に蓄積し「これまでの経緯」として以後の prompt に還流 = GM の中期記憶 (2026-07-02)
  ops: [StateOp]                # 構造化された状態変更要求。エンジンが全件検証

StateOp:                        # 内部タグ "op" 付き列挙
  - { op: add_item,     item: ItemId }   # player が現在地から拾う (世界→player)
  - { op: remove_item,  item: ItemId }   # player が手放す
  - { op: give_item,    from: EntityId, to: EntityId, item: ItemId }  # 譲渡。from が所持してなければ却下=ネックレス遮断。from 既定 player
  - { op: set_flag,     key: FlagKey, value: bool }
  - { op: move,         to: LocationId }
  - { op: request_roll, sides: u32, dc: u32 }   # 生のダイス。結果は書かない。エンジンが振って裁く
  - { op: check, entity: EntityId, stat: StatKey, sides: u32, dc: u32 }  # 技能判定。engine が 1d{sides}+stat修正 vs dc を裁定。stat 未宣言→却下。結果(CheckOutcome)は次ターンの語りに還流。**count は無い=即興は常に 1 個のダイス** (合計ダイス 3d6 等は authored challenge の専権。sides:18 での代用は一様分布に化けるが様式は整合性でないので engine は却下しない → GM_SYSTEM が「即興は 1 個・合計が要るなら attempt_challenge・d100 は 1d100」を接地, 2026-07-23)
  - { op: check_under, entity: EntityId, key: StatKey }  # d100 ロールアンダー即興判定 (spec 16)。engine が 1d100 を振り目標値=stat 現在値、roll<=目標値で成功。成功度 degree (critical=01 常成功/extreme<=値/5/hard<=値/2/regular/failure/fumble=目標値<50 なら 96-100・>=50 なら 100 のみ。判定順 critical 先勝ち・整数除算) も engine が決定論計算。帰結は持たない (成否+degree の surface のみ)。stat 未宣言→却下 (UnknownStat)。check_style=percentile の盤面で schema 露出 (additive では check と入替)
  - { op: attempt_challenge, entity: EntityId, challenge: ChallengeId }  # authored challenge への挑戦。LLM は challenge を「選ぶ」だけ(stat/sides/dc/tier/帰結flag は Scenario.challenges 側=author の専権)。大失敗/大成功(natural)で engine が帰結フラグを直書き→trigger 発火。未宣言 challenge→却下。fumble-as-trigger の核 (PoC-1)。resolution: percentile なら d100 ロールアンダー + degree 別帰結 (spec 16)
  # --- 数値ステータス: LLM は「意図」だけ提案、算術はエンジンが実行 (四則演算) ---
  # entity 省略時は "player"。clamp 境界は CharacterDef.stats の StatDecl(min/max)。
  - { op: adjust_stat,  entity: EntityId, key: StatKey, delta: i64 }          # 加減 (+/-): clamp(current + delta)
  - { op: scale_stat,   entity: EntityId, key: StatKey, num: i64, den: i64 }  # 乗除 (×/÷): clamp(current * num / den)。den=0 却下
  # --- 能力の付与 / 属性の書き換え: authored トリガーの専権。LLM が提案すると却下 (メアリー・スー遮断) ---
  - { op: grant_skill,  entity: EntityId, skill: SkillId }   # スキル開花。validate_ops は常に却下、apply_ops(trigger effects)のみ実行
  - { op: set_attribute, entity: EntityId, key: AttrKey, value: string }  # 文字列属性の書き換え(クラス転職 等)。validate_ops は常に却下(クラス捏造遮断)、apply_ops(trigger effects)のみ実行。未宣言キーは load 時 validate で弾く
  - { op: record_turn,  entity: EntityId, key: StatKey }  # 現在ターンを stat に刻む(タイムスタンプ)。validate_ops は常に却下(タイマー詐称遮断)、apply_ops(trigger effects)のみ実行。生値で書く(clamp なし)。Gate::turns_since と対で遅延イベント
  - { op: set_presence, entity: EntityId, present: bool }  # 画面上の登場(true)/退場(false)。validate_ops は常に却下(キャラ勝手登場の捏造遮断)、apply_ops(trigger effects)のみ実行。GameState.present_overrides に書き transition で持ち越す(spec 04)
  - { op: roll_stat, entity: EntityId, key: StatKey, count: u32, sides: u32, bonus: i64, negate: bool }  # 可変量ダイス (spec 16)。engine が count×d(sides)+bonus を振り negate に応じて ± を stat へ clamp 適用 (SAN 1d6 減少・1d8 ダメージ)。validate_ops は常に却下 (StatRollNotAllowed=ダメージ量捏造遮断、AUTHORED_ONLY_OPS 第6例)、apply_ops(trigger/challenge effects)のみ実行。出目は rolls に surface (「SAN -4 (1d6=4)」)。本流 RNG・apply 時確定 (帰結非射影は spec 09 準拠)。count/sides=0 は load 時 RollStatShapeInvalid

# --- 裁定の不変条件 (engine::adjudicate / apply が守る掟) --------------------
adjudication:
  purity:     "adjudicate は state を一切変更しない純粋関数"
  atomicity:  "1つでも不正な op があればデルタ全体を却下し、state は無傷"
  sequencing: "**逐次射影裁定 (spec 09, 2026-07-09)**: op は書かれた順に検証され、受理できた**決定論 op** (add/remove/give/set_flag/move/adjust/scale/cast_vote) の効果を射影クローンに仮適用してから次の op を検証する = 裁定は apply のドライラン (受理された delta は必ずそのまま実行可能)。「拾ってから使う」を 1 delta に束ねられる (トークン経済: 1 ターン = フルプロンプト 1 往復)。**ダイス op (roll/check/attempt) は検証のみで帰結を射影しない** (出目は apply 時確定・純粋な裁定は RNG を消費できない) → 判定結果に依存する後続手は次ターン。**例外 (2026-07-12)**: attempt_challenge の効果のうち **on_success/on_failure の両方に共通するもの** (=どの出目でも必ず起きる。多重集合の厳密交差 + 両帰結が同じフラグを立てる場合の set_flag。guaranteed_challenge_effects) は射影する — 全帰結共通なら裁定時に確定扱いしてもドライランの健全性を破らない。順序は提案者の責任 ([組む, 拾う] の順は却下)。適用ロジックは apply_deterministic_op を実 apply と共有 (射影と実適用の乖離を構造的に防ぐ)"
  pacing:     "**authoring 指針**: 逐次射影により、各手が順に合法なら複数ステップが 1 ターンで進む。駆け抜けてほしくない箇所には challenge (ダイス) を置く — **帰結依存の効果 (片側だけ/tier) は射影されない**ので連鎖をターンで割れる。ただし**全帰結に共通する効果は射影される** (日次フラグを全帰結に書けば [挑戦, 帰宅 move] が 1 ターンで畳める / 割りたければ帰結を成功・失敗で変える)。他に turns_since / トリガーの段組みも有効。ペーシングは engine の摩擦でなく authored 設計と prompt 層 (山場規律) の責務"
  add_item:   "現在地 items に無い / 取得gate未達 → Reject (拾得は player のみ)。**既所持は却下でなく受理して no-op** (spec 09-B: 念のための再拾得で delta 全体が落ちる摩擦を除去。ItemAlreadyHeld は撤去。複製穴の守りは taken_items = take:once の再取得却下で不変)"
  remove_item: "player が未所持の物は手放せない → Reject"
  give_item:  "from が item を所持していない → Reject (ItemNotHeld)。to が未知 entity → Reject (UnknownEntity)。= 持っていない物は渡せない (#23 の engine 側バックストップ)"
  set_flag:   "未許可キー / flag_rules の gate 未達 (value=true時) → Reject"
  move:       "現在地から to への exit が無い / exit.gate 未達 → Reject"
  request_roll: "LLMは結果を主張できない (op構造上不可能)。面数<1 → Reject"
  check:      "技能判定。stat 未宣言→Reject(UnknownStat) / 面数<1→Reject。engine が 1d{sides}+stat修正 を振り total>=dc で成否判定。LLMは出目も合計も詐称できない (CheckOutcome を返す)"
  check_under: "d100 ロールアンダー即興判定 (spec 16)。stat 未宣言→Reject(UnknownStat)。engine が 1d100 と degree を決定論計算 (LLM は出目も成功度も持てない)。帰結なし=成否 surface のみ。CheckOutcome{sides:100, roll, total:roll, dc:目標値, degree:Some}"
  roll_stat:  "可変量ダイス (spec 16)。validate_ops は常に Reject(StatRollNotAllowed=ダメージ量の捏造遮断)。apply_ops(trigger/challenge effects) のみ実行 = AUTHORED_ONLY_OPS 第6例。goal 判定は apply 完了後の呼び出し側評価なので「1d6 減少→SAN<=0→発狂 goal」は同一ターンに damage→goal の順で成立"
  attempt_challenge: "未宣言 challenge→Reject(UnknownChallenge=幻チャレンジ遮断) / challenge.stat を挑戦 entity が未宣言→Reject(UnknownStat)。apply 時に engine が authored 定義から 1d{sides}+stat を振り、natural が tier(min/max)該当なら帰結 flag を**直書き**(flag_rules gate 迂回=authored 効果, trigger effects と同型)。tier も flag も LLM 経路に無い=帰結を LLM が持てない (#23/#24 の双対)"
  adjust_stat: "entity が未宣言の stat を持つ → Reject (未宣言の stat は作れない)"
  scale_stat: "未宣言キー → Reject / den=0 (ゼロ除算) → Reject。LLMは /0 でエンジンを壊せない"
  set_attribute: "LLM 提案の set_attribute は**常に却下** (AttributeSetNotAllowed=クラス/種族の捏造遮断、grant_skill と同型)。trigger effects は apply_ops 直行なので書き換え可。属性の閉世界キーは player=initial_attributes / NPC=CharacterDef.attributes で宣言、未宣言キーへの trigger set_attribute は validate で AttributeKeyUndeclared"
  stat_clamp: "clamp は CharacterDef.stats の StatDecl(min 既定 0 / max 既定なし)。entity ごと・stat ごと"
  grant_skill: "LLM 提案の grant_skill は**常に却下** (能力は authored トリガーでのみ開花)。trigger effects は apply_ops 直行なので grant 可。= メアリー・スー(その場で能力開花)の構造遮断"
  reasons:    "Verdict::Reject は構造化 RejectReason 列 (文字列でなくデータ)。ルールはエンジン不変、文面は提示層"
  taboo:      "✅Phase B: CharacterDef.taboos(Gate) が delta 射影後に false→true 真化するなら却下 (check_taboos)。純粋: state の clone に apply_ops 射影して評価。柔らかい性向は profile(語り)"

# --- 却下理由の構造化と多言語 (reason.rs) -----------------------------------
# エンジンは「なぜ却下したか」をデータで返し、文面は提示層が言語ごとに生成する。
# 検証ルール (所持/移動/gate の力学) はエンジンの普遍法則として残し、文字列だけ分離。
RejectReason:                     # 内部タグ "code" 付き列挙 (item_not_here / divide_by_zero 等 12 種)
  localize: "localize(lang) -> String。Lang=Ja|En。新言語は ja()/en() と同型の一手で追加"
  rationale: "テスト頑健化 (文字列一致→variant 一致) + i18n + 将来のトーン差し替えの土台"

# --- シナリオ脊椎 (拘束。scenarios/*.yaml が Scenario として読まれる) --------
Scenario:
  title: string
  start: LocationId
  allowed_flags: [FlagKey]
  global_flags: [FlagKey]           # 世界フラグ (allowed_flags の部分集合)。transition が campaign 横断で持ち越す分。残りは局所=swap で捨てる
  persistent_flags: [FlagKey]       # 場所フラグ (allowed_flags の部分集合, spec 02)。ambient に漏らさず「このモジュール再訪時だけ」復元 (例 chest_opened)。蓄積は harness の CampaignMemory (gm_core は宣言を持つだけ・transition は局所同様に捨て、harness が再注入)
  flag_rules: { FlagKey: Gate }     # 記載なければ Always
  flag_hints: { FlagKey: String }   # 知識フラグのヒント (spec 03)。flag→「立てる条件」の説明文。非検証の語り素材だがキーは allowed_flags 必須。提示層が scenario_brief に opt-in surface し LLM が会話で情報が伝わった瞬間 set_flag できる (弱モデル向け)。flag_rules(守り)と対で使う(ヒント=促し)
  flag_hints_idiom: "定石: 会話で立つ知識 → flag_hints(促し)+flag_rules(守り)。行動・場所に紐づく学び → authored トリガー(when:location_is library→set_flag)。どちらも allowed_flags で閉世界、立った後は gate 強制で知ったフリ不能"
  flag_titles: { FlagKey: String }  # フラグの表示名 (エイリアス、2026-07-03)。id=機械用キー / title=人間向け表示 (goal の title と同思想)。非検証の提示素材だがキーは allowed_flags 必須 (validate FlagTitleUndeclared)。UI フラグ一覧 (title || key) と state_brief の「立っている状態」(id（表示名）形式) が使う
  flag_vocabulary: "使えるフラグの語彙提示 (2026-07-03)。authored_only_flags()=トリガー効果/challenge 帰結 (on_success/on_failure/tier) が書くフラグ (宣言走査で機械判別)。usable_flags()=allowed−専権。scenario_brief が「状態フラグ (set_flag で立てられるのはこれだけ)」として id+title+hint 付きで列挙=幻フラグの発明を断つ (filter_authored_only_ops のフラグ版。専権は見せない=先取り set_flag の誘惑を作らない)。RejectReason::FlagNotAllowed{key, available} も同語彙を運び self-repair が一発修正 (#31 同型)"
  flag_turns: "GameState.flag_turns: {FlagKey: u32} (2026-07-03)。フラグが true に真化したターンを apply 末尾の差分で一括記録 (op/トリガー/challenge 帰結の全経路捕捉)。セーブ対象・transition は生き残ったフラグ分のみ持ち越し。app が chronicle の該当ターン要約と join し FlagView.cause「何をして立ったか」を UI (hover) に出す"
  hidden_flags: [FlagKey]           # プレイヤーには隠すが GM は見る秘密のフラグ (hidden_attributes のフラグ版、2026-07-19 命名整理で旧義を internal_flags に分離)。裏で進む真相・隠し進行など。プレイヤー UI=出さない / state_brief=〔秘匿〕注記付きで GM に見せる (GM_SYSTEM が「明かすな」を刷り込み) / set_flag 語彙節=出さない (GM に casually 立てさせない)。engine 非使用・非検証 = gate/トリガー評価は不変。キーは allowed_flags 必須 (validate HiddenFlagUndeclared)
  internal_flags: [FlagKey]         # GM もプレイヤーも見ない engine 内部の帳簿フラグ (タイマーの armed フラグ x_done 等、2026-07-19。旧 hidden_flags の帳簿用途を分離)。変数として使うフラグを提示層 3 経路 (UI フラグ一覧 / state_brief / 語彙節) が一切出さない。engine 非使用・非検証。キーは allowed_flags 必須 (validate InternalFlagUndeclared)
  use_tts: bool                     # 読み上げ (TTS) を作者が想定しているか (既定 false)。**engine 非使用・非検証の提示層宣言** (hidden_stats と同類 = 正本も prompt も語りも一切変わらない)。true の盤面だけ会話ペインに読み上げ操作 (ON/OFF・スキップ) が出て、**宣言した盤面では読み上げは既定 ON** (ユーザーが切ればその選択を記憶。操作はホバーで隠れるので、ここを既定 OFF にすると作者の宣言が何も起こさない = 二重に隠れる)。意味は「技術的に読めるか」ではなく**作者が音声を想定して書いたか** — narration は常に文字列なので全パッケージが技術的には読める。既定 false の根拠 = 宣言を持たない配布物 (書庫の既刊すべて) を作者の意図どおり無音に置く (facts_policy / spec 18 pushable と同じ保守側の既定)。package.yaml の use_tts から注入もできる (セッション単位ゆえ package 宣言が全モジュールを支配)
  tts_style_idiom: "定石: 音声前提の盤面は **world に会話中心の文体を書く** (欄は増やさない)。use_tts は再生の可否だけを宣言し、**文体は決めない** — TTS の ON/OFF で語りが変わると chronicle/synopsis に残る記録まで再生設定で食い違い、『矛盾しない GM』が破れる。文体は作者がパッケージ固有に決め、TTS はその上の再生手段、と分離する"
  check_style: additive|percentile  # 判定様式スイッチ (spec 16, 既定 additive)。percentile なら LLM の op 語彙 (schema) から加算式 check を除外し check_under を露出 (additive では逆 = 構造的に混ぜさせない)、scenario_brief に「## 判定様式」節を接地。**engine は却下しない** (様式は規約であって整合性ではない — 二層目は整合性の破れにだけ使う)。schema は scenario 依存になるがセッション内安定 = prompt caching 不変
  role_assignment: RoleAssignment?  # 役職のランダム割り当て (spec 06 Phase A, 2026-07-03)
  secret_attributes: [AttrKey]      # ゲーム的秘匿情報の属性キー (spec 06 Phase B, 2026-07-03)。hidden_* (全提示層から隠す帳簿) とは別軸の宛先別可視性: GM=全員分 (state_brief が〔秘匿〕注記付きで surface、演じ分け規律は GM_SYSTEM が刷り込み) / プレイヤー UI=本人分のみ (app state_view が NPC 分を DTO 段階で落とす=ネタバレ衛生) / 登場人物どうし=不可 (prompt 規律)。engine 非解釈 = gate/トリガー評価は不変。キーは initial_attributes / CharacterDef.attributes / role_assignment.key のいずれかで宣言必須 (validate SecretAttributeUndeclared)
  hidden_attributes: [AttrKey]      # 当人にも見えない属性キー (呪い・自覚のない正体等, 2026-07-08)。secret (本人分は見える=人狼の自役職) より一段強い秘匿: プレイヤー UI=本人分ごと落とす (app state_view が全 entity 分を DTO 段階で除外) / GM=全員分 (state_brief が〔秘匿:本人未知〕注記で surface、GM_SYSTEM が「当人にも明かすな・効果は原因を伏せて現象だけ描く」を刷り込み)。engine 非解釈 = gate/トリガー評価は不変。宣言必須は secret と同じ (validate HiddenAttributeUndeclared)

# --- 役職のランダム割り当て (spec 06 Phase A。人狼/グノーシア型の秘匿役職盤面) ----
RoleAssignment:
  key: AttrKey                      # 書き込む属性キー (例: 役職)。この宣言自体が属性キー宣言を兼ねる (値の閉集合 = pool のキー)
  pool: { String: u32 }             # 役職 → 人数。キー順 (BTreeMap) 展開 → Fisher–Yates で決定論 shuffle
  among: [EntityId]                 # 配布先 (player を含められる = グノーシア式)。人数は pool 合計と一致必須
  mechanism: "initial_state(seed) が seed ^ 'ROLE_RNG' の専用ストリーム (role_rng) で shuffle — 本流 state.rng は消費しない (配役の有無でプレイ中のダイス列が変わらない)。同 seed 同配役 = 再現・監査可能。割り当てはエンジン専権 (LLM 関与不可 =「出目は正本」の配役版)。set_attribute は authored 専権のままなので LLM は役職を書き換えられない"
  bookkeeping: "割り当てと同時に自動生成: 各 among entity の stat 生存=1、player に役職別カウンタ 生存{役職}数 = pool 人数。更新は ResolveVote の専権 (Phase C)"
  validate: "RoleAssignmentCountMismatch (pool 合計 ≠ among 人数) / RoleAssignmentUnknownEntity (幻キャラ) / RoleAssignmentDuplicateEntity (重複配布) を load 時に弾く"

# --- 投票と死亡 (spec 06 Phase C。票の意図は LLM・開票と死はエンジン) --------------
Voting:
  vote_rules: "[VoteRule{when: Gate (省略時 Always), voter_attribute: {key, value}? (省略時 = 生存者なら誰でも)}]。CastVote はいずれかの rule に合致したときだけ受理 = **デフォルト拒否** (rule 無し/不合致は却下・将来「観戦者」等を足しても安全)。voter_attribute の幻キーは validate VoteRuleAttributeUndeclared。パラメトリックな主語 (voter) は Gate 本体に入れない = Gate は entity 固定書きの純粋述語のまま"
  cast_vote: "{ op: cast_vote, voter: EntityId (省略時 player), target: EntityId }。LLM 提案可 (票の意図)。検証 = voter/target 既知 (UnknownEntity) + 両者 生存=1 (EntityNotAlive) + vote_rules 合致 (VoteNotAllowed)。apply で GameState.votes (voter→target の BTreeMap = **一人一票を型で保証**・再投票は上書き・集計順決定論・セーブ対象・transition 非持ち越し) に書く"
  resolve_vote: "{ op: resolve_vote }。**authored トリガー専権の効果 op 第5例** (AUTHORED_ONLY_OPS = LLM の schema から除外 + adjudicate が VoteResolveNotAllowed で却下 = 開票結果の捏造遮断)。発火時にエンジンが一箇所で原子適用: ①集計→最多得票 (同数は seed ^ 'VOTE_RNG' ^ turn の専用ストリームで抽選 = 決定論・本流ダイス非消費・ターンで変わる) ②死亡 = 生存=0 (Gate/集計の正本) + present_overrides=false (表示への投影 = presence 接地が死者の発言を防ぐ) ③role_assignment 盤面なら bookkeeping 再計算 (生存{役職}数減算・生存者数減算・各 {役職}優位 = 2×生存{役職}数 − 生存者数) ④票リセット。票が無ければ no-op"
  challenge_effects: "ChallengeOutcome.effects / TierDef.effects: [StateOp] (2026-07-03)。challenge の帰結に機械効果 (adjust_stat/set_attribute/grant_skill 等) を直接書ける — フラグ+トリガーの2点セット不要、同一 apply 内に原子適用。authored 専権 (trigger effects と同じ信頼モデル = LLM は challenge を選ぶだけで帰結を持てない)。通常成否と極 (tier) の effects は併存 (フラグと同じ)。attempt_challenge の入れ子は validate ChallengeEffectRecursive で遮断 (A→A 無限再帰の芽。連鎖は flag→トリガー経由)、set_attribute の幻キーも AttributeKeyUndeclared (trigger 欄=challenge:{id}) で遮断。繰り返す判定の即時ダメージ等は repeatable トリガー+リセット無しで書ける"
  parity_goal: "勝敗 Gate は式を評価しない — {役職}優位 (パリティ差分 stat) を ResolveVote が原子更新し、Gate は単体比較のみ (例: 人狼勝利 = stat_at_least 人狼優位 0 = 人狼が過半)。stat_compare 新 Gate は導入しない (計算はエンジン適用時に閉じる既存境界)"
  initial_stats: { StatKey: i64 }   # "player" の stat 糖衣 (後方互換)。min 0 / max なしで宣言扱い
  hidden_stats: [StatKey]           # プレイヤーには隠すが GM は見る秘密の数値 (2026-07-19 命名整理で旧義を internal_stats に分離)。隠し好感度・裏の腐敗値など。UI 状態パネル/CLI=出さない / state_brief=〔秘匿〕注記付きで GM に見せる (GM_SYSTEM が「明かすな」を刷り込み)。engine 非使用・非検証の提示ヒント。全 entity に効く
  internal_stats: [StatKey]         # GM もプレイヤーも見ない engine 内部の帳簿 stat (タイマー record_turn の刻み・repeatable カウンタ、2026-07-19。旧 hidden_stats の帳簿用途を分離)。提示層 (UI 状態パネル/state_brief/CLI) が skip。engine 非使用・非検証・キーは開集合ゆえ宣言不要。全 entity に効く。x_turn 等を主人公の可視ステータス・GM prompt 双方から外す
  initial_skills: [SkillId]         # "player" の初期スキル糖衣 (閉世界宣言)。NPC は CharacterDef.skills
  initial_inventory: [ItemId]       # "player" の初期所持品。initial_state が seed (場所拾い/譲渡/持ち越し以外の「最初から所持」)。NPC は CharacterDef.inventory
  initial_attributes: { AttrKey: string }  # "player" の初期文字列属性 (クラス/職業/種族 等)。宣言キーが player 属性の閉世界許可集合。NPC は CharacterDef.attributes
  cast: [EntityId]                  # このシナリオに登場する外部キャラの宣言。**空なら外部注入なし** (全シナリオ共有の混入を防ぐ)。harness::inject_cast が characters/{id}.yaml から cast 分だけ注入 (inline 優先)
  characters: { EntityId: CharacterDef }  # 登場人物(player以外)。inline 宣言 + cast 指定の外部 characters/*.yaml 注入
  triggers: [Trigger]               # 反応ビート (Phase C)。when 成立で effects 原子適用 + narration 注入
  challenges: { ChallengeId: ChallengeDef }  # authored challenge (技能判定の素性と帰結)。LLM は AttemptChallenge で選ぶだけ

# --- authored challenge (技能判定の素性と帰結は作者が握る閉世界) ----------------
# fumble-as-trigger の土台。判定の大失敗/大成功(tier)とその帰結フラグを **作者が定義**し、
# LLM は AttemptChallenge で challenge を**選ぶ**だけ(tier/flag を author できない)。
# 出目も tier 判定も帰結フラグの直書きも engine。= 「帰結は engine、LLM は意図だけ」の判定版。
#
# 【authoring 指針: 山場を 1 回の判定で潰させない (2026-06-27, 実プレイ発見)】
# LLM は Check op で自分の裁量でダイスを振り、1 回の成功を「魔王撃破」へ飛躍させうる
# (= あっけない決着)。エンジンは触らず **シナリオの書き方** で防ぐのが無難:
#   (1) 決定的な勝敗 (撃破/クリア) は narration でなく **named goal / flag** に接地する
#       — engine が記録しない決着は起きない (例: slain_ending の when に必須フラグを束ねる)。
#   (2) 大敵の撃破 challenge に `requires`(前提 Gate) を付け、前段ビート (弱体化/転職/儀式) の
#       フラグが揃うまで attempt_challenge を ChallengeLocked で封鎖する = 段組み。
#   (3) 一撃で終わらせず、challenge の on_success フラグ → 次の challenge の requires、と
#       数珠つなぎにして複数ビートを経させる。
# prompt 層も GM_SYSTEM が「態勢では振らない/1 判定を決着へ飛躍させない/ゴール未達は未発生」を刷り込む
# (gm_system_grounds_dice_timing_and_no_one_shot_climax)。二層 (#23 同型: narration の砦は prompt のみ)。
ChallengeDef:
  description: "LLM への提示文 (どんな行動の判定か)。scenario_brief の『## 挑戦』に出して GM に attempt_challenge で選ばせる"
  requires: "Option<Gate>。挑める前提条件。Some で偽なら attempt_challenge を却下(ChallengeLocked)=挑戦の解禁/封鎖。『導師に会うまで秘奥義に挑めない』等。scenario_brief に【前提: ...】で surface。None なら常に挑める"
  modifiers: "[ChallengeMod]。条件付き有利/不利。when(Gate)が真の分だけ bonus を出目合計に加算(合算)。『導師の教えで +5』『傷で −3』等。tier(極)は素の出目で見るので無影響"
  resolution: "additive(既定)|percentile (spec 16)。additive=従来の 1d{sides}+stat>=dc / percentile=1d100 を目標値(stat 現在値+modifiers)以下で成功、degree (critical/extreme/hard/regular/failure/fumble) を engine が計算。フラットフィールド (tier natural と同流儀)"
  stat:   "Option<StatKey>。修正に使う stat (挑戦 entity が宣言済みのこと)。additive では**省略可** — None なら能力に依らない純粋ダイス(修正0=運試し)、Some なら 1d{sides}+stat修正。percentile では**必須** (目標値に使う)"
  sides:  "u32 (serde default 0, spec 16)。additive のダイス面数 (sides:20 = 1d20)。additive で 0 は load 時 ChallengeShapeInvalid (従来の必須性を validate で保証)。percentile では書かない (書くと PercentileChallengeShape)"
  dc:     "u32 (serde default 0, spec 16)。additive の難易度。total(出目+修正)>=dc で成功。percentile では書かない (書くと PercentileChallengeShape)"
  on_success: "Option<ChallengeOutcome>。通常成功の帰結(フラグ+結末ナレーション、任意)。『ダイス→フラグ』を作り when:all で読める。percentile では regular 以上の成功の受け皿 (degree 別スロットが無い時のフォールバック)"
  on_failure: "Option<ChallengeOutcome>。通常失敗の帰結(フラグ+結末ナレーション、任意)。percentile では fumble のフォールバックも兼ねる"
  on_critical: "Option<ChallengeOutcome> (percentile 専用, spec 16)。degree=critical の帰結。フォールバック連鎖: critical は on_critical→on_extreme→on_hard→on_success の順で最初に在るスロットを使う"
  on_extreme: "Option<ChallengeOutcome> (percentile 専用)。degree=extreme の帰結 (extreme は on_extreme→on_hard→on_success)"
  on_hard: "Option<ChallengeOutcome> (percentile 専用)。degree=hard の帰結 (hard は on_hard→on_success)"
  on_fumble: "Option<ChallengeOutcome> (percentile 専用)。degree=fumble の帰結 (fumble は on_fumble→on_failure)"
  tiers:  "{ tier名: TierDef }。極(大失敗/大成功)の定義。on_success/on_failure と併存。tier名は CheckOutcome.tier に surface。**percentile とは併用不可** (TierWithPercentile=二重クリティカルの曖昧さを load 時に弾く。percentile の極は degree スロットで書く)"
ChallengeOutcome:
  flag: "Option<FlagKey>。engine が直書きする帰結フラグ。allowed_flags 宣言必須"
  narration: "authored 結末ナレーション(任意)。CheckOutcome.narration に載り**毎回・同ターン**に出る(非 latch=繰り返す失敗も毎回語れる/フラグ無しでも語れる)。失敗を LLM 任せにせず必ず描きたい時に使う"
  sound: "authored 結末効果音のアセット ID(audios/ 配下・任意, 2026-07-09)。CheckOutcome.sound に載り**毎回・同ターン**に one-shot 再生。engine 非解釈の不透明 string(narration と同列)。tier の sound があれば優先、無ければ通常成否の sound。素の Check は空"
ChallengeMod:
  when:  "Gate(純粋述語)。真ならこの修正が乗る。flag/stat/attribute/skill/all/any どれでも"
  bonus: "i64。additive=出目合計に加える / percentile=**目標値に加える** (「技能値+10 相当」。bonus 正=有利の意味論を両様式で一致させる。原典のボーナス/ペナルティダイスは extra tens die 方式で分布が異なる近似 — 将来対応はここに dice: bonus|penalty を足す, spec 16 決定2)。apply 時に when を評価して合算"
TierDef:
  natural: "Min|Max|AtMost|AtLeast (spec 16 で幅を追加)。発火する自然出目(修正前の素の roll=stat 修正も modifiers も乗る前)の極。**count 個の素の合計で判定** (2026-07-20 の複数ダイス以降): Min=全部 1(roll==count。1d なら 1・3d6 なら 3) / Max=roll==count×sides。sides 相対=die サイズ非依存でリテラル(20等)で端を焼かない。AtMost/AtLeast は兄弟フィールド threshold と組 (roll<=/>=threshold)"
  threshold: "Option<u32>。AtMost/AtLeast の閾値。範囲 1..=count×sides 必須(範囲外・欠落は TierThresholdOutOfRange で load 拒否)。Min/Max では不要。**到達可能帯は count..=count×sides** なので count>=2 で count 未満の AtMost は永久に不発火・count 以下の AtLeast は常時発火 (validate は弾かない=作者側の作法, 2026-07-23)"
  flag:    "任意。該当時に engine が直書きする帰結フラグ。allowed_flags 宣言必須(Scenario::validate が load 時に弾く)。flag 無しの tier は認識だけ(語り用)"
  narration: "任意。該当時の結末ナレーション。CheckOutcome.narration に載り毎回・同ターンに出る(フラグ無しの極でも語れる)"
  sound: "任意。該当時の結末効果音のアセット ID(audios/ 配下, 2026-07-09)。CheckOutcome.sound に載り毎回・同ターンに one-shot 再生(narration と同列の不透明 string)"
ScenarioError:                    # 静的整合性の破れ (load 時検査。apply 中 panic でなく構造化エラー)
  validate: "Scenario::validate()->Vec<ScenarioError>。空なら健全。harness loader が from_yaml 直後に呼ぶ"
  ChallengeFlagUndeclared: "challenge の帰結フラグ(tier / on_success / on_failure)が allowed_flags 未宣言(幻フラグを engine 直書き経路に乗せない)。tier 欄に該当ラベル(tier名/on_success/on_failure)"
  GlobalFlagUndeclared: "global_flags のフラグが allowed_flags 未宣言(幻の世界フラグを持ち越さない)"
  PersistentFlagUndeclared: "persistent_flags のフラグが allowed_flags 未宣言(幻の場所フラグを campaign 記憶に乗せない, spec 02)"
  FlagHintUndeclared: "flag_hints のキーが allowed_flags 未宣言(幻フラグへのヒントを load 時に弾く, spec 03)"
  AttributeKeyUndeclared: "trigger の set_attribute が未宣言の属性キーに書こうとしている(幻属性遮断)。player=initial_attributes / NPC=CharacterDef.attributes で宣言"
  NoGoal: "goal も goals も無い(勝利条件不在=到達不能シナリオ)"

# --- キャラクター定義 (characters/*.yaml、不変の authored 定義 = GameDefinitions 相当) ---
# 数値=正本(エンジン), 設定/背景/性向=語りの素材(→いずれ Memoria), 硬い禁忌=エンジン強制(Phase B)。
CharacterDef:
  name: string                      # 表示名
  profile: string                   # 設定・背景・性格・性向 (柔らかい。語りに供給、可変世界状態は持たない)
  stats: { StatKey: StatDecl }      # このキャラが持つ stat の宣言。initial が entities の初期値
  skills: [SkillId]                 # 宣言された閉じた能力集合 (催眠/予知 等)。初期スキル。未宣言の能力は存在しない
  inventory: [ItemId]               # この NPC の初期所持品。initial_state が seed (閉世界)
  icon: String?                     # 顔アイコンのアセット ID (images/ 配下)。提示層が presence 表示に使う不透明 string (spec 01 Phase 1.5)
  attributes: { AttrKey: string }   # この NPC の初期文字列属性 (クラス/種族 等)。宣言キーが閉世界許可集合。書き換えは trigger set_attribute のみ
  taboos: [Gate]                    # 硬い禁忌。これが true になる delta を却下 (Phase B で強制)

StatDecl:
  initial: i64                      # 初期値
  min: i64                          # 下限 (省略時 0)
  max: i64                          # 上限 (省略時 なし)
  locations: { LocationId: Location }
  goal: Gate?                       # 単一の達成条件 (名前無し・後方互換・任意)。goals を使う時は省略可
  goals: [GoalDef]                  # 名前付き goal(エンディング)の authored 順リスト。非空ならこちら優先

# --- 名前付き goal (PoC-2b。分岐する結末と次モジュールの分岐セレクタ) ----------
# is_goal(state)->bool は reached(state).is_some()。後方互換: goal(単一) はそのまま、
# goals(名前付き) は任意追加。発火 GoalId が次モジュールの transition 分岐セレクタになる。
GoalDef:
  id:   "GoalId。reached() が返す = transition の分岐セレクタ (jammed_ending→地下 等)。機械用ゆえスペース等を避ける"
  when: "Gate。成立でこの結末に到達"
  title: "人間向けの表示名 (authored・非検証の提示素材、省略時空)。目標一覧と到達メッセージが表示 (空なら id へフォールバック)。id=セレクタ / title=表示名 / hint=道しるべ の三層 (2026-07-02)"
  visible: "bool (既定 true)。false なら隠しゴール — 到達するまで提示層が目標一覧に出さない (app state_view が DTO 段階で落とす=ネタバレ衛生、到達で開示され ✓ 付きで現れる)。到達判定 reached/transition 分岐は不変で効く = engine 非解釈の提示層宣言 (hidden_stats と同類) (2026-07-02)"
  hint: "プレイヤー向けの道しるべ (authored・非検証の提示素材、省略時空)。「この goal は何をすればだいたい行けるか」を提示層 (右ペインの目標一覧) が表示。when の条件はネタバレゆえ出さない設計に対し、作者が意図的に開示するヒント (2026-07-02)"
  narration: "到達時に語りへ注入する結末ナレーション (authored・非検証の語り素材)。複数 goal のどれに達したかを提示層が出す文面。空なら結末の語りなし"
Reached:
  reached: "Scenario::reached(state)->Option<GoalId>。goals 非空なら authored 順で最初に成立した id (決定論)、空なら単一 goal を DEFAULT_GOAL='goal' で評価 (後方互換)"
  reached_goal: "Scenario::reached_goal(state)->Option<&GoalDef>。到達した GoalDef(id+narration) を提示層へ渡す richer 版。goals 専用 (単一 goal は GoalDef を持たず None)。app TurnView が goal_id/goal_narration として surface"
  is_goal: "is_goal(state,scenario)=reached().is_some()。既存シナリオ(goal のみ)は不変"

Location:
  title: "string (既定空)。人間向け表示名 (id=機械用セレクタ / title=表示名 の三層思想、GoalDef.title / flag_titles と同類)。提示層 (GUI 現在地) が使う非検証の提示素材、空なら id へフォールバック。GM prompt は従来どおり id (move の宛先=id、description が語りの素材) (2026-07-08)"
  description: string
  image: String?                    # 背景画像のアセット ID (images/ 配下のファイル名)。engine は不解釈の不透明 string。提示層が resolve_asset で背景に (spec 01 Phase 1)
  bgm: String?                      # ループ BGM のアセット ID (audios/ 配下)。engine 不解釈の不透明 string。提示層が <audio loop> で再生 (spec 01 Phase 3)
  present: [EntityId]                # この場に居る NPC の authored 場所ベース。**明示宣言** (2026-07-02 改訂): 空 (未宣言含む) なら誰もいない — 旧「空なら全 characters」は廃止 (無人の場所を作るのに全キャラを set_presence false する羽目になるため)。NPC を出す場所には必ず書く。実効 presence = これ ± GameState.present_overrides (spec 04)。Scenario::present_at(state) が解決し提示層が顔アイコン行に出す
  items: { ItemId: LocationItem }   # 場所のアイテム → 取得条件 + 取得様式 (2026-07-02 拡張)
  exits: [Exit]

# --- 場所アイテムの宣言 (旧形式 Gate 直書きと新形式の untagged 両受け・既存 YAML 無改修) ----
LocationItem:
  legacy: "Gate をそのまま書く旧形式 (= take: once)。{kind: flag_is, ...}"
  def: "{when: Gate (省略時 always), take: TakeMode (省略時 once)} の新形式"
TakeMode:
  once: "既定。一度取ったら場所から無くなる — GameState.taken_items に持ち去りを記録し、手放して戻っても再取得 (複製) は ItemAlreadyTaken で却下 (行商ネックレス #23 の複製穴も塞ぐ)"
  infinite: "何度でも取れる (自販機のジュース等)。取得しても場所に残る (所持中の重複だけ ItemAlreadyHeld で防ぐ)"
  fixed: "備え付け (シャワー/テレビのリモコン等)。取得不可 — ItemFixed の却下理由が『備え付けで持ち運べない (取得せず、その場で使える)』を LLM に説明し self-repair で語り直しへ誘導。scenario_brief も先回りで接地"
  taken_items: "GameState.taken_items: {LocationId: [ItemId]} (セーブ対象)。transition では持ち越さない (LocationId はモジュール内スコープ。campaign 再訪の持続は persistent_flags と同じ問い・必要になったら spec 02 同型で)"

# --- パッケージ同梱アセット (画像/音声) の解決。gm_core は ID を運ぶだけ・解決は harness (spec 01) ---
AssetResolution:
  layout: "packages/<name>/images/ と audios/ に同梱 (zip で配布)。ID は images/ 配下のファイル名"
  resolve_asset: "harness::resolve_asset(root, AssetKind::{Images|Audios}, id)->Option<PathBuf>。ID を ^[A-Za-z0-9._-]{1,64}$ かつ .|.. でないと検証(トラバーサル遮断)し root/{kind}/{id} が実在すれば Some。不正/不在は None(寛容)"
  app_serving: "GameSession.package_root を起点に背景等を絶対パスへ解決し view DTO に載せる(GameView/TurnView.background)。frontend が convertFileSrc で asset:// URL 化(Map メモ化)。Tauri assetProtocol を enable し、new_game で当該パッケージ dir のみ scope.allow_directory(動的・任意パス対応・安全)。CSP は default-src 'self' ipc + img/media に asset: 許可"
  audio: "✅spec 01 Phase 3: Location.bgm(ループ)/ Trigger.sound(発火 SE)を AssetKind::Audios で解決し GameView/TurnView.bgm・BeatView.sound に。frontend は不可視 <audio loop> が store.bgm に追従(同一 URL なら再代入せずループ継続)、SE は playSe で one-shot(受理ターンのみ・ミュート/音量0 で無音)。音量/ミュート UI=設定『サウンド』タブ(localStorage 永続)。allow_directory(root,true) が audios/ を覆い CSP media-src asset: で再生"

Exit:
  to: LocationId
  gate: Gate                        # 記載なければ Always

Gate:                               # 内部タグ "kind" 付き列挙。エンジンが state に対して評価
  - { kind: always }
  - { kind: has_item, entity: EntityId, item: ItemId }   # entity 省略時 player
  - { kind: flag_is, key: FlagKey, value: bool }
  - { kind: location_is, at: LocationId }
  - { kind: stat_at_least, entity: EntityId, key: StatKey, value: i64 }   # 数値下限 (STR>=15 / HP>=1 等)。entity 省略時 player
  - { kind: stat_at_most, entity: EntityId, key: StatKey, value: i64 }    # 数値上限 (stat_at_least の双対)。hp は 0 クランプゆえ hp<=0 で「気絶/死」を goal に書ける。entity 省略時 player
  - { kind: has_skill, entity: EntityId, skill: SkillId }  # 能力条件 (催眠を持つ等)。entity 省略時 player
  - { kind: attribute_is, entity: EntityId, key: AttrKey, value: string }  # 文字列属性条件 (クラス=魔法剣士 等。転職後を縛る)。未設定は空文字扱い。entity 省略時 player
  - { kind: turns_since, entity: EntityId, key: StatKey, turns: u32 }  # 経過ターン条件: 現在turn - 刻まれた stat >= turns。record_turn と対で「〇〇から N ターン後に発火」。未記録(=0)は turn>=turns で誤発火しうるので「〇〇した」flag と all で束ねる。entity 省略時 player
  - { kind: has_voted, entity: EntityId }  # ✅#38 (2026-07-05): entity の票が現在の票箱 (state.votes) に入っている。「プレイヤーが投票したら開票」のイベント駆動 — resolve_vote が票をリセットするので開票後に自然と偽へ戻り repeatable トリガーが再武装。turns_since と any で束ねれば「票が入るか N ターンで強制開票」。entity 省略時 player
  - { kind: all, of: [Gate] }
  - { kind: any, of: [Gate] }

# --- LLM ナレーター脚 (crate llm_client。提案はするが裁定はしない) ------------
# 三権分立の「LLM=提案」。OpenAI 互換 chat/completions を base_url+api_key で抽象化し、
# tool-use 強制で StateDelta を構造化出力させる。正本 (gm_core) は LLM 非依存のまま。
LlmClient:
  wire:        "OpenAI 互換 POST {base_url}/chat/completions + Bearer api_key (provider=openai_compat)。全リクエストに x-grok-conv-id: {conv_id} を送る (xAI のキャッシュはサーバ単位 → sticky routing しないと自動キャッシュが実質無効 #45。他サーバは未知ヘッダとして無視)。応答 usage.prompt_tokens_details.cached_tokens をパースし LLM_CACHE_DEBUG=1 で surface"
  wire_native: "Anthropic ネイティブ POST {base_url}/messages + x-api-key + anthropic-version (provider=anthropic)。OpenAI 互換層は prompt caching 非対応 (公式 docs 明記) のため、api.anthropic.com へは既定でこちらを使う。先頭 system 群を system ブロック配列に写し、**末尾ブロックに cache_control: ephemeral を 1 個** (render 順 tools→system ゆえ emit_delta schema + GM_SYSTEM + scenario_brief の安定プレフィックスが丸ごとキャッシュ対象。可変な user メッセージには置かない)。応答 tool_use ブロックは OpenAI 形の ResponseMessage へ写して parse::extract に合流 (抽出経路は単一)。検証は usage.cache_read_input_tokens > 0 (LLM_CACHE_DEBUG=1 で stderr に surface)"
  structured:  "単一ツール emit_delta を tool_choice で強制 → arguments(JSON文字列) を StateDelta に再パース"
  fallback:    "tool_calls 不在時は content のフェンス JSON を strip して再パース (tool_choice 非尊重サーバの保険)"
  schema:      "emit_delta の parameters は schemars が gm_core::StateDelta から機械生成 (規格=実装の単一真実源・手書き禁止)。state_delta_schema が2段後処理: ①inline_schema_defs で $ref/definitions/$schema を inline・除去し自己完結化 (Grok 等 grammar コンパイラ対応) ②filter_authored_only_ops で gm_core::AUTHORED_ONLY_OPS (grant_skill/set_attribute/record_turn/set_presence) を ops の oneOf から除外 = LLM にそもそも提案させない (露出すると却下→再生成ループで詰まる、特に constrained decoding な Grok。authored 専権 op は trigger 効果でのみ実行)"
  retry:       "一過性エラー (HTTP障害 / 429 / 5xx) のみ指数backoff、最大 LLM_MAX_RETRIES 回"
  parse_error: "JSON パース失敗は raw を保持した LlmError::Parse を返す → 却下→再生成ループ(self_repair同型)が raw を LLM に戻せる"
  boundary:    "llm_client は transport + 構造化出力の保証のみ。messages 構築(GMペルソナ/シナリオ要約/却下理由) と adjudicate は上位(harness)の責務"
  env:         "LLM_BASE_URL / LLM_API_KEY(必須) / LLM_MODEL / LLM_TEMPERATURE / LLM_MAX_TOKENS / LLM_REQUEST_TIMEOUT_SECS / LLM_MAX_RETRIES / LLM_PROVIDER(anthropic|openai、未設定=base_url から自動判定)。.env(gitignore済), 雛形 .env.example"

LlmConfig:                        # 環境変数からの設定 (LocalAI config.py::LLMSettings 相当)
  base_url: string                # 例: https://api.openai.com/v1 / https://api.anthropic.com/v1
  api_key: string                 # 必須。空なら from_env() は Config エラー
  model: string                   # tool-use が堅いものを推奨 (Claude Opus 4.8 / gpt-4o 等)
  temperature: f32                # 既定 0.2。構造化出力時は 0.1 に固定 (決定論寄り)
  max_tokens: u32
  request_timeout: Duration
  max_retries: u32
  provider: enum                  # openai_compat | anthropic。未設定なら base_url に api.anthropic.com を含む時 anthropic (prompt caching の効くネイティブ経路)。anthropic は常に tool-use (use_tools=false は無視)

# --- GM ターンループ (crate harness。三権を 1 ターンに結線) ------------------
# LLM が提案し (llm_client)、エンジンが裁く (gm_core)。LocalAI _self_repair_loop 同型。
GmTurn:
  signature:  "run_turn(proposer, &mut state, scenario, player_action, max_attempts, lang, recalled_lore, recent_checks, recent_narration, history) -> TurnOutcome"
  loop:       "propose → adjudicate → Accept なら apply(原子適用) / Reject なら reasons を messages に積んで再生成、max_attempts まで"
  outcome:    "Accepted{narration, summary, rolls, fired, checks, attempts, rejected} | Rejected{last_reasons, attempts}。Rejected 時 state は無傷"
  chronicle:  "経緯ログ (中期記憶, 2026-07-02)。TurnLog{turn, player, summary} を呼び出し側 (CLI/app) が chronicle_entry(turn, player, summary, narration, beats) で蓄積 (summary 空なら narration 冒頭 80 字へ fallback = 弱モデル対応) し、run_turn の history に渡す → prompt::history_note が『これまでの経緯 (古い順・確定した記録)』として注入 (文字予算 2400・新しい方優先・溢れは省略明示)。GM_SYSTEM が summary の記述義務を刷り込む。state=事実の現在値 / recent_narration=直前 1 ターン / chronicle=数ターン前の経過、の三層で「経過を忘れる GM」を塞ぐ。campaign 遷移では捨てず章替わりマーカーを刻む (跨いで覚える)。語り素材であって正本状態ではない (可変世界状態は持たない)"
  beat_feedback: "発火ビートの GM 還流 (2026-07-03)。トリガーの authored narration はプレイヤーに表示されるが GM は見ていない (発火は提案後に engine 側で起きる) → ①carryover_narration(narration, beats) が『（直後に筋書きの出来事が起きた）』としてビートを継続文脈 (recent_narration) に連結、②chronicle_entry の beats が summary に『／出来事: …』を併記 (中期記憶)。GM が筋書きの出来事と噛み合った語りを続けられる (#27 のトリガー版、prompt 層のみ・engine 不変)"
  check_feedback: "技能判定の結果(CheckOutcome)は同一ターンの narration に間に合わない(出目は apply 後)。bin は recent_checks に持ち越し、次ターンの prompt に『直前の判定結果』として注入 → GM が結果に沿って語る(memoria_bridge と同じ還流パターン)。CheckOutcome{entity,stat,sides,roll,modifier,total,dc,success,tier}。tier=authored challenge の極名(crit_fail 等)、素の check は None"
  inversion:  "ループは DeltaProposer trait に対して書く。本番=LlmClient, テスト=ScriptedProposer。却下→再生成を実APIなしで決定論検証"
  messages:   "毎ターン state から新規構築 (GM persona + scenario_brief + state_brief + player_action)。state が唯一の真実なので履歴に古い状態を溜めない"
  feedback:   "却下時は LLM の提案(JSON)を assistant 発話、却下理由+修正指示を user 発話として積む (self_repair の核)"
  prompt:     "scenario_brief は gate を平易な日本語化して提示 (嘘を減らし再生成回数を下げる補助。最終裁定は正本)"
  recall_inject: "✅memoria_bridge 輪の閉じ: recalled_lore (前ターン発火の伏線) を recalled_lore_note で prompt に注入 → ナレーターが『いま思い出された記憶』として語りに織り込む。状態変更でない旨を明示し ops に書かせない (境界を prompt 層でも維持)。bin は pending_lore を 1 ターン持ち越す"
  boundary:   "harness は messages 構築 + 裁定結線のみ。実 LLM 結線 (LlmClient::propose) はネットワーク経路でテスト外、実クラウド通しプレイで検証"

DeltaProposer:                    # 提案者の抽象 (依存性逆転の境界)
  propose: "async fn propose(&self, messages: &[ChatMessage]) -> Result<StateDelta, HarnessError>"

GmPlay:                           # 実クラウド通しプレイ CLI (harness bin "play")
  wiring:  "LlmClient を DeltaProposer として run_turn に配線。stdin から行動、scenarios/*.yaml ロード"
  status:  "✅ 通しプレイ + 敵対プレイ成功 (2026-06-23, claude-opus-4-8 @ Anthropic 互換)"
  proven_happy:    "正規筋で goal 到達 (turn4, 4/4 一発合格)。構造化出力継続 / schemars schema 受理 / 段階裁定 (flag→item→unlock→move)"
  proven_adversarial: "prompt層=gate を読み不可能行動を自ら拒否 / engine層=原子性違反デルタを却下→理由還流→合法部分手に修正 (attempts=2)。再生成のプレーン echo が実API で通る (#15 実証)"
  next:    "Memoria 脚接続 (伏線/性格のみ) → UI 殻。UI 時 narration の literal \\n 正規化 (#16)"

# --- 閉世界 capability: メアリー・スー遮断の統一原理 -------------------------
# capability (数値/所持物/能力) は正本に**宣言**された閉じた集合。未宣言は存在せず、
# 宣言・ゲートの外側から呼び出せない。「思い出したように能力が開花する」メアリー・スーは
# 閉世界の破れ。正規の獲得経路のみ許す: 数値=adjust/scale op / 所持物=取得gate(give op は次) /
# 能力=authored トリガーの grant_skill 効果 (LLM の grant_skill は却下)。**開花は許される、
# ただし作者が書いた gated トリガーとしてのみ** (禁忌/トリガーの双対がここでも効く)。
# 二層: engine 層=未宣言参照の op を却下 (stat と同型) / prompt 層=narration の捏造を接地
# (narration は engine 非検証なので prompt が唯一の防衛線, failures #23/#24)。
Capability:
  closed_world: "宣言された capability だけが存在する。未宣言の stat/skill を参照する op は却下"
  skill_decl:  "CharacterDef.skills (NPC) / Scenario.initial_skills (player) = 初期の閉じた能力集合"
  skill_state: "GameState.skills{entity:[SkillId]} = 現在の獲得済み能力。初期=宣言集合"
  skill_gate:  "Gate::HasSkill{entity,skill} で能力を op/移動/取得/trigger の前提条件にできる"
  awakening:   "新能力の開花は Trigger.effects の grant_skill のみ (authored・gated)。LLM 提案の grant_skill は RejectReason::SkillGrantNotAllowed で却下"
  narration:   "「宣言済み能力しか使えない/勝手に開花しない/未宣言の力は存在しない」を GM_SYSTEM で接地。state_brief が各 entity の現在スキルを提示"

# --- 登場/退場 (presence の可変化, spec 04) ---------------------------------
Presence:
  base:        "Location.present = authored の場所ベース (**明示宣言**・2026-07-02 改訂: 空/未宣言なら誰もいない。旧『空なら全 characters』は廃止 — 無人の場所に全キャラ set_presence false が要る逆転を断つ)。これは静的"
  override:    "GameState.present_overrides{EntityId:bool} = 可変オーバーライド (true=強制登場/false=強制退場)。第5の可変状態・セーブ対象"
  effective:   "Scenario::present_at(state) = 場所ベース ± override、既知 characters に retain (純粋関数)。app present_characters がこれを使い主人公を先頭に解決"
  control:     "登場/退場は Trigger.effects の set_presence のみ (authored 専権)。LLM 提案の set_presence は RejectReason::PresenceSetNotAllowed で却下 (grant_skill 同型・第4例)"
  carry:       "transition が present_overrides を持ち越す (登場させた仲間が次の画面に同行)。未注入キャラへの force-present は present_at の retain でそのモジュールでは黙って落ち、override は state に残り次のモジュールで現れる"

# --- 反応機構: 禁忌(Phase B) と トリガー(Phase C) は双対 ---------------------
# 両者とも「delta 適用後に Gate を評価する」同じ機構を使う。Phase B が機構を作り、
# Phase C が再利用する。禁忌=Gate 真化を却下(負)、トリガー=Gate 真化で発火(正)。
Taboo:                            # ✅Phase B (CharacterDef.taboos): 硬い禁忌 (実装済)
  semantics: "delta 適用後に taboo(Gate) が false→true 真化するなら却下。キャラが自分の禁忌を破れない"
  mechanism: "check_taboos: state の clone に apply_ops で射影し edge(false→true)判定。Trigger と同機構"
Trigger:                          # ✅Phase C (Scenario.triggers): エンジンが保証する反応ビート (実装済)
  id: TriggerId                   # シナリオ内で一意。発火済み追跡のキー
  when: Gate                      # 発火条件 (好感度>=30 等)
  effects: "[StateOp] 機械的効果 (フラグ・stat・解放) をエンジンが原子適用。authored=信頼済で validate しない (LLM提案でない)"
  narration: "語りの指示。FiredTrigger として apply の戻り (ApplyOutcome.fired) に載り、harness が Accepted で注入"
  once: "(既定) edge-triggered once。非 repeatable は GameState.fired: Set<TriggerId> で latch (セーブ対象)。when が真のままでも再発火しない"
  repeatable: "bool(既定 false)。true=永続 latch しない → when 再真化で将来ターン再発火(カウンタ閾値→効果→リセットのループ等)。リセットは authored 効果(scale_stat num:0 でハードリセット / adjust_stat 負で繰り越し)。停止性: settle 内 fired_this_settle で高々1回 → 効果が when を真のまま残しても無限ループしない(複数閾値跨ぎは次ターンへ繰り越す)"
  evaluation: "受理・適用後の実 state で fire_triggers が発火判定。adjudicate(純粋)は発火させない"
  cascade: "効果が別 trigger の when を真化させる連鎖は settle まで回す。停止性は二層: 永続 latch(非 repeatable のみ) + settle 内 once(全 trigger) = 必ず停止, authored 順で決定論"
  mechanism: "fire_triggers: 禁忌(check_taboos)の双対。却下せず発火し、effects を apply_ops で原子適用"
  recall: "✅memoria_bridge: Trigger.recall(cue) を発火時 passthrough → FiredTrigger.recall。harness が Memoria で解決"
  memoria_bridge: "✅実装済: 条件成立→発火(cue 運搬)→harness resolve_recall(Memoria)→伏線を語りに注入"
  image: "String? 発火時のイベント CG アセット ID (images/ 配下)。engine 不解釈の不透明 string → FiredTrigger.image → FiredBeat.image。提示層が resolve_asset で背景に (spec 01 Phase 2)"
  image_mode: "ImageMode?(background|overlay) CG の出し方。既定 background=発火ターンに場所背景を上書き(瞬間=次の受理ターンで場所背景へ復帰、spec 01 #3 改訂)。overlay は予約。省略=None。engine 不使用"
  sound: "String? 発火時の SE アセット ID (audios/ 配下)。engine 不解釈の不透明 string → FiredTrigger.sound → FiredBeat.sound。提示層が one-shot 再生 (spec 01 Phase 3)"

# --- Memoria 脚 (crate harness::memoria。三権分立の「Memoria が覚える」) ------
# 伏線・キャラ性格の recall。**可変世界状態は絶対に持たない** (HP/所持品/フラグ/位置/数値は
# 正本 gm_core の専有)。型で構造保証: MemoryFragment は state フィールドを持てず、recall は &self。
Memoria:                          # ✅memoria_bridge (実装済): recall の抽象 (DeltaProposer と同型の依存性逆転)
  trait:    "recall(cue:&str)->Vec<MemoryFragment>。&self=世界状態を変えない型レベル保証"
  impl:     "✅LoreStore: 文字 bigram TF-IDF の cosine semantic recall。**exact wins (2026-07-09)**: cue が id/tag と完全一致 (score 1.0) したらその完全一致だけを返す (作者の狙いの断言=語彙の似た別フラグメントを 0.08 の cosine ノイズで巻き込まない)。exact が一つも無いときだけ fuzzy (cosine≥閾値) にフォールバックし曖昧 cue でも近い伏線を引く。score 降順・同点 id 昇順で決定論。依存ゼロ・テスト可能。日本語は単語境界が無いので文字 n-gram。神経 embedding 版は同 trait 裏で差し替え可。注: chronicle retrieval (spec 08) が使う scores() は exact-wins でなく生スコア列を返す (二層注入は閾値+タグ増幅で別制御)"
  null_impl: "() は常に空 (recall を使わない経路で &() を渡す)"
  resolve:  "resolve_recall(memoria, &[FiredTrigger])->Vec<FiredBeat>。発火列の cue を解決 (純粋 retrieval)"
  load:     "load_lore(dir): memoria/*.yaml を MemoryFragment 化 (ファイル名=id、load_characters と同型)"
  boundary: "engine は Memoria 非依存・決定論のまま。gm_core は cue を不透明 String として運ぶだけ"

MemoryFragment:                   # 不変の authored lore (memoria/*.yaml)
  id:   "TriggerId 相当の recall 主キー (ファイル名)。exact 一致で最上位 hit。loader が充填"
  tags: "[string] recall の別名キー。exact 一致で最上位 hit。本文と共に bigram cosine の対象"
  text: "語りに注入する伏線/性格の本文。**可変世界状態は書かない** (型に state フィールドが無い)。cosine 検索対象"

FiredBeat:                        # 発火ビート + recall 解決 (FiredTrigger の harness 拡張)
  id: TriggerId
  narration: "authored な静的語り"
  recalled: "[MemoryFragment] cue を Memoria で解決した伏線 (無ければ空)"
  image: "String? イベント CG アセット ID を passthrough (解決は app)。app BeatView が resolve_asset で絶対パス化 → frontend が背景上書き (spec 01 Phase 2)"
  image_mode: "ImageMode? CG の表示モード passthrough (background=瞬間表示・次の受理で場所背景へ復帰 / overlay 予約)。frontend は受理ターンのみ background 更新(却下は保持)"
  sound: "String? 発火 SE アセット ID を passthrough (解決は app)。app BeatView が resolve_asset(Audios) で絶対パス化 → frontend が playSe で one-shot 再生 (spec 01 Phase 3)"

# --- デスクトップ UI (app/src-tauri = Tauri2 backend, app/src = Vue3 frontend) ----
# LocalAI prompt 殻 (Tauri2+Vue3+Vite+Tailwind+Pinia) の足場を移植。chat/project/MCP/SSE は捨て、
# GM プレイ画面を新規。バックエンドは harness::run_turn を Tauri command で叩くだけ (正本は不変)。
# **正本との境界**: GameState/Scenario/LlmClient/LoreStore は backend が tokio::Mutex で保持 (sled の
# ような排他資源でないので State 保持は安全, failures Tauri 罠とは別)。frontend は状態の真実を持たず、
# command が返す view DTO を描画するだけ (CLI bin play と同じ「提示経路」を GUI に置換)。
DesktopUi:
  backend:  "app/src-tauri (Tauri2)。workspace 外の独立 cargo project (重い tauri 依存を core workspace から隔離, LocalAI と同流儀)。harness/gm_core/llm_client を path 依存"
  state:    "GameSession { state: GameState, scenario, lore: LoreStore, client: LlmClient, pending_lore, lang } を Mutex<Option<_>> で manage。new_game で初期化"
  command_new_game: "new_game(scenario_path?) -> GameView。シナリオ+characters+lore をロードし初期 state を作り session に格納、開幕 view を返す"
  command_play_turn: "play_turn(action) -> TurnView。session を lock し run_turn(pending_lore 注入) → 発火 recall を pending_lore に詰め直す → view を返す。CLI ループの GUI 版"
  view_dto: "frontend 用 serde DTO。GameView{title,location,description,state} / TurnView{accepted,narration,rolls,beats,attempts,reasons,state,goal_reached} / StateView{turn,location,inventory,flags,entities,goal_reached} / BeatView{narration,recalled[]} / RollView{sides,dc,result,success}"
  narration_norm: "view 返却前に narration の literal \\n を実改行へ正規化 (#16)。提示層の責務、正本は触らない"
  i18n:     "却下理由は session.lang で localize 済み文字列にして返す (frontend は素の文字列を描画)。KATARIBE_LANG で切替"
  frontend: "✅app/src (Vue3+Pinia)。store game.ts が invoke(new_game/play_turn) を叩き、会話ログ(opening/player/narration/✦beat/┊recalled/rolls/reject/system) + 行動入力 + 状態パネル(turn/所在/所持/フラグ/能力値/goal) を描画。暖炉テーマ(Tailwind)。vue-tsc + vite build green"
  verify:   "✅backend cargo check green (harness 結線が型検査通過) / ✅frontend vue-tsc+vite build green / ✅GUI 実機起動 (npm run tauri dev, WebView2 必須) を user の Windows 機で確認 (2026-06-24)"
  icons:    "現状 app/src-tauri/icons は LocalAI 由来の Tauri デフォルト (プレースホルダ)。配布時に差し替え (npm run tauri icon)"

# --- キャンペーン: 密室脱出からフィールドTRPGへ (2026-06-24 設計収束・未実装) ----
# 単一シナリオ(1 goal + 内部場所グラフ)を、状態を持ち越したまま authored モジュールを
# 繋ぐキャンペーンに一般化する。北極星「忘れない GM」を場所移動に適用。場所グラフは既に
# モジュール内に在る(密室⇄廊下⇄広間) → transition がその辺をモジュール跨ぎに昇格させ
# 状態を糸通しする = フィールドTRPG は同じ場所グラフを一段上の高度で見たもの。
# 原則: チェックポイント(flag/gate/goal/trigger)は authored = エンジンが正本である対象。
# 間は GM が narration で即興。LLM にシナリオ/フラグを生成させる案は棄却(拘束が流動したら
# 一貫性保証が崩れる → validate_scenario も不要)。二エンジン同期(SomniumTextor 等)も棄却
# (正本が2つ = split-brain = 矛盾する GM)。

# --- Package (配布単位。フォルダ1つ = 自己完結シナリオ、ZIP 配布の単位) --------
# packages/<name>/ フォルダが配布・管理・(将来)マーケットの単位。「自己完結 file の純粋実行器」
# 思想を file → フォルダへ広げたもの。フォルダ内に package.yaml(世界をまとめる1ファイル) +
# characters/ + memoria/ + scenarios/ + campaign.yaml(任意) を同梱 → zip→解凍→そのまま動く。
# 注入は harness の責務 (gm_core 無改修): package の player/globals を各モジュールへ射し込む
# (inject_cast と同型)。自己完結 = 参照は全てフォルダ相対、外部参照ゼロ。
PackageManifest:                    # packages/<name>/package.yaml の凍結スキーマ
  title: String                     # 表示名
  description: String?              # 一覧表示用
  author: String?
  version: String?
  engine: String?                   # semver range (将来用、今は不透明 string・検証なし)
  entry: String                     # "campaign.yaml" or "scenarios/xxx.yaml" (フォルダ相対)
  world: String?                    # 世界観 lore = 語りの素材 (非検証、prompt 供給)。可変状態は禁忌(北極星)
  player: PlayerDef?                # 主人公を一度だけ宣言 → harness が各モジュールへ注入 (継承)
  globals: Globals?                 # パッケージ横断の世界フラグ宣言
  facts_policy: FactsPolicy?        # 既成事実(spec 20)のユーザー書き込み権限。宣言があれば全モジュールを支配(セッション単位)。省略時は各 scenario の宣言
  use_tts: bool?                    # 読み上げ (TTS) を作者が想定しているか。宣言があれば全モジュールを支配(セッション単位=再生設定は章を跨いで一貫)。省略時は各 scenario の宣言(既定 false)(既定 locked)
PlayerDef:
  name: String?
  stats: { StatKey: StatInit }      # 主人公の初期数値。素の i64 と境界つき {initial,min,max} の両受け(untagged)。各モジュールの initial_stats へ merge(package が勝つ=分裂防止)
  skills: [SkillId]                 # 主人公の初期スキル。各モジュールの initial_skills へ union
  items: [ItemId]                   # 主人公の初期所持品。各モジュールの initial_inventory へ union → initial_state で seed
  attributes: { AttrKey: string }   # 主人公の初期文字列属性 (クラス/職業/種族 等)。各モジュールの initial_attributes へ merge(package 優先)。宣言キーが player 属性の閉世界許可集合
  profile: String?                  # 主人公の性向 = 語りの素材 (非検証、prompt 供給)
  icon: String?                     # 顔アイコンのアセット ID (images/ 配下)。presence 行の表示用
Globals:
  flags: [FlagKey]                  # 宣言のみ。load 時に各モジュールの allowed_flags(使える) と global_flags(跨いで生きる) の両方へ union
PackageLoad:                        # harness 層の駆動 (gm_core 無改修)
  load_package: "load_package(dir)->LoadedPackage。dir/package.yaml を読み、entry を load+inject_cast+inject_package(player/globals 注入)+validate。package.yaml 不在/entry 不在はエラー(自己完結 = フォルダ内参照の load 時保証)"
  inject_package: "inject_package(&mut Scenario, &PackageManifest)。player.stats を initial_stats へ merge(package 優先=モジュール跨ぎの HP 分裂を防ぐ)、player.skills を initial_skills へ union、player.items を initial_inventory へ union、player.attributes を initial_attributes へ merge(package 優先)、globals.flags を allowed_flags+global_flags へ union。これで「一度宣言→全モジュールで使える&跨いで生きる」が閉世界検査も通る"
  campaign_entry: "✅2026-06-26: load_campaign_package(dir) が entry=campaign.yaml を開始モジュール込みでロード(Orchestration.campaign_package 参照)。GUI で campaign パッケージが playable に。残: engine semver 検証 / persisted asset scope"
  manifest_lints: "✅2026-07-21: manifest_lints(src)->Vec<String> が package.yaml 自身の未知フィールドを名指しする(scenario 側 gm_core::unknown_key_lints の対)。動機は実害 — キー改名(memo_policy→acts_policy→facts_policy)を追えていない配布 manifest を serde が黙殺し既定 locked へ落とす『エラーなく、ただ効かない』罠。gm_core は配布レイアウトを知らない(純粋層)ので汎用部品だけ pub 化し(struct_keys=型から既知キー導出 / unknown_keys=mapping 1 段の検査+編集距離提案)、型を持つ harness が PackageManifest/player/globals の 3 文脈を組む。既知キーは手書きしない規律を維持。非 fatal で load_package・load_campaign_package の warnings に載る(campaign 側は LoadedCampaignPackage.warnings を新設)→ app 開幕 ⚠。残: campaign 各モジュールの scenario 本体 / characters (loader が生テキストを返さない)"

# --- Campaign file (PoC-2c。authored モジュールグラフ = orchestration の正本) ----
# campaigns/<name>.yaml。独立 file にモジュール接続トポロジを書く(scenario は自己完結の
# まま=別キャンペーンで再利用可)。file I/O + 地図参照ゆえ harness の責務(gm_core は純粋の
# まま不変)。発火 GoalId が辺を選び、次モジュールを load + transition する駆動を harness が握る。
CampaignFile:                       # campaigns/*.yaml の凍結スキーマ
  title: String?                    # 表示用 (任意)
  start: ModuleId                   # 開始モジュール id
  modules: { ModuleId: String }     # id → scenario file path (repo root 相対)
  edges: [CampaignEdge]             # (from, on_goal) → to の分岐表。authored 順
CampaignEdge:
  from:    "ModuleId。現モジュール"
  on_goal: "GoalId。reached() が返したエンディング id"
  to:      "ModuleId。遷移先モジュール"
Advance:                            # advance_campaign の戻り (遷移が起きた時)
  module_id: "ModuleId。遷移先の id"
  scenario:  "Scenario。次モジュールの骨格 (load + inject_cast + validate 済)"
  state:     "GameState。transition(prev_state, prev_scenario) で状態を糸通しした次状態"
Orchestration:                      # harness 層の駆動 (gm_core 無改修)
  next:        "Campaign::next(from, goal)->Option<&ModuleId>。authored 順で最初に一致した辺の to。純粋参照"
  load_module: "load_module(campaign, root, id)->Scenario。module path を read + inject_cast + validate。注入版 load_module_injected(.., manifest, ..) は inject_cast の後・validate の前に inject_package を挟む(package の player/globals/world を各モジュールへ継承、注入後に閉世界検査)"
  advance:     "advance_campaign(campaign, root, memory, current_module, scenario, state)->Option<Advance>。reached()=None(未到達) or 辺無し(終端エンディング)なら None、辺が在れば次モジュールを load して transition した Advance を返す。LLM 非依存(駆動は state と地図だけで決まる)。注入版 advance_campaign_injected(.., manifest, memory, ..) は遷移先モジュールにも package を継承させる(campaign パッケージ用)。memory=CampaignMemory(spec 02): 遷移時に遷移元の persistent_flags を harvest し遷移先の記憶を overlay"
  campaign_memory: "CampaignMemory = BTreeMap<ModuleId, BTreeMap<FlagKey, bool>>(spec 02)。場所フラグの蓄積層 = モジュール別にフラグの最新値を覚える。advance が遷移元を harvest_persistent・遷移先を overlay_persistent で糸通し → 『そのモジュール再訪時だけフラグが蘇る』第三の値を gm_core 無改修で実現(namespace は ModuleId で分離)。セッション保持(GameSession.campaign_memory / CLI ループ)。save/load は saves 機構が来たら拡張"
  campaign_package: "✅load_campaign_package(dir)->LoadedCampaignPackage{manifest, campaign, start_module, scenario}。load_package の campaign 版(entry=campaign.yaml を読み開始モジュールを inject 込みで返す)。is_campaign_entry(entry)=entry に 'campaign' を含むか。app new_game がこれで分岐し、play_turn が goal 到達で advance_campaign_injected → TurnView.transition(遷移先 title/location/description)で次モジュールを提示(goal_reached=false で続行、終端は true でクリア)"

Campaign:
  self_contained_file: "語り部 = 自己完結 file の純粋実行器。1 file = {scenario 骨格 + GameState + RngState}。GameState/RngState は既に Serialize 派生(save-state 化が型レベルで可能・出目まで再現)。生きた可変コピーが2つ無い → split-brain が構造的に不可能。ホストは『次の骨格を渡す+演出』だけに縮み、HP の対抗コピーを持たない"
  transition: "✅実装(PoC-2a): Scenario::transition(prev_state, prev_scenario)->GameState。self=遷移先骨格。持ち越す=数値(entities)/所持品/能力/RNGストリーム/累積turn/世界フラグ(prev_scenario.global_flags 宣言分)。捨てる=局所フラグ/fired。location は self.start にリセット。次モジュールの新規宣言(entity/stat/skill)は初期化、既存値は持ち越しが上書き。initial_state の双対(あちら初期化/こちら持ち越し)。帰結は全て engine が運ぶ=生成器/LLM は値を持てない(シーン跨ぎでも不変条件維持)"
  flag_persistence: "✅spec 02 (2026-06-27): フラグの持続性を三値化(捨てる=局所 / 世界に持つ=global_flags / その場所に持つ=persistent_flags)。二値だと再訪で詰む(『宝箱はもう開けた』は局所だが捨てられない = 復活すると矛盾する GM)真因 = transition は遷移元の global_flags だけ運ぶので、フラグが campaign 全体を生き残るには通過する各モジュールが個別に global 宣言要 = 脆い。解 = persistent_flags(モジュール宣言) を harness の CampaignMemory がモジュール別に蓄積し、再訪 advance で overlay 復元(gm_core 無改修・namespace は ModuleId 分離)。PoC: persistent_flag_survives_revisit_local_flag_does_not(village⇄forest 再訪で chest_opened は蘇り torch_lit/forest 局所は漏れない)。スコープ外: モジュール内の単一 location 粒度 / CampaignMemory の save 永続化"
  named_goals: "✅実装(PoC-2b): goal: Option<Gate>(単一・後方互換) + goals: [GoalDef{id,when}](名前付き・authored 順)。reached(state)->Option<GoalId> = goals 非空なら最初の一致 id、空なら単一 goal を DEFAULT_GOAL で評価。is_goal=reached().is_some()(既存不変)。条件付き勝利は合成 Gate でも書けるが、どのエンディングかを知るには named goals が要る"
  branch: "発火した GoalId が次モジュールの分岐セレクタ(A エンド→森, B エンド→地下、どちらも global 状態は持ち越し)。単一 goal では出ない枝 = 自由度の出所"
  memoria_scale: "フィールド規模で初めて Memoria が働く(密室は小さすぎた)。NPC/伏線/土地 lore が積もる = 大規模 lore の on-demand recall(memoria_bridge の固有価値, #22)が効く高度"
  landing_order: "最小着地順: transition(状態の器・per-flag 持続性込み) → reached()(分岐の出口)。依存的に transition が先(状態の器)、reached() が後(分岐の出口)。PoC = 『状態を持ったまま骨格 swap → HP/所持品/好感度が保たれる』を Red→Green"
  poc1_done: "✅fumble-as-trigger 前半 (2026-06-24): AttemptChallenge(authored challenge を LLM が選ぶだけ) → 大失敗(natural min)→ engine が帰結 flag 直書き → 既存 trigger 発火 → goal。scenarios/fumble_check.yaml + gm_core 47/47。spine `Check→tier(宣言済)→trigger` が実体化"
  poc2a_done: "✅transition (2026-06-24): 状態持ち越し swap を実装。村→森で hp(減った値)/所持品/能力/alice 好感度/世界フラグ(met_alice)が持ち越され、局所フラグ(door_open)は捨てられ、location は次の start にリセット、新規 stat(stamina)は初期化を実証(transition_carries_state_drops_local_flags)。global_flags の参照整合も validate に追加"
  poc2b_done: "✅reached / 名前付き goal (2026-06-24): goal→Option + goals 追加(後方互換)。大失敗→fumble_drawer→trigger→drawer_jammed→reached()=='jammed_ending'(opened_ending でなく)を実証(reached_selects_named_goal_from_fumble_branch)。spine 全長 `Check→tier→trigger→goal(reached)→[transition の分岐セレクタ]` が gm_core 内で閉じた"
  poc2c_orchestration: "reached()→transition の結線(harness 層, gm_core 無改修)。独立 Campaign file(campaigns/*.yaml)に {start, modules:{id→path}, edges:[{from,on_goal,to}]} を authored 凍結。advance_campaign が『goal 到達→発火 GoalId で辺を引く→次モジュール load→transition→次状態』を駆動。CLI play が campaign 指定で複数モジュールを通す。PoC: study(大失敗→jammed_ending)→cellar へ state 持ち越し遷移を Red→Green。per-flag 持続性(flag_persistence の宝箱問題)は本結線のスコープ外(既存 transition の二値モデルのまま)"
  rejected_check_tiers_on_op: "却下した代替: tier/flag を Check op に畳む案。Check は LLM 提案 op なので op に tier を乗せると LLM が帰結(fumble→flag)を author できる=#23/#24 の穴。tier/flag は Scenario.challenges(authored)に置き、AttemptChallenge は challenge 名の参照のみ(LLM は選ぶだけ)。閉世界の三例目"
  rejected: "LLM シナリオ/フラグ生成・validate_scenario・二エンジン同期・オーサリング editor は棄却(2026-06-24 設計対話で収束)。将来リプレイ性で生成を入れる時も、生成部は load-bearing な gate の外側(goal を gate しない flavor のみ)に閉じ込め、骨格は authored のまま"

SessionSave:                        # ✅spec 07 Phase A+B (2026-07-04): セーブ/ロードの凍結スキーマ (YAML 1 file)
  version: "u32 = 1 (SAVE_VERSION)。不一致はロード拒否 (v1 は実験的 — 黙って壊れた再開をしない)"
  content: "{kind: package|campaign|scenario, path} — 何を遊んでいたか。骨格は保存しない (再ロード = 単一真実源・content 修正が生きる)。非互換変更の破れは engine の閉世界却下が守る"
  package_version: "記録時の manifest.version。不一致はロード時に警告のみ (typo 修正でセーブを全滅させない)"
  module: "Option<ModuleId> — campaign 中の現在モジュール (単発は null)"
  state: "GameState 丸ごと (rng/turn/fired/votes/flag_turns/taken_items/present_overrides 込み = 出目まで再現)"
  campaign_memory: "spec 02 の persistent フラグ蓄積 (save 永続化の積み残しを本 spec で解決)"
  carryovers: "history(chronicle 全量)/last_narration/pending_checks/pending_lore(fragment 丸ごと=自己完結) — 語りの継続性。state だけでは再開時に『経緯を忘れる GM』に戻る (#27 系の第二チャネル)"
  atomicity: "save_session は tmp→rename の原子的置換 (受理ターン毎上書きで書きかけ file がセーブを壊さない)"
  autosave: "CLI: 受理ターン+遷移が確定したループ先頭で書く (turn 0 は書かない = 起動しただけで既存セーブを潰さない)。--save <path> 既定 kataribe_autosave.yaml、--resume <file> で再開"
  gui: "✅Phase C (2026-07-04, 査読3点ユーザー確定): 置き場=app_data_dir/saves/<パスのFNV-1aハッシュ>.yaml (パッケージ別1 autosave・配布zipと分離)。play_turn 受理+遷移確定後に上書き (却下では書かない・失敗は警告のみ)。list_packages が autosave_turn を返し、選択中パッケージにセーブが在ればヘッダーに「続きから (turn N)」(主ボタン化、新しいゲームは控えめ配色へ)。resume_game が open_package (new_game と共通化、campaign はセーブの module を注入込みで開く) → GameView.resumed {turn, last_narration, warnings} で再開マーカー+前回までの語り+版警告を開幕ログへ。手動スロットは Phase D 送り"
  synopsis: "spec 10: synopsis (あらすじ segment 列) + pending_transition (遷移契機の凍結リトライ範囲) を追加 (serde default = 旧セーブ互換)"
  slots: "✅Phase D (2026-07-16, ユーザー要望=気に入ったシーンを何度もロールプレイ): 手動セーブスロット (GUI)。app_data_dir/saves/<パスのFNV-1a>_slot{1..5}.yaml — autosave と同じ器 SessionSave を別名で書くだけ (形式追加ゼロ・非衝突)。command 3つ: list_save_slots (package_path 省略=プレイ中 session のパッケージ/指定=選択中) / save_slot (session_save_of で autosave と共通スナップショット) / load_slot (restore_session=resume_game と共通、GameSession 丸ごと差し替え)。LLM リセットは構造保証 (messages は毎ターン state/chronicle/synopsis から再構築=持続会話なし)。ロード後の autosave 書き先は常に autosave パス (スロットは凍結点のまま)・ロード時に autosave は書かない (眺めるだけロードで最新進捗を壊さない)。一覧メタ = turn + file mtime + last_narration 冒頭 60 字。delete_autosave がスロットも一括処分 (list_packages.has_slots で確認に含める)"

Synopsis:                           # spec 10 (2026-07-14 rev2 査読確定): あらすじ = GM の長期物語記憶 + ユーザー可視化
  entry: "SynopsisEntry { upto_turn: u32 (この segment が覆う最終ターン。TurnLog.turn と同型), title (章題 = モジュール title or「ターン m〜n」。表示専用・識別/リスト key は upto_turn), text (400 字以内。機械 join も同上限) } — harness 層 (gm_core 無改修)。chronicle と同格の確定した語り素材で **append-only** (一度書いた segment は不変 = 書き直しの複利ドリフトを構造的に断つ)"
  range: "圧縮範囲は **inclusive** [compressed_upto+1, end]。compressed_upto = synopsis.last().upto_turn (無ければ 0、ただし pending_transition が在ればその end を優先 = 凍結範囲の後ろから判定)。次回 start = 前回 upto_turn+1 で必ず接続 (オフバイワン封じ)"
  triggers: "①campaign モジュール遷移 (end = 遷移確定時の最終受理ターン、章題 = 遷移元モジュール title) ②あふれ (未圧縮 20 ターン超 → end = 最終ターン−10 = 直近 10 温存)。短編 (〜20T) は圧縮ゼロ回 = コストゼロ"
  failure: "あふれ契機 = skip して次の受理ターンで再計算 (章を跨がないので範囲再計算可) / 遷移契機 = pending_transition として**範囲凍結・同一リトライ・拡張禁止** (範囲を再計算すると新章のターンが混入し「前章の要約に次章の内容」事故)。どちらも非致命 (プレイは止めない・恒常失敗は現行の予算打ち切りへのグレースフルデグラデーション)"
  grounding: "要約入力 = chronicle の summary 行 + 機械タグ (spec 08-B の engine 事実 = location/present/flags_set/items/checks)。指示 =「記録に無い新事実を発明しない・固有名は記録の表記のまま・解釈や推測を書かない・tail (前章末尾 1〜2 文) は文体の接続のみに参照し事実の出典にしない」(#47 信頼チャネル汚染の防衛)。遷移時 3 ターン未満は LLM を呼ばず機械 join (summary + location/items タグ併記・400 字カット)"
  injection: "prompt::synopsis_note =「# これまでのあらすじ (確定した過去)」を history_note の前に注入。予算 2000 字・新しい章優先・6 章目以降 (目安 60T〜) は最古から「(それ以前の章は省略)」(省略章の個別事実は retrieval が全量 chronicle から補完 = 忘れないは破れない)。user 側 messages ゆえ system キャッシュ不変 (user 側は圧縮ターンに再計算、10〜20T に 1 回で許容)"
  summarizer: "Summarizer trait (DeltaProposer 同型の依存性逆転、PoC は fake)。実装 = LlmClient::generate_text (プレーン生成・tools/schema 無し・no-tools サーバ両対応・タイムアウト 15 秒)。実行 = play_turn 受理後に**同期** (10〜20T に 1 回・数秒。非同期化は Phase 2 で必要なら)"
  env: "要約モデルの別指定 = SUMMARY_LLM_BASE_URL / SUMMARY_LLM_API_KEY / SUMMARY_LLM_MODEL / SUMMARY_LLM_PROVIDER (揃わなければ GM の client 共用 = 受領者ゼロ設定)。**app = app_data/.env が正** (設定タブから書く。localStorage の選択 id は UI 表示用)。**CLI = 引数 > カレント/repo .env > GM fallback、app_data は探さない** (app_data は app 専用の前提を維持)"
  ui: "右ペイン第 3 縦タブ「あらすじ」(Ctrl+3 = 予約済み拡張枠、Ctrl+Tab は 3 枚巡回へ)。内容 = segment 列 (章題+本文・古い順) + 最近の出来事 (未圧縮 tail の T{turn}: {summary} = GM の見る記憶とユーザーの見るものが一致)。DTO = GameView.synopsis 全量 (new_game/resume) / TurnView.new_synopsis 差分 (append-only ゆえ frontend は push のみ)"
  undo_rule: "将来 undo/巻き戻しを入れる場合は upto_turn >= 巻き戻し先ターンの segment を削除 (宙に浮く segment の遮断、先に凍結)"

Epilogue:                           # spec 11 (2026-07-14 rev3 査読確定): goal 到達時の engine 主導の締めくくり語り
  field: "GoalDef.epilogue_prompt: Option<String> (serde default)。authored な**生成指示** (本文ではない — 生成本文は提示層の TurnView.epilogue)。非検証・engine 非解釈の語り素材。None/空白のみ (trim().is_empty()) = エピローグなし。旧形式 goal: Gate への記述は serde 黙殺 + unknown_key_lints が未知キーとして警告"
  timing: "「いつ」= engine (reached_goal())、「何を」= LLM。発火 = 到達 + **終端** (単発 goal / campaign の advance 辺なし)。終端判定は呼び出し側 app/CLI の責務 (地図は harness/app 層の持ち物)。campaign の遷移 goal では発火しない = 遷移時は追加演出なし (v1 設計判断、章の余韻は v2 の epilogue_on_transition 候補)"
  fallback: "narration (結末文) はエピローグの土台 — ①生成失敗時のフォールバック ②結末の意味 (封印/討伐/死) の接地素材 ③宣言と余韻の役割分担。epilogue_prompt あり + narration 空 (trim 基準) は lint EpilogueWithoutNarration (非 fatal、FlagHintOnAuthoredOnly と同じ線引き)"
  generation: "プレーン生成 1 回 (ops/ダイス不要 = Summarizer と同じ線引き)。**GM の client** (SUMMARY_LLM_* は使わない — 見せ場はナレーターの声で)。タイムアウト専用 30 秒。素材 = world/protagonist + goal (id/title/結末文) + synopsis (予算 2000 字) + 未圧縮 chronicle tail (予算 2400 字) + last_narration + 指示 = 通常ターンの注入量と同等 (終端=コンテキスト最大でのタイムアウト率悪化を防ぐ)。失敗は skip して従来表示 (非致命・リトライなし)"
  grounding: "既定規律 =「起きたことは記録のとおりに・これから起きること (後日談) は自由に」。終幕ゆえ以後のターンを汚染しない (#47 経路なし) が、プレイヤーが読む確定文なので記録との矛盾は禁止。後日談の方向づけは authored 指示。目安 600 字・機械カットなし (narration と同じ非検証チャネル)"
  presentation: "表示順 = 結末ナレーション → 到達バナー (🎉) → 「―― エピローグ ――」→ 本文 (**エピローグで幕が下りる** — バナーが余韻をぶった切らない)。会話ログ (frontend LogEntry = テキスト保存対象) にのみ積む。chronicle (TurnLog 正史) と SessionSave には積まない。生成は autosave の**後** (失敗がセーブを巻き込まない。SessionSave に epilogue フィールドは無い = 保存経路に分岐なし)。生成中は epilogue-writing イベント"

UnifiedToolLayer:                   # spec 12 Phase A (2026-07-15): llm_client の canonical + adapter seam (Claude/GPT/Gemini/Grok)
  provider: "Provider = openai_compat | anthropic | gemini(Phase C)。判定 = LLM_PROVIDER 明示 > base_url 自動 (api.anthropic.com → anthropic / generativelanguage.googleapis.com かつ /openai を含まない → gemini / それ以外 → openai_compat)。プロキシ等の判定不能ホストは openai_compat に落ちる (安全側。明示指定を .env.example で誘導)"
  chat_request: "canonical ChatRequest { model, messages: [ChatMessage{role,content}], tools: [ToolSpec{name, description, parameters(JSON Schema, schemars 機械生成の単一真実源)}], tool_choice, temperature: Option (明示時のみ送る), max_tokens } — Driver 相当 (generate/generate_structured) はこれしか組まない。wire への変換は adapter の encode 純関数"
  tool_choice: "ToolChoice = none | auto | required | specific(name)。Kataribe v1 の利用は none (generate) と specific (emit_delta 強制) のみ。写像: OpenAI {type:function,function:{name}} / Claude {type:tool,name} / Gemini functionCallingConfig {mode:ANY, allowedFunctionNames:[name]} (Phase C)"
  chat_response: "canonical ChatResponse { text: Option, tool_calls: [ToolCall{id, name, args: JSON object}], finish: stop|tool_use|length|other, usage: Usage{prompt, completion, cache_read} }。args は必ずオブジェクト (写経元 D2) — OpenAI 系の「arguments は JSON 文字列」は adapter の decode 境界で 1 回だけ parse。finish は empty-response 防御 (Phase D) の判定材料。抽出 (parse::extract) は canonical に対する単一経路"
  adapters: "encode/decode は純関数 (PoC で固める)、HTTP/リトライ/認証は client 核、経路選択は complete() の provider match 一箇所: openai_compat (GPT/Grok/さくら/ローカル互換。no-tools JSON モード #29 と x-grok-conv-id #45 を内包) / anthropic (ネイティブ /messages。cache_control #44 を内包) / gemini (Phase C, generateContent + x-goog-api-key ヘッダ認証)。プロバイダ防御は adapter の外に漏らさない (写経元 D5)"
  env: "LLM_PROVIDER 語彙 = anthropic|native / openai|openai_compat|compat / gemini|google。LLM_EFFORT (Phase B, low|medium|high|xhigh|max, 未設定なら送らない=現行動作・不正値は Config エラー)。既存キー (LLM_BASE_URL/LLM_API_KEY/LLM_MODEL/LLM_TEMPERATURE/LLM_MAX_TOKENS/LLM_USE_TOOLS/LLM_REQUEST_TIMEOUT_SECS/LLM_MAX_RETRIES) 不変"
  effort_dialects: "方言写像 (adapter 内): Claude = thinking{type:adaptive} + output_config{effort} (未設定ならキーごと送らない。max_tokens は思考+本文の合算上限 = combined ゆえ effort 時 16000 以上推奨・警告あり) / Grok = reasoning_effort — **対象モデル grok-4.3/4.5 には既定で送る (opt-out)**: 4.3→none / 4.5→low (未送出だと xAI 既定の思考が max_tokens を食い潰し空デルタ/タイムアウト = 4.3 実測の真因仮説)。LLM_EFFORT 明示は尊重し xhigh/max は high へ丸め。fast 系/他モデルには送らない / Gemini = 未実装 (thinkingConfig は後続)"
  empty_response_defense: "Phase D (判定条件は rev4 Should c で凍結): text 空 ∧ tool_calls 空 ∧ finish==length = 推論モデルが budget を全部思考に使い切った空応答 → EmptyResponse を一過性に昇格し compat リトライループで再抽選。length 以外の空は従来経路 (非リトライ)。適用は OpenAI 互換経路のみ"
  invariants: "資産保全 (回帰不変条件): Anthropic cache_control の leading system 毎配置 (cap 4、spec 14 で末尾 1 個から多段化) / xAI conv_id ヘッダ / CacheStat 一元記録 (complete() で成功 1 回=記録 1 回) / Parse エラーの raw 保持 #34 / CoT 除去 #30 / ops-as-string 救済 #40 / inline_schema_defs + filter_authored_only_ops / temperature None 既定 / 指数 backoff"
  mistral_vision_note: "(スコープ外の凍結, 2026-07-15 査読確定) Mistral vision の正形は {type: image_url, image_url: {url}} の**オブジェクト形**。bare-string は上流 repo 実装の stale — 将来 Mistral 対応時に混同しない"
  gemini_explicit_cache: "spec 13 (2026-07-15): Gemini 明示キャッシュ (cachedContent) で暗黙キャッシュの総プロンプト ~8000 トークン崖 (failures #54) を迂回。静的プレフィックス (systemInstruction + tools) を POST {base}/v1beta/cachedContents で pin し、generateContent は cachedContent: <name> を参照して可変 contents だけ送る (Anthropic cache_control #44 の Gemini 双対)。CacheHandle{name:'cachedContents/<id>', fingerprint:u64} を LlmClient が Mutex<Option> で session 単位保持。CacheAction = Reuse(name) | Create | Bypass。decide_cache_action: 無効 or 静的プレフィックス文字数 < min_chars → Bypass / fingerprint 一致 → Reuse / それ以外 (None・不一致=scenario 変化) → Create。fingerprint = model + 先頭 system + tools の FNV-1a (可変 user 除外)。cache 中身は encode_with_cache(None) の抽出を再利用 = inline と乖離ゼロ。**fallback 徹底**: create 失敗/ゲート未満/無効は full request (turn を落とさない=最適化と正しさの分離)。失効 (Api 403/404) は handle クリア + full 再試行。計測は cachedContentTokenCount 流用 (#44/#45 の CacheStat が改修ゼロで効く)。env = LLM_GEMINI_CACHE(既定 on) / LLM_GEMINI_CACHE_TTL(900s) / LLM_GEMINI_CACHE_MIN_CHARS(4000)。Gemini 以外は無視 (Anthropic は cache_control 済)。live 検証 (Phase D 残): alias の cachedContents 対応・最小トークン閾値・総プロンプト >8000 でヒット"

  input_cache_maximization: "spec 14 (2026-07-16): append-only あらすじの多段キャッシュ + hit rate 観測。**メッセージ構成の凍結**: turn.rs は [system(静的), system(synopsis?), user(可変)] — synopsis (spec 10, append-only=章追加の間 byte 安定) を可変 user から独立した 2 本目の leading system へ分離 (空なら出さない)。**adapter 規約**: Anthropic = 先頭から連続する leading system メッセージ毎に cache_control を 1 個 (API 上限の 4 個まで。1 本は従来同数=回帰なし、章追加ターンは第二段だけ失効し静的段は生存) / Gemini = **1 本目のみ** cachedContent に pin・2 本目 (synopsis) は inline contents (user 降格) 非キャッシュ・fingerprint/サイズゲートも 1 本目のみ (章追加毎の再 pin churn を構造的に防ぐ = D4。再 pin 版の損益は Phase D コスト実測後) / OpenAI・Grok = 自動延伸 (マーカー不要。章追加ターンは伸びた差分がミス=Anthropic と同じ dip)。**hit rate 定義の凍結 (D5)**: cached = cache_read_input_tokens (読取 0.1× のみ。cache_creation 書込 1.25× は含めない=再 warm を hit と誤計上しない) / prompt = **総入力** — Anthropic native の input_tokens は非キャッシュ分のみなので adapter が input+cache_read+cache_creation へ正規化 (#58、素通しだと ratio>1)。OpenAI prompt_tokens / Gemini promptTokenCount は元々総入力。互換経路は prompt_tokens_details.cached_tokens を read 扱い。**CacheStat 拡張**: 累積 hit_tokens/total_tokens + 直近 N=32 件の CachePoint{cached,prompt} リングバッファ (有界=無制限履歴は持たない)。LLM_CACHE_DEBUG=1 で機械可読行 [LLM_CACHE_STAT] req= input= cache_read= ratio= cum_ratio=。ドル建ては出さない (provider 価格は stale 化)。gm_core/CLI/正本は無改修 (キャッシュは配管の最適化、fallback があるので壊れても正しさは落ちない)。Phase D (live 実測=30T 級で曲線が平ら) / E (app メーター、任意) が残"

Map:                                # spec 15 (2026-07-16, ユーザー要望): 右ペインのマップタブ (訪問済み+1歩先の有向グラフ)
  purpose: "プレイヤーが『どこへ行ける?』を GM に尋ねる往復 (=1ターン=フルプロンプト1往復) を減らす可視化。GM prompt は既に出口を知る (#42 state_brief) ので prompt/engine は不変 — 効くのはプレイヤー側の探り行動の削減 (間接的トークン節約)"
  no_engine_change: "gm_core/harness/正本/prompt 無改修。マップは Scenario.exits (有向グラフ) + GameState (現在地・Gate::eval) + chronicle (TurnLog.location=訪問済み) からの派生表示。可変状態を増やさない (訪問済みは history 由来、GameState に visited を足さない)"
  fog: "可視範囲=霧 (ユーザー確定)。visited={start,現在地}∪{history の TurnLog.location} を現 scenario の location に限定 (campaign 遷移で前モジュール location が残るのを除外)。frontier=visited の各出口先 (1歩先・未訪問でも名前を出す)。nodes=visited∪frontier。奥は霧=出さない。edges=visited ノードの exits のみ (frontier からの辺は描かない)"
  gate_display: "各辺の Gate を backend が eval。from==現在地 かつ通れる→『いま行ける』(強調実線)。gate 未達→🔒(破線・行き先名は出すが条件文は出さない=ネタバレ回避)。その他 (通れる構造的繋がり)→淡い実線"
  dto: "MapNode{id,title,current:bool,visited:bool} (visited=false は frontier) / MapEdge{from,to,locked:bool} (locked=gate 未達) / MapView{nodes,edges}。GameView.map / TurnView.map に載せる (開幕+毎ターン、却下は現状スナップショット)"
  layout: "frontend: 現在地起点の BFS 距離でランク列 (x=rank)、同ランク縦分配 (y)。SVG 矢印。ノード数は数〜十数で簡易レイアウトで足りる (force-directed は過剰)。現在地=ember 強調、frontier=淡い破線枠、🔒 辺=破線"
  out_of_scope: "モジュール跨ぎの全体マップ / 手動レイアウト / 作者の per-location 秘匿 (可視範囲は霧固定、全図/作者制御は将来 spec)"

# --- プレイヤーが振るダイス (spec 18。開帳 / 決断 / 交互) ------------------------
player_dice:
  reveal: "Phase A (提示層のみ・engine 無改修): ダイス系 3 行 (rolls/checks/stat_rolls) の LogEntry に revealed カウンタ。伏せカード DiceReveal.vue = クリック→数字スクランブル 1.1s 減速→確定出目に着地→本物の行へ差し替え。1 クリック 1 判定の直列 (revealTargetIndex=最初の未開帳 entry のみ)。漏洩防止: ダイスより後ろの行 (ビート/goal バナー/遷移/エピローグ) + ビート SE + イベント CG/BGM を pendingTail/pendingSe/pendingVisual に保留し全開帳で flush。結末 SE は開帳と同時。未開帳中は入力ロック。設定 kataribe.diceReveal (既定 on・オフ切替=revealAll=脱出口)。揮発 (リロード=自動開帳は許容)。**転がる音** (2026-07-23): 開帳クリックでスクランブルと同時に one-shot (出目より先に鳴っても帰結は漏れない)。**アプリ同梱の UI 音** (app/src/assets/doubledice3.ogg・Vite が emit・CSP は既存の media-src 'self' で足りる) であってパッケージのアセットではない — 開帳カードはどの盤面でも出る提示層の仕掛けゆえ authored にすると『音を同梱していない配布物だけ無音』になり汎用音を全パッケージが複製する。再生は store.playSe 経由=サウンド設定の音量/ミュートが効く。作者による差し替えは未実装"
  decision: "Phase B (第三の権能=プレイヤー op。LLM 非関与=トークン消費ゼロ): pushable/spendable challenge の**素の失敗** (fumble/tier 該当は final・player 主体のみ・実行可能な選択肢が在る時のみ) は帰結を適用せず GameState.pending_decisions に凍結 (PendingDecision{challenge,entity,stat,sides,roll(生の出目=差分計算の基準),modifier,total,dc,degree,pushed}・セーブ対象)。resolve_decision(Accept/Push/Buy{degree}) が確定時に初めてスロット適用→トリガー settle→flag_turns (帰結の確定遅延=apply 済み帰結は巻き戻せないため)。turn は増えない"
  push: "プッシュ = 失敗した判定を 1 度だけ振り直す (本流 RNG 消費・成否に依らず final)。失敗連鎖 on_push_failure→(fumble なら on_fumble)→on_failure (「押した失敗はより悪い」は authored の帰結が本線)。Scenario.push_cost{from,amount} は任意の上乗せ (既定 None=CoC7 原典どおり無償)。additive の振り直しは tier を判定しない (会心/大失敗の二重抽選を作らない)"
  buy: "差分買い = 失敗の差分を stat から払って成功に変える。Scenario.spend_rules{from,rate=1} (opt-in・from は player 宣言済み stat 必須=SpendStatUndeclared)。**engine は stat 名を解釈しない** (幸運は一例・金/正気度/霊力でも同じ機構=LUCK 固定変数を作らない、2026-07-20 ユーザー決定)。percentile は regular/hard/extreme の段階買い (閾値=dc, dc/2, dc/5・費用=(roll-閾値)×rate)、additive は success 一段 (費用=(dc-total)×rate)。払える段だけ提示 (上限=現在値−宣言 min。払って死ぬ設計も作者が書ける)。critical/fumble は買えない・プッシュとは排他 (どちらも final)"
  defaults: "pushable 既定 **false (opt-in)** — spec rev2 の true から実装時改訂: ①既存 content の挙動 (即時適用・spec 09 共通効果射影) を黙って変えない ②一発勝負 challenge の事故防止。spendable 既定 true (scenario の spend_rules が主 opt-in)。決断つき challenge は spec 09 の全帰結共通射影から除外 (最終スロットが決断次第で広がり静的保証が成り立たない=安全側)。NPC 主体 (ChallengeDef.entity) の判定は凍結しない。即興 Check/CheckUnder op は対象外 (authored の代償構造が無い)"
  surfacing: "CheckOutcome.pushed/spent/pending (serde default=旧セーブ互換)。check_outcome_note が「押して振り直された/代償を支払って買い取られた」を GM へ還流 (決断は物語の素材)・pending は還流しない (final を app が差し替え)。app: TurnView/GameView.decision (DecisionView=can_push/push_cost/buys[{degree,cost,from,remaining}]・再開でセーブから復元) + resolve_dice_decision command (確定後 autosave・chronicle に決断併記)。frontend: DecisionPanel は全開帳後に表示 (開帳前に選択肢が見えたら失敗が漏れる)・プッシュの振り直しはもう一度伏せカードで開く・入力は決断確定まで締める。CLI は自動 Accept (決断 UI は GUI の責務)"
  v1_limits: "決断の帰結で campaign 遷移 goal に達しても自動遷移しない (次の通常ターンの play_turn が advance)。エピローグ生成も決断経由の goal では行わない (バナー+結末文のみ)"
  contest: "Phase C (一括型 cadence): ContestDef{opponent, player_roll/opponent_roll (RollSpec{stat,sides,bonus} inline or CharacterDef.rolls テンプレート名 — player は inline のみ), resolution (contest 単位で双方に適用=様式跨ぎ対抗が構造的に不存在), requires, on_win/on_lose/on_tie (ChallengeOutcome 再利用・player 視点・毎交換原子適用), until (決着 Gate), max_rounds (既定 1=単発対抗ロール・バックストップ)}。StateOp::AttemptContest は LLM が「開く」だけ (検証=UnknownContest/ContestLocked/ContestInProgress)、apply は振らず GameState.pending_contest (帳簿のみ・セーブ対象) を開く。contest_round が 1 交換 = 双方振り (RNG は player→相手の順で決定論)→比較 (additive=合計/percentile=degree 順位→同位は目標値の高い側=CoC7 準拠)→帰結適用→トリガー settle。決着 = until/max_rounds/goal 到達の安全弁 (書き漏れでも死亡 goal で必ず閉じる)。帰結フラグは authored_only。digest 1 行 (「対決「…」は N 交換 (勝ち w/負け l/分け t) で決着した」= harness::contest_digest) だけを carryover+chronicle へ (HP 現在値は state_brief が運ぶ=重複させない)。cadence は作者専権: 逐次型 (毎交換 LLM が語る)=challenge / 一括型 (決着まで LLM 非関与=トークンゼロ)=contest。UI: ContestPanel の ⚔ でラウンド、player の振りは伏せカード・相手は開帳後即開示、ラウンド毎 autosave、入力は決着まで締める (backend ガード二層)、CLI は自動で回し切る。v1 スコープ外 = 途中離脱/3 者乱戦/ラウンド毎の技選択 (攻め方は authored 固定 — 選択が欲しい戦闘は逐次型で書く)"

# --- 主人公 stat の境界つき宣言 (2026-07-20。歴史的非対称の解消) --------------------
player_stat_bounds:
  stat_init: "Scenario.initial_stats / package player.stats を **素の数値と StatDecl の untagged 両受け** (StatInit) に。従来形 `hp: 10` は無改修で挙動不変 (min 0・max なし)、境界が要るときだけ `SAN: { initial: 60, min: 0, max: 99 }`。stat_bounds(player) が宣言境界を読み、clamp は adjust/scale/roll_stat の全経路 + spec 18 の差分買い上限 (現在値−min) に自動で効く。負の min で借金も書ける。動機 = initial_stats が StatDecl より古い素の i64 マップだった歴史的非対称 (NPC は境界宣言可・player は不可)。CoC7 の SAN 上限 99 で実害化したため解消。Location.items の旧/新形式両受けと同じ後方互換パターン。lint は mapping 値だけ StatDecl 検査 (StatMap 意味論)"

# --- 複数ダイス×乗数 (2026-07-20。3D6×5 系の判定式) --------------------------------
multi_dice:
  count_times: "ChallengeDef/RollSpec に count (個数・既定 1)/times (乗数・既定 1)。additive の出目 = **count 個の d{sides} の合計 × times + 修正** (乗算は素の合計だけ・stat/modifiers は後から加算)。tier は素の合計で判定 (min=全部 1=合計==count / max=全部最大 / threshold 範囲は 1..=count×sides)。percentile は 1d100 固定 (count/times 指定は load 時 PercentileChallengeShape)。additive で count 0/times<1 は ChallengeShapeInvalid。CheckOutcome/PendingDecision に count/times (serde default 1=旧セーブ互換)、プッシュの振り直しも同じ式。表示 = 既定 1d/×1 は従来書式のまま、複数/乗数は「3d6(合計11)×5」(prompt/CLI/GUI 3 経路)。既定 1/1 で挙動・表示とも完全後方互換"

# --- 式修正 (spec 19。判定の修正値/目標値を stat の式で書く) ---------------------
stat_expressions:
  expr: "ChallengeDef.expr / RollSpec.expr (stat と排他・validate が併記を弾く)。`(CON + SIZ) / 2` の整数式を engine が**判定のたびに現在値で評価** (CON が削られれば補正も落ちる=生きた派生値)。additive=修正値 / percentile=目標値。文法 = 整数・stat 名 (日本語可)・+ - * / ( )・単項マイナス (全角 × ÷ （） も受理)。除算は 0 方向切り捨て (CoC 端数切り捨て準拠)。リテラル /0 は load 時拒否・実行時の stat 由来ゼロ除算は 0 (判定を落とさない)。authored 専権 (LLM は式を持てない)・参照 stat は判定主体の宣言済みキー必須 (load 時 ChallengeExprInvalid/ContestRollInvalid + 裁定時 UnknownStat の二層)。実装 = gm_core::expr (依存ゼロ純関数) + stat_or_expr() 3 適用点 (challenge additive/percentile/contest roll_side)。スコープ外 = DB 帯テーブル (modifiers の Gate 帯で書く)・派生 stat の初期化 (作者の手書き=ユーザー決定)・Gate への式"

# --- パッケージ更新 (spec 17。書庫取得物の更新検知と上書き取得) -----------------
package_updates:
  source_meta: ".kataribe_source.json (展開フォルダ直下・spec 17 機構①)。SourceMeta{site_url(正規化済み取得元), id(書庫 UUID), version: Option<String>(package.yaml の写し・欠落 None→表示は「(不明)」), content_hash(DL した zip の sha256・クライアント自前計算), tree_hash(展開直後のフォルダ正規化ハッシュ), installed_at_unix: u64(表示は提示層が locale 変換=chrono 依存を足さない)}。メタの無い/壊れたフォルダ = 手動配置扱いで更新機構は触らない (聖域)。zip 内に混入した同名ファイルは展開時 skip (メタは常に受領側クライアントが書いた値だけ)"
  content_hash_contract: "rev2 A-1 の凍結: サーバの GET /api/packages/:id/download は DB の sha256 に対応する正規化済み zip バイナリを**そのまま返す** (再圧縮・変換しない=outcast Spec 23 追補の不変条件)。install はサーバ申告 (一覧 RemotePackage.sha256) と受信バイト列の自前計算を一致検証し、不一致は DL 破損として中止 (壊れた基準を記録しない)。申告 None (古い書庫) は検証なしで自前計算値を記録"
  tree_hash: "rev2 B-6 の凍結式: walk(root) の通常ファイルのみ (除外 basename = .kataribe_source.json / .DS_Store / Thumbs.db / desktop.ini。空ディレクトリ・symlink 無視)。entry = 相対パス(UTF-8・'/' 区切り) + '\\0' + hex(sha256(内容)) + '\\n'。tree_hash = hex(sha256(相対パス辞書順 (バイト比較) で連結))。install 直後に記録・更新直前に再計算 = ローカル編集検知 (不一致で警告ダイアログ。**不一致ファイル数は出さない** — 2026-07-19 ユーザー決定で rev2 決定 2 を改訂: 件数は per-file hash が要りメタの凍結形を崩すため、警告は「編集されています/更新すると変更は失われます」に留める)。Unicode 正規化なし (同一マシン内で比較が閉じる)"
  detection: "check_package_updates: メタ有り かつ site_url == 現在設定の kataribe.siteUrl (正規化後) の時のみ GET /api/packages/:id を照会 (rev2 A-4 SSRF 遮断=照会先は常にユーザー登録サイトだけ)。meta.content_hash != server.sha256 → 更新あり (順序なし=内容が違うか、だけ。版戻しも「更新」)。失敗 (オフライン/404/5xx) はその項目に何も主張しない (バッジ非破壊・無トースト・rev2 B-8)。タイミング = ローカルタブを開くたび自動 (決定1)"
  update_flow: "update_site_package: ①プレイ中ガード ②tree_hash 再計算→不一致は警告 (上書き/キャンセルの2択・決定2 改訂: 件数なし)。判定は command `package_is_locally_edited`、上書き続行は `force: true` で backend へ (force 無しの update は編集検知で拒否=二層) ③旧.bak の事前掃除 ④DL+検証 (新規取得と同一経路) → extract_package_zip_to で .update_tmp_{id} 直下へトップ剥がし展開 (rev2 A-2=二重構造の構造的排除) ⑤スワップ: 旧→旧.bak → tmp→旧パス → .bak 削除 (途中失敗は .bak 復旧=全か無か。パス不変=セーブ FNV キーと packagePaths の安定) ⑥メタ更新はスワップ成功後のみ (rev2 B-7)・tmp/.part は常に削除。check↔update は排他 (rev2 B-10)。クラッシュ残骸は起動時/一覧読込時に cleanup_leftovers (tmp 削除 / bak 単独→自動復旧 / 両在→bak 破棄・rev2 A-3)。**掃除は UPDATING 中はしない** (`.update_tmp_*` は残骸と展開中の staging を名前で区別できない → 更新中に一覧を開くと自分の staging を消して更新が落ちる。旧フォルダは復旧で無傷だが偽の失敗を作らない)。同じ id のフォルダが複数在っても (Phase C 以前の `_2` 並置) 検知・更新はパス単位なので取り違えは起きない。**Phase A 以前に取得したフォルダはメタが無く更新対象外** (後付けの紐づけは不可能=サーバ hash は zip のもので展開済みフォルダから再現できない。処方は削除して取り直し。セーブはパス FNV キーゆえ同名に直せば繋がる)"
  duplicate_install: "2026-07-19 ユーザー決定 (spec 05 の名残の解消): サイトタブの取得は `unique_dir` で毎回 `_2` の別フォルダに増えていた → `list_packages` が `PackageEntry.source_site`/`source_id` (出所メタの写し) を返し、**現在の siteUrl かつ同じ書庫 id が既に手元に在るならボタンを「取得済み」で disable** する。更新はローカルタブの「更新」の役割 (同じフォルダへ据え替え) = 二重取得と更新の役割分担を UI で確定させる。判定は提示層のみ (frontend は登録パス一覧を持つが backend は持たない)、手動配置 (メタ無し)・別サイト由来は対象外で従来どおり取得できる"
  server: "outcast Spec 23 追補: PackageSummary に sha256: String を追加 (一覧+詳細の両方・決定3=DB 保存済み値の SELECT 追加のみ)。Kataribe 側 RemotePackage.sha256 は Option (None 耐性=未対応書庫で更新検知が静かに無効)"

# --- 確定行動 (spec 21。ダイスを振らない challenge) ------------------------------
certain_actions:
  resolution_none: "ChallengeDef.resolution: none (spec 21)。ダイスを振らず on_success を必ず適用する確定行動。**RNG を消費しない** (確定行動の有無でダイス列が変わらない=決定論)。CheckOutcome を積まない (🎯 行も spec 18 の伏せカードも出ない=判定していないものを判定に見せない)。結末文は発火ビート経路 (ApplyOutcome.fired) で提示・還流する。禁止フィールドは sides/dc/count/times/stat/expr/modifiers/tiers/degree スロット/on_failure/pushable/on_push_failure — 判定が無い以上どれも無意味ゆえ load 時に CertainActionShape で名指し。requires は使える (むしろ本命=「条件を満たすと選べるようになる行動」を宣言でき scenario_brief に【前提】が出る)。scenario_brief は「判定なし・確定 (前提を満たせば必ず成功する)」と表示"
  motivation: "**機構の穴を塞ぐ**: LLM が authored 効果を起動する経路は attempt_challenge しかない (トリガーは engine が発火させるもので LLM から触れない)。『set_flag → トリガーが効果を出して**書き戻す**』定石は、その書き戻し (set_flag) のせいで起点フラグが authored_only_flags に落ち、#50 バックストップが真偽どちらの向きも却下する → **LLM は二度と起動できない** (しかも語彙提示からも消えるので静かに死ぬ)。『セットして戻す』は engine 駆動ループ (カウンタ→効果→リセット) 用の定石で、**起点が LLM の時だけリセットが起点の権利を食い潰す**。装備・使用・切替のような繰り返せる確定行動はこれで書く。従来の回避策 sides:1/dc:1 は偽のダイス (🎯 行・伏せカードの誤発火) かつ percentile 盤面では validate 拒否ゆえ様式依存で壊れていた"
  projection: "spec 09 逐次射影に**完全に乗る** (判定が無い=どの経路でも on_success しか起きない)。『装備する + 移動する』を 1 ターンに束ねられる — ダイス challenge は帰結が apply 時確定ゆえ必ずターンを割る、との対比"
  lint_unknown_location: "同梱 lint: Gate の location_is が**宣言されていない場所**を指していたら UnknownLocationInGate で警告 (非 fatal)。state.location と一致しようがない=永久に false → challenge の requires なら一度も選べず、出口 gate なら通れないのに、従来はエラーも警告も出なかった。実例=LLM 生成 content の { location_is, at: inventory } (所持品を場所と誤認)。走査対象は challenge の requires/modifiers・trigger の when・flag_rules・出口 gate、入れ子 (all/any) の葉まで再帰。origin が場所を名指しする"
# --- 既成事実 (spec 20。プレイヤーと GM の覚え書きリスト = MemoriaAeterna の最小プロトタイプ) ---
shared_facts:
  fact_entry: "FactEntry{id: u64(採番=現存 max+1・セッション内一意・不変), origin: gm|user, text: String, turn: u32, score: u32}。**正本 (GameState) の外** — 語り素材であって可変世界状態ではない (chronicle/Memoria と同じ境界)。置き場 = harness/app 層 + SessionSave.facts (serde default=旧セーブ互換)。campaign 遷移で持ち越し (章を跨いで覚える)"
  limits: "20 件 × Unicode スカラー (chars) 60 文字 (超過は機械カット・非対話)。満杯 20×60=1200 字 + 従属規律ヘッダ ~150 字 ≈ 1500 字 ≈ 900〜1100 tok (プロンプトの 7〜10%)。60 字制限は UI 側の規律 (placeholder + 機械カット) — GM 書き込み経路の撤去 (#66) により LLM へ伝える必要は無くなった"
  score: "参照スコア (Memoria weight/feedback の移植)。ユーザー追加=4 / 編集=+3 / 同文の再追加・編集の同文衝突=既存へ +3 統合。**手を触れた行ほど退場しにくい**。score は harness 機構の帳簿でユーザーは値を直接指定できない (操作の副作用としてのみ動く)。減衰なし (v1)"
  eviction: "満杯 (20 件) で追加したら**最低スコア帯の中で最古 (id 最小)** が 1 件退場し、退場行を返してトーストで可視化する (silent な退場を作らない)。ユーザー操作は常に成立する。当初あった「GM 提案の入場判定 (churn 許可)」は GM 書き込み経路の撤去 (#66) と同時に不要になった"
  dedup: "trim + NFKC 正規化後の完全一致 (60 字カット後の text で比較。実装は unicode-normalization)。同文の追加・編集は 2 件併存させず既存へ +3 統合"
  ordering: "UI も LLM 注入も**スコア降順 (同点 id 昇順)** に統一 — LLM の先頭重視と表示の見え方を一致させ、消えかけが下に集まる退場予告を両側で再現"
  gm_channel: "**撤去した (2026-07-21、failures.md #65/#66)**。当初は StateDelta.facts で GM が行を提案する設計だったが、記述義務を三度書き直しても 0/45・0/20 の絶対ゼロ。認識は完全に届いていた (開発者モードで問うと自分の即興を正確に列挙し書くべきだったと認める) のに提出前の確認が毎ターン脱落 — GM 自身の分析『条件付き・自己申告型の作業は語りの生成に注意を奪われると最初に脱落する』が真因で、**語り手に記録係を兼ねさせるのが構造的に無理**。StateDelta.facts / apply_gm_facts / FactsDigest / 📝・📝⁺ ログ / TurnView.new_facts・reinforced_facts / GM_SYSTEM の記述義務を一式撤去し、既成事実は**ユーザーが宣言し GM が守る**欄になった。機械が書く経路が要るなら語りと競合しない瞬間 (あらすじ圧縮時の抽出) に別経路で足す"
  injection: "user 可変メッセージ内「# 既成事実」節 (state_brief の後) — 編集のたび変わるので system 側に置くと prompt caching を壊す (spec 14 構成不変)。従属規律ヘッダ=抑止+保護の対 (既成事実<state・state に無い所持/能力/出来事を確定させない ＋ 呼称/約束/意図の一貫性には従う)。GM_SYSTEM に読み取り規律のみ (既成事実由来の付与禁止=語りの確定は ops で弾けない唯一の防衛線。書き込み規律は #66 で撤去)。空リストは節なし。**読み側は実測 Green** (2026-07-21・claude-opus-4-8): 「〇〇したら怒る」の条件つき未来規則が保持され条件成立時に発火し、以後も長く保たれた = 保護対象 (呼称・設定・関係・約束の一貫性) より広く効く。弱い/ローカルモデルは未測定"
  persistence: "GUI のユーザー編集=**即時 autosave** (眺めるだけで消えない)。ターン処理では変わらない (GM は書かない) ので受理ターンの autosave はスナップショットを書き戻すだけ。CLI は読むだけ (編集は GUI 専用)"
  facts_policy: "spec 20。**ユーザーが既成事実を宣言できるかを盤面が縛る**。ユーザーの宣言は GM への指示として毎ターン注入されるので、作者が設計した発見の順序 (謎・段階開示) を語りで迂回できてしまう。誰が虚構を所有するかは盤面で違う (TRPG=作者 / キャラ RP=共同) → 三権分立の「シナリオが縛る」脚。`Scenario.facts_policy`(serde default) + package.yaml `facts_policy`(Option・注入で全モジュールを支配=既成事実はセッション単位でモジュール跨ぎに持ち越すため)。**二値**: **locked (既定)**=タブごと非表示 / **open**=追加・編集・削除。既定 locked の根拠=宣言を持たない配布物 (書庫の既刊すべて) を安全側に置く (spec 18 pushable:false 既定と同じ判断)。当初は三値で中間に prune (削除のみ) を置いていたが、あれは **GM も書く**前提の非対称 (加算を封じ減算だけ許して誤記憶を消させる) だったので、GM 書き込み経路の撤去 (#66) と同時に撤去した — 書き手がユーザーだけなら足せないものは消せない。二層防衛 (#50): UI で隠す + commands で拒否。作者テストの開放は既存の開発者モードで足りる (ユーザー向け上書き設定は作らない=作ると作者の制約が飾りになる)"

# --- 複数同時プレイ (spec 23 Phase 0 凍結 2026-07-23) -------------------------
Multiplayer:                        # ホスト権威 + WebRTC P2P。正本はホストの GameSession のみ、ゲスト = ネット越しに view DTO を受け取る frontend
  protocol_version: "u32 (=1)。join 時に交換し、不一致は接続拒否 (静かな解釈違いを作らない)。wire は JSON・backend 非依存 (将来 DataChannel を frontend RTCPeerConnection から Rust webrtc-rs へ移しても形を変えない)"
  participants: "[{peer_id, entity_id, display_name}]。誰がどの entity を操作するかの正 (帰属マッピング・rev2 矛盾12)。主人公は entity_id=player の 1 行 (ホストとは限らない)。合成 prompt の発話者名 = display_name / ops の帰属 = entity_id / state_view(viewer) の宛先解決もこれ。セッション中は不変 (交代は v2)"
  room_code: "base62 22 桁 (~131bit)。推測参加を計算量で遮断。部屋 TTL 10 分 (接続イベントで延長)・同一コードで再 knock 可 = 既存 participant の張り直し (再接続は v1 に含む。中途参加ではない)"
  messages: "シグナリング = join / offer / answer / candidate。ゲーム = game_request / game_response (transport seam の request 面 = invoke 相当) + game_event (push 面 = Tauri emit 相当。synopsis-compacting 等をホスト frontend が中継) + timer_sync (ホスト時刻基準の残り秒ブロードキャスト。ゲスト時計と同期しない=締切の正はホストの受信締切のみ) + reveal_order (開帳の順序づけ配信。中身 = RevealView{revealed,total}、Phase B でホスト session へ昇格済み — 伏せ直し 3 点 = 受理ターン rolls+checks+stat_rolls / プッシュ振り直し 1 / 対決ラウンド player の 1 枚。reveal_next は飽和インクリメント = 先着勝ちはホストの受信順・過剰クリック無害)。全メッセージに sig? を予約 (v1 未使用。公開運用時の SDP 署名用=ノックサーバーは信頼点で改竄すれば MITM 可能、友人卓の v1 は自前 VPS を信頼する割り切り)"
  package_match: "{package_id, content_hash}。hash はパッケージ zip 全体の sha256 (spec 17 SourceMeta.content_hash 流用・アセット単位ではない)。不一致は警告のみでプレイ継続 (絵が違うだけで正本はホスト)。メタ無し (手動配置) は「照合できません」表示"
  input_window: "締切三系統 = all_submitted (全員提出で即締め) | timer (満了) | host_forced (AFK の脱出口)。**締切の判断はホスト frontend の専権** — backend (play_party_turn) は「いま締める」と言われた時点の提出物で合成する (Phase B 凍結)。未提出者は「(黙って様子を見ている)」として prompt に載せる — 省くと GM が不在と誤認する (#37 系 = presence は明示接地) + 他プレイヤーへ AFK が透明になる。再提出は上書き・空提出は拒否 (様子見 = 未提出のまま)。**受理で窓クリア・却下は提出物を残す** (state 無傷と同じ向き — 書き直すか締め直すかをホストが選ぶ)。全員未提出のままの締切は拒否。既定秒数は playtest で較正 (未決1)"
  transport: "DataChannel は reliable + ordered (SCTP が断片化・フロー制御を担う)。メッセージ上限 64KB — 16KB 超は一時的 Head-of-Line blocking を許容し、恒常的に超えうるのは GameView 全量 sync のみ (実測で超えるなら分割を実装 = 条件付き項目・未決2)。TURN = coturn を ノックサーバーと同 VPS に同居、turns:443?transport=tcp を ICE に含める (日本のモバイル CGNAT = 対称 NAT は TURN 必中・v1 必須)。クレデンシャルは一時方式 (ノックサーバーが期限付き username + HMAC を発行 = 静的パスワードの野良リレー化を防ぐ)。リレー経由でも中身は DTLS-SRTP (VPS は復号できない)"
  asset_wire: "DTO のアセット欄は絶対パスでなく**アセット ID** (Phase A で Local 含め一本化 = DTO 二形態分裂の回避)。**ID 形式 = scenario YAML の image/bgm/sound/icon 欄の値そのもの** (既存の不透明 ID・`^[A-Za-z0-9._-]{1,64}$`・kind は欄が含意: 画像系=images/ 音声系=audios/)。zip 相対パス相当だが独自の語彙を発明しない — YAML と DTO を同じ語彙にする (単一真実源)・kind ディレクトリ内で一意ゆえ衝突なし・解決テーブル不要。各クライアントが自分のローカルパッケージで resolve_asset (**seam の外** = ホストへ問い合わせない。ゲストは自分のコピーで解決する契約の実装)。解決失敗は表示スキップ + 警告 (プレイ継続)"
  item_idiom: "アイテムの拾得/譲渡/消費は**必ず主人公を経由する 2 手**で表現 (拾得 = add_item→give_item / 消費 = give_item(仲間→主人公)→remove_item)。spec 09 逐次射影が同一ターンの束ねを受理する。仲間単独の add/remove は出さない (GM_SYSTEM 接地。per-entity 化は location 分裂とセットで v2)"
  language: "卓の言語 = ホストの言語 (GM の語り・却下理由 localize・システム文はホスト設定で生成)。ゲストの UI クロームはゲスト自身の t() のまま。参加時に「卓の言語: 日本語」を明示"
  resume_handoff: "ホスト引き継ぎ = SessionSave の受け渡し (手動・v1 は機構化しない)。SessionSave.content.path はホストのローカル絶対パスなのでセーブ形式は変えず、resume 系 command に path_override 引数 (任意) を足す。パッケージ同一性は content_hash で照合し不一致は警告"

