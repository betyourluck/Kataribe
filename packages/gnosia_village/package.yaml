# package.yaml — 霧の村 (人狼盤面のドッグフード、spec 06 Phase D)。
# 役職はゲーム開始時にエンジンがランダム割り当て (seed で再現可能)。
# プレイヤーには自分の役職だけが見える (secret_attributes)。

title: 霧の村 — 人狼の夜
description: 閉ざされた山村に、人に化ける狼が紛れた。議論と投票で見つけ出せ — あるいは、化かし通せ。
author: you
version: 0.1.0
engine: ">=0.1"

entry: scenarios/village.yaml

world: |
  深い霧に閉ざされた山あいの村。三日前に街道が崩れ、誰も外へ出られない。
  昨夜、村人のひとりが変わり果てた姿で見つかった — 人に化ける狼「人狼」の仕業だ。
  残された六人は集会所に集い、互いを見定めることにした。
  昼は語らいと処刑の投票。夜は人狼の狩り。どちらかが尽きるまで、夜は巡り続ける。
  夜が落ちたら: プレイヤーが人狼なら、夜の最初の場面で「今宵、誰を狩るか」と選択を静かに促し、指名を待て (勝手に決めるな)。
  プレイヤーが占い師なら「誰の正体を視るか」と促し、指名された者の役職を占いの結果として本人にだけ告げよ。
  ただの村人なら、夜の不安を短く描いて朝を迎えさせよ。
  この世界に魔法はない。あるのは、嘘と、観察と、覚悟だけだ。

player:
  name: 旅人
  profile: 峠越えの途中で足止めされた旅人。よそ者ゆえ村の過去を知らず、しがらみもない。
           それが信を招くか、疑いを招くかは、語り方ひとつ。
