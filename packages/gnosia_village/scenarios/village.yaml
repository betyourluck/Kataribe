# 霧の村 — 人狼盤面 (spec 06 Phase D のドッグフード)。
# 配役はエンジン (role_assignment、seed で再現可能)。票の意図は LLM (cast_vote)、
# 開票と死はエンジン (resolve_vote トリガー)。フェーズ進行は帳簿タイマー + repeatable トリガー。

title: 霧の村
start: meeting_hall

# --- 配役 (エンジンの専権。プレイヤーにも役職が配られる = グノーシア式) ---
# 6 人なら人狼は 1 が均衡 (#38 後の実プレイFB: 2 だと初日の処刑を外す→夜の襲撃で
# 4 人になり 人狼優位 2×2−4=0 で即詰み = 1 サイクルで終わる)。1 なら外しても昼が約 3 回。
role_assignment:
  key: 役職
  pool: { 人狼: 1, 占い師: 1, 村人: 4 }
  among: [player, mira, gen, sayo, tokio, yuren]

# 役職は「本人と GM だけが知る」。UI には自分の分しか出ない。
secret_attributes: [役職]

cast: [mira, gen, sayo, tokio, yuren]

# --- フェーズ (authored トリガー専権のフラグ。LLM は立てられない = 語彙にも出ない) ---
allowed_flags: [投票フェーズ, 夜フェーズ]
flag_titles:
  投票フェーズ: 処刑投票の刻
  夜フェーズ: 夜

# タイマー・生存の帳簿と役職カウンタは提示層から一括秘匿 (カウンタは死者の役職を漏らすため)。
hidden_stats:
  [議論T, 投票T, 夜T, 生存, 生存者数, 生存人狼数, 生存占い師数, 生存村人数, 人狼優位, 占い師優位, 村人優位]

# --- 投票権 (デフォルト拒否): 昼の処刑投票は誰でも、夜の狩りは人狼だけ ---
vote_rules:
  - when: { kind: flag_is, key: 投票フェーズ, value: true }
  - when: { kind: flag_is, key: 夜フェーズ, value: true }
    voter_attribute: { key: 役職, value: 人狼 }

# --- フェーズ進行 (議論3ターン → 投票 → 開票・処刑 → 夜 → 夜明け、の繰り返し) ---
triggers:
  - id: opening
    when: { kind: always }
    effects:
      - { op: record_turn, key: 議論T }
    narration: 集会所に六人が集った。誰もが互いの顔を、そっと窺っている。まずは語らいから始まる。

  - id: vote_opens
    repeatable: true
    when:
      kind: all
      of:
        - { kind: flag_is, key: 投票フェーズ, value: false }
        - { kind: flag_is, key: 夜フェーズ, value: false }
        - { kind: turns_since, key: 議論T, turns: 3 }
    effects:
      - { op: set_flag, key: 投票フェーズ, value: true }
      - { op: record_turn, key: 投票T }
    narration: 日が傾いた。処刑の投票の刻だ — 各々、最も疑わしい者の名を挙げよ。

  # 開票はプレイヤーの票が入った瞬間に発火 (イベント駆動、has_voted #38)。
  # 3 ターン指名しなければ強制開票 (保険。空開票の処刑流れを常態にしない)。
  - id: execution
    repeatable: true
    when:
      kind: all
      of:
        - { kind: flag_is, key: 投票フェーズ, value: true }
        - kind: any
          of:
            - { kind: has_voted }
            - { kind: turns_since, key: 投票T, turns: 3 }
    effects:
      - { op: resolve_vote }
      - { op: set_flag, key: 投票フェーズ, value: false }
      - { op: set_flag, key: 夜フェーズ, value: true }
      - { op: record_turn, key: 夜T }
    narration: 票が読み上げられ、最も疑われた者が村外れの櫓へ引かれてゆく。やがて夜が落ち、霧が濃くなる — 狼の刻だ。村人たちは戸を閉ざす。

  - id: dawn
    repeatable: true
    when:
      kind: all
      of:
        - { kind: flag_is, key: 夜フェーズ, value: true }
        - { kind: turns_since, key: 夜T, turns: 1 }
    effects:
      - { op: resolve_vote }
      - { op: set_flag, key: 夜フェーズ, value: false }
      - { op: record_turn, key: 議論T }
    narration: 夜が明けた。生き残った者たちが集会所に戻り、無事な顔ぶれを数える。村は再び議論に戻る。

# --- 勝敗 (優位 stat はエンジンが開票時に原子更新する差分。Gate は単体比較のみ) ---
goals:
  - id: you_died
    title: あなたの死
    when: { kind: stat_at_most, entity: player, key: 生存, value: 0 }
    hint: 処刑や夜の狩りで命を落とせば、あなたの物語はそこで終わる
    narration: 意識が霧に溶けてゆく。この村の真実を、あなたは知らないまま終わった。
  - id: village_win
    title: 村の勝利
    when: { kind: stat_at_most, entity: player, key: 生存人狼数, value: 0 }
    hint: 語らいで見抜き、処刑の投票で人狼をすべて排除する
    narration: 最後の人狼が倒れ、霧が薄れてゆく。街道の方から、鳥の声が戻ってきた。
  - id: wolves_win
    title: 人狼の勝利
    when: { kind: stat_at_least, entity: player, key: 人狼優位, value: 0 }
    hint: 人狼が村人と同数まで生き残れば、村は狼のものになる
    narration: もう、数える者もいない。霧の奥で、長い遠吠えがひとつ響いた。

locations:
  meeting_hall:
    description: 村の集会所。中央の囲炉裏を六つの席が囲み、壁には古い狩り道具が掛かる。窓の外は乳色の霧。
    present: [mira, gen, sayo, tokio, yuren]
    items: {}
    exits: []
