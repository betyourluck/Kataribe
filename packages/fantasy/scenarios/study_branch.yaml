# Campaign モジュール A: 書斎の引き出し (分岐の出口を持つ)
#
# spine の尾 `Check→tier→trigger→goal(reached)→[分岐]` を campaign の入口として使う。
#   drawer_pick に挑戦 → 1d6 + str(2) vs dc5
#     大失敗(natural 1) → fumble_drawer → trigger drawer_jam → drawer_jammed
#       → reached() == jammed_ending → campaign の辺で 地下蔵(cellar) へ
#     成功で drawer_opened を立てれば → reached() == opened_ending → 森(forest) へ
#
# 持ち越し観測用に hp と global フラグ(searched_study)を持つ。局所フラグ(lamp_lit)は
# transition で捨てられる = 「忘れない GM」の境界 (世界に残る帰結 vs その場限り)。

title: 書斎の引き出し
start: study

initial_stats:
  str: 2
  hp: 8

# 世界に残る帰結 (transition で次モジュールへ持ち越す)。
global_flags:
  - searched_study

allowed_flags:
  - fumble_drawer
  - drawer_jammed
  - drawer_opened
  - searched_study
  - lamp_lit          # 局所フラグ: その場限り。transition で捨てられる

# authored challenge: tier と帰結フラグは作者の専権 (LLM は AttemptChallenge で選ぶだけ)。
challenges:
  drawer_pick:
    stat: str
    sides: 6
    dc: 5
    tiers:
      crit_fail: { natural: min, flag: fumble_drawer }   # roll == 1 → 大失敗

triggers:
  # 大失敗を gate にした反応ビート。判定の大失敗が引き出しを永久に閉ざす。
  - id: drawer_jam
    when: { kind: flag_is, key: fumble_drawer, value: true }
    effects:
      - { op: set_flag, key: drawer_jammed, value: true }
    narration: 鍵穴の中で工具が折れ、引き出しは固く閉ざされてしまった。

# 名前付き goal = 分岐する結末。発火 GoalId が次モジュールの分岐セレクタになる。
goals:
  - id: jammed_ending
    when: { kind: flag_is, key: drawer_jammed, value: true }
  - id: opened_ending
    when: { kind: flag_is, key: drawer_opened, value: true }

locations:
  study:
    description: 埃の積もった書斎。固い引き出しのある古い机がひとつ。
    items: {}
    exits: []
