# package.yaml — 「異世界転生者」配布パッケージ。
# entry が campaign.yaml = 複数モジュール (study→cellar/forest) を束ねるキャンペーン型。
# (campaign-entry の load_package 対応は後続。現状 campaign は load_campaign 経路でロード。)

title: 転生しても能力がかわらない俺だったので、普通に異世界を生き抜くことにした
description: 引き出しの技能判定で結末が分岐する短編キャンペーン。大失敗なら地下へ、成功なら森へ。
author: you
version: 0.1.0
engine: ">=0.1"

entry: campaign.yaml

world: |
  欧州中世風の異世界。MMORPGのような世界観。魔法やモンスターが存在する。主人公は現代日本から転生してきた社畜サラリーマン。
  王都の街中で、転生者としてのアニメやラノベのように能力をもらえると思ったら、何ももらえなかったので、日常生活を送りつつ、冒険者としての活動も行う。
  王都には、冒険者ギルド、宿屋、武器屋、雑貨屋などがあり、街の外には森や洞窟などの冒険スポットがある。

# 主人公を一度だけ宣言 → harness が各モジュールへ注入 (モジュール跨ぎで分裂しない)。
player:
  name: ゆうすけ
  stats: { hp: 10 }
  profile: 25才、男性、元日本の社畜サラリーマン。交通事故で死亡し、異世界に転生した。転生時に能力は何ももらえなかったため、普通の人間として生活している。
           戦闘能力は低いが、現代日本での知識や経験を活かして、異世界での生活を工夫している。
