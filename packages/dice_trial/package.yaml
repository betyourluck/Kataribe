# spec 18 Phase A (ダイスの開帳) の GUI テスト盤面。
# 目視項目を最短で踏む: ①加算式 check の伏せカード→開帳→結末文+SE 同期
# ②percentile (d100+成功度) の開帳 ③roll_stat (可変量ダイス) の開帳
# ④帰結トリガーのビート/CG/SE が全開帳まで伏せられるか (漏洩防止の本丸)
# ⑤goal バナーの保留 ⑥未開帳中の入力ロック ⑦設定オフで即時表示に戻るか。
title: ダイスの試練
description: >-
  開帳演出のテスト盤面。二つの試練 (岩起こし=STR 1d20 / 碑文の解読=知識 d100) に挑み、
  両方を制せば突破。「岩を持ち上げる」「碑文を読み解く」と入力すれば GM が挑戦を選ぶ。
author: Kataribe
version: "0.1"
entry: scenarios/main.yaml
world: |
  地下深くの試練の間。古の番人が拵えた二つの試練だけが出口を封じている。
  ここでは運命は既に転がっており、挑む者はそれを開くだけだと言い伝えられる。
player:
  name: 挑戦者
  profile: 試練の間に足を踏み入れた冒険者。腕力と学識の両方を試される。
  stats: { HP: 10, STR: 12, 知識: 60, SAN: 30 }
