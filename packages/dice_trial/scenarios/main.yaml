# ダイスの試練 — spec 18 Phase A (開帳) の GUI テスト盤面 + 「今日できる戦闘」のサンプル。
#
# テスト動線 (推奨入力):
#   1.「岩を持ち上げる」→ boulder (加算式 1d20+STR vs DC18)。
#      - 通常失敗: 結末文が毎回・開帳後に出るか
#      - 自然出目 1..4 = しくじり: rock_slip → 落石トリガー (ビート+SE+HP 1d4 減の
#        roll_stat) が「全開帳まで伏せられる」か = 漏洩防止の本丸
#   2.「碑文を読み解く」→ sigil (percentile d100 ≤ 知識60、成功度つき)。
#      - 失敗/ファンブルで SAN が roll_stat で減る (statrolls カードの開帳)
#   3. 両方成功 → breakthrough トリガー (CG 差し替え+SE+番人の登場=set_presence) と
#      戦闘解禁バナーが開帳完了まで保留されるか
#   4.「番人に斬りかかる」→ attack_guardian (戦闘の定石: 攻撃 1 回=challenge 1 個、
#      成功=敵 HP 1d8 減 / 失敗=反撃で自分 HP 1d6 減 / 自然 20=会心 +1d8)。
#      命中カード → ダメージカードが直列で開く。番人 HP 0 → 試練突破。
#   5. 未開帳中に入力欄が締まるか / 設定オフ (グラフィック) で即時表示に戻るか
#   6. (Phase C)「石くれを蹴散らす」→ gravel_brawl (一括型対決)。⚔ パネルでラウンドを
#      回す — player の出目は伏せカード、相手は即開示、決着まで LLM 非関与 (トークンゼロ)。
#      決着の digest が次の GM ターンに語られる。
#   7. (Phase B) 失敗すると決断パネルが出る:
#      - 受け入れる / 押して振り直す (押した失敗はより悪い) / 幸運を払って買い上げる
#      - 岩のプッシュ失敗 = 岩のしくじり (落石) / 碑文のプッシュ失敗 = SAN 1d10 /
#        番人へのプッシュ失敗 = 反撃 1d10
title: ダイスの試練
start: trial_hall

# spec 18 Phase B: 差分買いの支払い元 (幸運 30 は package の player.stats で宣言)。
spend_rules: { from: 幸運 }

# 番人 — 「今日できる戦闘」の相手。engine がキャラ別 HP を握り、challenge の帰結が
# roll_stat でダメージを振る (LLM は挑戦を選ぶだけ = 数値を持てない閉世界)。
# 敵の技量は DC が代役 (真の対抗ロールは spec 18 Phase C の Contest)。
characters:
  gravel:
    name: 石くれの群れ
    profile: 床の砂利が寄り集まった小さな騒霊。試練の間の掃除役だが、挑戦者にはとりあえず殴りかかる。
    stats:
      HP: { initial: 6, min: 0 }
      "腕力": { initial: 8 }
    rolls:
      # 「このキャラが振るときはこれ」のテンプレート (spec 18 Phase C)。
      "体当たり": { stat: "腕力", sides: 20 }
  guardian:
    name: 石の番人
    profile: 試練の間を守り続けた古の石像。二つの試練を制した者だけに、最後の試練として立ちはだかる。
    stats:
      HP: { initial: 12, min: 0 }

allowed_flags: [rock_moved, sigil_read, rock_slip, battle_started]
flag_titles:
  rock_moved: 封印岩の移動
  sigil_read: 碑文の解読
  rock_slip: 岩のしくじり
  battle_started: 番人戦の開幕

locations:
  trial_hall:
    title: 試練の間
    description: >-
      松明が石壁を舐める広間。出口を塞ぐ封印岩と、壁面いっぱいに刻まれた古代の碑文。
      奥の壁龕には巨大な石像が沈黙している。番人の声が反響する——
      「二つの試練を制した者だけが、最後の試練に見える」。
    image: trial_hall.svg
    present: [gravel]   # 石くれは開幕から居る (presence 規律との整合。番人は set_presence で登場)
    exits: []

challenges:
  # ① 加算式: 伏せカード → 開帳 → 結末文+SE 同期のテスト。
  boulder:
    description: 封印岩を持ち上げて動かす (STR 1d20 vs DC18)
    stat: STR
    sides: 20
    dc: 18
    on_success:
      flag: rock_moved
      narration: 全身の筋が軋む。封印岩はゆっくりと傾ぎ、床を擦って動いた。
      sound: chime.wav
    on_failure:
      narration: 岩はびくともしない。掌が擦り剝け、番人の声が低く嗤った気がした。
    pushable: true
    on_push_failure:
      # 押した失敗はより悪い: 無理な力みが岩を揺らし、しくじり (落石) と同じ帰結へ。
      flag: rock_slip
      narration: 無理に力んだ拍子に足場が崩れ、岩がぐらりと戻った。天井が軋む——まずい。
    tiers:
      # 自然出目 1..2 (10%) = しくじり (tier 該当は final = 決断なしで即落石)。
      # 3..5 の素の失敗は決断パネル (押す/買う/受け入れる) が出る — Phase B のテスト経路。
      slip: { natural: at_most, threshold: 2, flag: rock_slip, narration: 手が滑った。岩がぐらりと戻り、天井から不吉な軋みが降ってくる。 }

  # ④ 戦闘の定石: 攻撃 1 回 = challenge 1 個。命中判定 → 与ダメ/被ダメまで engine が
  # 同一ターンに原子解決する (帰結は authored = LLM は選ぶだけ)。勝敗は HP goal が裁く。
  attack_guardian:
    description: 番人に斬りかかる (STR 1d20 vs DC18。外せば反撃を受ける)
    stat: STR
    sides: 20
    dc: 18
    requires: { kind: flag_is, key: battle_started, value: true }
    on_success:
      narration: 刃が石の外殻を裂き、罅から鈍い光が漏れた。
      sound: chime.wav
      effects:
        - { op: roll_stat, entity: guardian, key: HP, count: 1, sides: 8, negate: true }
    on_failure:
      narration: 斬撃は空を切った。石の腕が唸りを上げて胴を打つ。
      sound: rumble.wav
      effects:
        - { op: roll_stat, key: HP, count: 1, sides: 6, negate: true }
    pushable: true
    on_push_failure:
      narration: 隙を晒してまで踏み込んだ二撃目も逸れた。番人の豪腕が、今度は容赦なく叩きつけられる。
      sound: rumble.wav
      effects:
        - { op: roll_stat, key: HP, count: 1, sides: 10, negate: true }
    tiers:
      # 自然 20 = 会心。tier 効果は on_success に加算される (打ち消さない)。
      crit:
        natural: max
        narration: 会心の一撃——刃は罅を正確に穿ち、番人の胸奥で何かが砕けた。
        effects:
          - { op: roll_stat, entity: guardian, key: HP, count: 1, sides: 8, negate: true }

  # ② percentile: d100 ロールアンダー + 成功度の開帳テスト。失敗系は roll_stat で SAN 減。
  sigil:
    resolution: percentile
    description: 壁の碑文を読み解く知識ロール (d100 ≤ 知識)
    stat: 知識
    on_success:
      flag: sigil_read
      narration: 螺旋の文字列が意味を結ぶ。これは封印の手順書だ——読める、読めるぞ。
      sound: chime.wav
    on_failure:
      narration: 文字が視界の中で蠢き、意味を結ばない。読んではいけない箇所を読んだ気がする。
      effects:
        - { op: roll_stat, key: SAN, count: 1, sides: 6, negate: true }
    pushable: true
    on_push_failure:
      narration: 目を凝らしすぎた。渦巻く文字列が、今度はこちらの内側に書き込まれていく。
      effects:
        - { op: roll_stat, key: SAN, count: 1, sides: 10, negate: true }
    on_fumble:
      narration: 碑文がこちらを読み返してきた。頭の奥で何かが千切れる音がした。
      effects:
        - { op: roll_stat, key: SAN, count: 1, sides: 10, negate: true }

# --- 対決 (spec 18 Phase C): 決着まで LLM を介さない一括型 cadence のサンプル ---
# 「石くれを蹴散らす」と入力 → GM が attempt_contest で開く → ⚔ パネルでラウンドを回す。
# 何交換あっても消費トークンはゼロ (決着の digest だけが次の GM ターンに渡る)。
contests:
  gravel_brawl:
    description: 石くれの群れを蹴散らす
    opponent: gravel
    player_roll: { stat: STR, sides: 20 }
    opponent_roll: "体当たり"
    on_win:
      narration: 拳が群れの芯を捉え、石くれがばらばらと崩れる。
      sound: chime.wav
      effects:
        - { op: roll_stat, entity: gravel, key: HP, count: 1, sides: 6, negate: true }
    on_lose:
      narration: 足元をすくわれ、石の礫が脛を打った。
      sound: rumble.wav
      effects:
        - { op: roll_stat, key: HP, count: 1, sides: 3, negate: true }
    until:
      kind: any
      of:
        - { kind: stat_at_most, entity: gravel, key: HP, value: 0 }
        - { kind: stat_at_most, entity: player, key: HP, value: 0 }
    max_rounds: 20

triggers:
  # しくじりの帰結: ビート+SE+可変量ダイス。開帳前に鳴ったら/見えたら漏洩 = テストの本丸。
  - id: rockfall
    when: { kind: flag_is, key: rock_slip, value: true }
    effects:
      - { op: roll_stat, key: HP, count: 1, sides: 4, negate: true }
    narration: 天井の石が剝がれ落ち、肩を掠めた。番人の試練は容赦がない。
    sound: rumble.wav

  # 両試練の制覇: CG 差し替え+SE+番人の登場 (set_presence=authored 専権)。
  # ビート/CG/顔アイコンの変化が開帳完了まで保留されるかのテスト。
  - id: breakthrough
    when:
      kind: all
      of:
        - { kind: flag_is, key: rock_moved, value: true }
        - { kind: flag_is, key: sigil_read, value: true }
    effects:
      - { op: set_flag, key: battle_started, value: true }
      - { op: set_presence, entity: guardian, present: true }
    narration: >-
      碑文が金色に輝き、封印岩の奥で錠の外れる音が響いた——だが出口の前で、
      壁龕の石像が軋みを上げて動き出す。最後の試練、石の番人が立ちはだかった。
    image: breakthrough.svg
    sound: rumble.wav

goals:
  # 敗北条件を先に (authored 順 = reached の優先順)。
  - id: collapsed
    title: 力尽きた
    hint: HP が尽きるとここで終わる
    when: { kind: stat_at_most, entity: player, key: HP, value: 0 }
    narration: 落石の痛みが遠のき、松明の火が滲んで消えた。試練の間は静けさを取り戻す。
  - id: broken
    title: 心が折れた
    hint: SAN が尽きるとここで終わる
    when: { kind: stat_at_most, entity: player, key: SAN, value: 0 }
    narration: あなたは碑文の前に座り込み、読めなかった文字を指でなぞり続けている。
  - id: trial_cleared
    title: 試練突破
    hint: 封印岩を動かし、碑文を読み解き、目覚めた番人を討て
    when: { kind: stat_at_most, entity: guardian, key: HP, value: 0 }
    narration: >-
      石の番人は膝をつき、崩れながら初めて労いの声を発した——「行け、挑戦者。運命は開かれた」。
      砕けた石片の向こうで、出口の光が揺れている。
    epilogue_prompt: 三つの試練を終えた挑戦者の後日談を短く。HP と SAN の残量を踏まえた余韻で。
