<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <radialGradient id="gold" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#8a6a2a"/>
      <stop offset="45%" stop-color="#4a3a16"/>
      <stop offset="100%" stop-color="#171208"/>
    </radialGradient>
    <linearGradient id="doorlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="100%" stop-color="#c89a3e"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#gold)"/>
  <!-- 開いた出口から漏れる光 -->
  <rect x="540" y="160" width="200" height="420" fill="url(#doorlight)" rx="8"/>
  <polygon points="540,580 740,580 900,720 380,720" fill="#e9c46a" opacity="0.35"/>
  <!-- 金色に輝く碑文 -->
  <g fill="none" stroke="#ffd97a" stroke-width="3" opacity="0.9">
    <path d="M180 220 q40 40 0 80 q-40 40 0 80"/>
    <path d="M280 220 q40 40 0 80 q-40 40 0 80"/>
    <path d="M1000 220 q40 40 0 80 q-40 40 0 80"/>
    <path d="M1100 220 q40 40 0 80 q-40 40 0 80"/>
  </g>
  <text x="640" y="90" text-anchor="middle" fill="#ffe9a8" font-size="36" font-family="serif">封印は解かれた</text>
</svg>
