<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2a22"/>
      <stop offset="1" stop-color="#0c130f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.62" r="0.5">
      <stop offset="0" stop-color="#3a5440" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0c130f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <!-- 苔むした石壁 -->
  <rect x="380" y="180" width="840" height="720" fill="#222b25"/>
  <rect x="380" y="180" width="840" height="720" fill="none" stroke="#0a0f0c" stroke-width="6"/>
  <!-- 閉ざされた石扉 -->
  <rect x="650" y="320" width="300" height="580" rx="10" fill="#161d18"/>
  <line x1="800" y1="320" x2="800" y2="900" stroke="#0a0f0c" stroke-width="8"/>
  <circle cx="760" cy="620" r="14" fill="#3a4a3e"/>
  <circle cx="840" cy="620" r="14" fill="#3a4a3e"/>
  <!-- 下草 -->
  <rect x="0" y="840" width="1600" height="60" fill="#0a120d"/>
  <text x="800" y="120" font-family="serif" font-size="44" fill="#6b8a72" text-anchor="middle" opacity="0.6">祠の入口</text>
</svg>
