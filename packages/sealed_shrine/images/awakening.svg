  <rect width="1600" height="900" fill="url(#burst)"/>
  <g stroke="#eef3ff" stroke-width="3" opacity="0.5">
    <line x1="800" y1="450" x2="800" y2="40"/>
    <line x1="800" y1="450" x2="800" y2="860"/>
    <line x1="800" y1="450" x2="220" y2="450"/>
    <line x1="800" y1="450" x2="1380" y2="450"/>
    <line x1="800" y1="450" x2="360" y2="120"/>
    <line x1="800" y1="450" x2="1240" y2="120"/>
    <line x1="800" y1="450" x2="360" y2="780"/>
    <line x1="800" y1="450" x2="1240" y2="780"/>
  </g>
  <!-- 掲げられた聖剣 -->
  <rect x="792" y="250" width="18" height="320" rx="5" fill="#dfe8ff"/>
  <rect x="748" y="300" width="106" height="16" rx="5" fill="#c7d2f0"/>
  <text x="800" y="130" font-family="serif" font-size="44" fill="#bcd2ff" text-anchor="middle" opacity="0.7">覚醒</text>
</svg>
