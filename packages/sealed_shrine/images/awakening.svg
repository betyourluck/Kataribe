<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="burst" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fff7e0" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#7ad0ff" stop-opacity="0.55"/>
      <stop offset="0.7" stop-color="#3a2466" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#0c0a12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="awbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2740"/>
      <stop offset="1" stop-color="#0a0a14"/>
