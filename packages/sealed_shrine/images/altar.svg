<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#221a2a"/>
      <stop offset="1" stop-color="#0c0a12"/>
    </linearGradient>
    <radialGradient id="seal" cx="0.5" cy="0.45" r="0.42">
      <stop offset="0" stop-color="#7a4bd0" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="#3a2466" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#0c0a12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sword" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#eef3ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#eef3ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#wall)"/>
  <!-- うごめく魔の封印光 -->
  <rect width="1600" height="900" fill="url(#seal)"/>
  <ellipse cx="800" cy="430" rx="240" ry="200" fill="#1a0f2e" opacity="0.7"/>
  <!-- 祭壇 -->
  <polygon points="560,900 1040,900 960,720 640,720" fill="#1c1626"/>
  <rect x="640" y="700" width="320" height="30" fill="#2a2138"/>
  <!-- 突き立つ聖剣 -->
  <ellipse cx="800" cy="560" rx="120" ry="160" fill="url(#sword)"/>
  <rect x="792" y="470" width="16" height="240" rx="4" fill="#dfe8ff"/>
  <rect x="756" y="500" width="88" height="14" rx="4" fill="#c7d2f0"/>
  <text x="800" y="120" font-family="serif" font-size="44" fill="#9a7bd0" text-anchor="middle" opacity="0.6">祭壇の間</text>
</svg>
