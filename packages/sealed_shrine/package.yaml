# package.yaml — 短編ファンタジー TRPG「封印の祠」(自己完結・単一シナリオ)。
# packages/sealed_shrine/ を丸ごと zip すれば配布でき、解凍すればそのまま動く。
# 15〜20 分で 1 本遊べる短編。クラス転職・HP0 の死・分岐エンディングを見せるサンプル。

title: 封印の祠
description: 駆け出しの冒険者が封印の祠で運命の聖剣に出会う短編。素手で魔に挑めば死、聖剣を得れば魔法剣士へ転職し封印か討伐かを選べる。
author: you
version: 0.1.0
engine: ">=0.1"

entry: scenarios/shrine.yaml

# 世界観 = 語りの素材 (非検証、prompt に供給)。可変状態は持たない。
world: |
  剣と魔法の異世界。辺境の森の奥に、苔むした古い祠がひっそりと建っている。
  遥か昔、ひとりの賢者がここに強大な魔を封じた。だが近頃その封印が緩み始め、
  夜ごと森に瘴気が漂うようになった。冒険者ギルドは祠の調査を依頼した。

# 主人公を一度だけ宣言。数値(STR/AGI/MAG/SPD/hp)・スキル・属性(クラス/種族)を注入する。
player:
  name: 見習い冒険者
  stats: { hp: 12, STR: 8, AGI: 9, MAG: 6, SPD: 8 }
  skills: [剣術]
  attributes: { クラス: 見習い, 種族: ヒューマン }
  profile: |
    16才。ギルドに登録したばかりの駆け出し。剣の基礎は習ったが魔法は使えない。
    度胸はあるが経験は浅い。祠の異変を確かめにひとりで森へ入った。

# このパッケージに世界フラグは無い (単一シナリオなので跨ぎ持ち越し不要)。
globals:
  flags: []
