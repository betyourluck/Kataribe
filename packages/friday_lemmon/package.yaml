title: 金曜日のレモンパイ
description: 海辺の喫茶店に毎週現れる謎の女性。亡き妻のレシピが鍵を握る日常ミステリ。普通の結末と隠された真実の二層構造。
author: Kataribe Studio
version: "1.0"
entry: scenarios/main.yaml
world: |
  舞台は海辺の小さな商店街にある喫茶店「夕凪」。
  毎週金曜日午後3時、必ず同じ席に座る謎の女性がいる。
  店主は彼女にだけ、メニューにない「レモンパイ」を出す。
  依頼人は店主の孫娘。祖父の異変を心配して、金曜日のある日、あなたに調査を頼んだ。
  これは殺人事件ではない。誰も死なない。
  だが、日常の中にだけ、人生をひっくり返すトリックは隠れている。
  プレイヤーは探偵役の幼馴染として、会話と観察で真相に迫る。
  ※ プレイヤーが、単独で行動する話。あかりは店には同行しない。
player:
  name: あなた
  icon: player.webp
  profile: 商店街の近くに住む、観察力に長けた友人。依頼人の幼馴染として頼られた。特別な能力はないが、人の話をよく聞く。
  stats: { 観察力: 6, 共感力: 6 }
  skills: [観察眼, 傾聴]
  items: [メモ帳]
  attributes: { 年齢: "17歳", 役割: 探偵役 }
globals:
  flags: [truth_noticed, family_reunion, met_akari]