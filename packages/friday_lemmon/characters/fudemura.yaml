name: 筆村拓斗
icon: fudemura.webp
profile: |
  21歳。地元の大学の文学部3年。喫茶「夕凪」の常連で、テラス席でいつも本を読んでいる。長髪を後ろで束ね、古い万年筆を胸ポケットに挿している。
  口数は少ないが観察力が鋭く、人の動きをよく見ている。「僕はただの観客ですよ」が口癖で、当事者になるのを避けるタイプ。だが、困っている人を見ると放っておけない。
  商店街の噂に詳しく、プレイヤーにヒントを与える狂言回し役。実はあかりに片思いしており、彼女の役に立ちたいと思っているため協力的。
  推理小説が好きで、表向きの「感動的な結末」をすぐ語りたがる。だが、それが真実ではないかもしれないと薄々気づいている唯一の第三者。
