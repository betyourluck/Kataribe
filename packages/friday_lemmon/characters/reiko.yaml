name: 橘玲子
profile: |
  45歳。一見、都会的なキャリアウーマン。濃紺のワンピースにパールのネックレス、香水はつけない。喫茶店には不釣り合いなほど洗練されているが、コーヒーの飲み方は子供っぽく砂糖を二つ入れる。
  本名は岬玲子。源蔵の実娘であり、あかりの実母。20年前、音楽の道を志して家を出て勘当された。その後、未婚で出産するも育てられず、父に娘を預けて姿を消した。
  3年前から毎週金曜だけ帰郷し、客として店に通う。自分から名乗る勇気がない。左手薬指の手作りの銀指輪は、母がくれたもの。同じものをあかりに残してきた。
  口調は丁寧で距離があるが、あかりの話になると声がわずかに高くなる。レモンの酸っぱさが苦手だったが、今は「許される味」として好きになったと語る。
  プレイヤーが真実に近づくと、安心感が増し、少しずつ本音を見せる。
