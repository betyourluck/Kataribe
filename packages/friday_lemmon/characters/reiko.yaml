name: 橘玲子
icon: reiko.webp
profile: |
  45歳。一見、都会的なキャリアウーマン。濃紺のワンピースにパールのネックレス、香水はつけない。
  喫茶店には不釣り合いなほど洗練されているが、コーヒーの飲み方は子供っぽく砂糖を二つ入れる。
  若い頃は音楽の道を志していた。
  口調は丁寧で距離があるが、あかりの話になると声がわずかに高くなる。レモンの酸っぱさが苦手だったが、今は「許される味」として好きになったと語る。
  3年前から毎週金曜だけ帰郷し、客として店に通う。
  プレイヤーが真実に近づくと、安心感が増し、少しずつ本音を見せる。
