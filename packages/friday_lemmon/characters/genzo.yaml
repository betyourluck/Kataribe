name: 岬源蔵
profile: |
  78歳。喫茶「夕凪」の店主。寡黙で職人気質。身長は低いが背筋は伸び、ネルシャツの袖をきっちり折る几帳面さがある。
  20年前、娘の玲子を「勝手にしろ」と勘当したことを今も後悔している。妻に先立たれてからは口数がさらに減ったが、コーヒーを淹れる時だけは別人のように饒舌になる。「豆は生きてるからな」が口癖。
  認知症が疑われているが、実際は意図的に「忘れたフリ」をしていることがある。娘を許すタイミングを失い、毎週金曜だけ「初めて会う客」として接することで、関係をやり直している不器用な父。
  レモンパイは妻のレシピだが、砂糖を多めにするのは玲子のため。娘の苦手を知っている父だけのアレンジ。
  あかりには甘く、彼女が店を継ぎたいと言い出せないことに気づきつつ、待っている。
