name: 岬あかり
icon: akari.png
profile: |
  17歳。海辺の高校2年生。喫茶「夕凪」の店主・源蔵の孫娘。依頼人。
  ショートカットに日焼けした肌、常に動き回る落ち着きのなさが特徴。口調は早口で「ね、聞いてよ！」が口癖。
  祖父のことが大好きで、店を継ぎたいと密かに思っているが、進路を言い出せない。
  母親の顔を知らず、父は幼い頃に他界したと聞かされている。自分は祖父に育てられたと思い込んでいる。銀の指輪を無意識に身につけている。
  人懐っこく、初対面でも距離を詰める。嘘が下手で、隠し事をするとすぐ耳が赤くなる。プレイヤーとは幼馴染で、全幅の信頼を寄せている。
  好きなものは祖父のコーヒー、苦手なものは酸っぱいもの。
