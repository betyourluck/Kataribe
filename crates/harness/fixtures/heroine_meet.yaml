# PoC シナリオ: 宿屋の出会い (外部キャラファイルを使う最小盤面)
# heroine_route.yaml と違い、キャラを inline で書かない。
# アリスは cast 宣言により characters/alice.yaml から注入される (harness::inject_cast)。
#
# 正規の筋: アリスと会話を重ね、好感度を 50 まで上げる → goal

title: 宿屋の出会い
start: parlor

initial_stats: {}

# inline characters は書かず、cast で外部 characters/alice.yaml を宣言注入する。
cast: [alice]

allowed_flags:
  - alice_ate_pork

locations:
  parlor:
    description: 暖炉のある宿屋の談話室。カウンターの奥に、宿屋の娘アリスが立っている。
    items: {}
    exits: []

goal: { kind: stat_at_least, entity: alice, key: 好感度, value: 50 }
